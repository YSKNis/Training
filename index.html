  const cfg = state.testConfig;
  const results = state.testResults || {};
  const total = state.testQuestions.length;
  const summary = computeTestSummary(results, total);
  const duration = (state.testFinishedAt || Date.now()) - (state.testStartedAt || Date.now());
  const catLabel = getCategoryDisplayLabel(cfg.category, false);

  let headline, subhead;
  if (summary.tier === 'pass') {
    headline = 'Excellent work';
    subhead = `You scored ${summary.pct}% — solid command of this material.`;
  } else if (summary.tier === 'partial') {
    headline = 'Good progress';
    subhead = `You scored ${summary.pct}% — some gaps to close.`;
  } else {
    headline = 'Keep studying';
    subhead = `You scored ${summary.pct}% — more reps will help.`;
  }

  const questionRows = state.testQuestions.map((q, i) => {
    const card = q.card;
    const r = results[i] || { graded: 'unanswered', displayUserAnswer: '', overridden: false, type: q.type };
    const isCodeToMeaning = cfg.direction === 'codeToMeaning';
    const target = isCodeToMeaning ? card.meaning : card.code;
    const promptValue = isCodeToMeaning ? card.code : card.meaning;
    const typeBadge = `<span class="test-q-type-badge ${q.type}" style="margin-right: 6px;">${q.type === 'fill' ? 'FILL' : q.type === 'mc' ? 'MC' : 'T/F'}</span>`;
    const catName = SHORT_LABELS[card.category] || CATEGORIES[card.category]?.label || '';
    const catBadge = catName ? `<span class="test-q-cat-badge" style="margin-right: 6px;">${escapeHtml(catName)}</span>` : '';

    let promptDisplay, answerSection;

    if (q.type === 'fill') {
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-code">${escapeHtml(isCodeToMeaning ? card.code : '')}</span>
        ${!isCodeToMeaning ? `<span class="results-q-prompt-text">${escapeHtml(card.meaning)} → ${escapeHtml(card.code)}</span>` : ''}
      `;
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${escapeHtml(target)}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `
          <span><span class="label mono">Your answer</span><span class="your correct-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          ${normalize(r.displayUserAnswer) !== normalize(target) ? `<span><span class="label mono">Expected</span><span class="right">${escapeHtml(target)}</span></span>` : ''}
        `;
      } else {
        answerSection = `
          <span><span class="label mono">Your answer</span><span class="your wrong-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${escapeHtml(target)}</span></span>
        `;
      }
    } else if (q.type === 'mc') {
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-text">${isCodeToMeaning ? 'Meaning of' : 'Code for'} <span class="results-q-prompt-code">${escapeHtml(promptValue)}</span></span>
      `;
      const correct = q.options[q.correctOptionIndex];
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${escapeHtml(correct)}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `<span><span class="label mono">Selected</span><span class="your correct-text">${escapeHtml(r.displayUserAnswer)}</span></span>`;
      } else {
        answerSection = `
          <span><span class="label mono">You picked</span><span class="your wrong-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${escapeHtml(correct)}</span></span>
        `;
      }
    } else if (q.type === 'tf') {
      const verb = isCodeToMeaning ? 'means' : 'is the code for';
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-text">
          <span class="results-q-prompt-code">${escapeHtml(promptValue)}</span> ${verb} "${escapeHtml(q.statementValue)}"
        </span>
      `;
      const correctStr = q.tfCorrectAnswer ? 'True' : 'False';
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${correctStr}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `<span><span class="label mono">Selected</span><span class="your correct-text">${r.displayUserAnswer}</span></span>`;
      } else {
        answerSection = `
          <span><span class="label mono">You picked</span><span class="your wrong-text">${r.displayUserAnswer}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${correctStr}</span></span>
        `;
      }
    }

    // Only fill-in can be ambiguously graded — hide override on MC/TF
    const showOverride = q.type === 'fill' && r.graded !== 'unanswered';
    const overrideLabel = r.graded === 'correct' ? 'Mark wrong' : 'Mark correct';

    return `
      <div class="results-q ${r.graded} ${r.overridden ? 'overridden' : ''}">
        <div class="results-q-num mono">${String(i + 1).padStart(2, '0')}</div>
        <div class="results-q-body">
          <div class="results-q-prompt">
            ${promptDisplay}
          </div>
          <div class="results-q-answers">${answerSection}</div>
        </div>
        <div class="results-q-actions">
          ${showOverride ? `<button class="results-override-btn" data-action="override-test-answer" data-q-index="${i}">${overrideLabel}</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <main class="test-results">
      <div class="container">
        <button class="back-btn" data-action="home" style="margin-bottom: 24px;">← BACK TO HOME</button>

        <div class="results-summary">
          <div class="results-grade ${summary.tier}">${summary.pct}%</div>
          <div class="results-headline">${headline}</div>
          <div class="results-subhead">${subhead}</div>
          <div class="results-stats">
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--green);">${summary.correct}</span>
              <span class="results-stat-label mono">Correct</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--red);">${summary.wrong}</span>
              <span class="results-stat-label mono">Wrong</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--text-muted);">${summary.unanswered}</span>
              <span class="results-stat-label mono">Skipped</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--blue);">${formatDuration(duration)}</span>
              <span class="results-stat-label mono">Duration</span>
            </div>
          </div>
        </div>

        <div class="results-section-label mono">QUESTION REVIEW · ${catLabel}</div>
        <div>${questionRows}</div>

        <div class="results-actions">
          <button class="results-action-btn primary" data-action="open-test-config">↻ TAKE ANOTHER TEST</button>
          <button class="results-action-btn" data-action="home">← BACK TO HOME</button>
        </div>
      </div>
    </main>
  `;
}

/* ---------- CALL SIM ---------- */

function startCallSim() {
  state.view = 'callsim-picker';
  // Shuffle scenario order so trainees can't memorize "scenario 3 = burglary".
  // Persist the order for this picker session so numbering is stable per visit.
  state.callSimOrder = shuffle(CALL_SCENARIOS.map(s => s.id));
  state.callSim = {
    scenarioId: null,
    transcript: [],
    categoriesAsked: {},
    started: false,
    ended: false,
    startedAt: null,
    endedAt: null,
    listening: false,
    autoSpeak: state.callSim?.autoSpeak ?? true,
    emsConferenced: false,
    showChecklist: false,
    cad: { location: '', signal: '', callerName: '', callerNumber: '', narrative: '' },
  };
  render();
}

function pickCallScenario(scenarioId) {
  const scenario = CALL_SCENARIOS.find(s => s.id === scenarioId);
  if (!scenario) return;

  state.callSim = {
    scenarioId,
    transcript: [
      // First turn: the dispatcher greeting (player's voice / written prompt)
      { role: 'dispatcher', text: '911, what is the address of your emergency?', category: 'greeting' },
      // Second turn: the caller's opening
      { role: 'caller', text: scenario.caller.opening, category: 'opening' },
    ],
    categoriesAsked: {},
    emsConferenced: false,
    started: true,
    ended: false,
    startedAt: Date.now(),
    endedAt: null,
    listening: false,
    autoSpeak: state.callSim.autoSpeak,
    showChecklist: false,
    cad: { location: '', signal: '', callerName: '', callerNumber: '', narrative: '' },
  };
  state.view = 'callsim-call';
  render();

  // Speak the caller's opening line if autoSpeak is on
  if (state.callSim.autoSpeak && audio.available) {
    setTimeout(() => speakCallerLine(scenario.caller.opening), 400);
  }
}

function sendCallSimQuestion(text) {
  text = (text || '').trim();
  if (!text) return;
  const scenario = CALL_SCENARIOS.find(s => s.id === state.callSim.scenarioId);
  if (!scenario) return;

  // Add the dispatcher question to the transcript
  const category = matchCallSimQuestion(text);
  state.callSim.transcript.push({ role: 'dispatcher', text, category: category || 'unknown' });

  let response;
  if (!category) {
    response = { line: getCallSimNoMatchResponse(), category: 'no_match', isUnknown: true };
  } else {
    state.callSim.categoriesAsked[category] = (state.callSim.categoriesAsked[category] || 0) + 1;
    response = getCallSimResponse(scenario, category);
  }

  // Special handling: conferencing EMS produces a system line + a caller line,
  // not just a caller line. This is the critical action on medical/injury calls.
  if (response.line === '__CONFERENCE__') {
    state.callSim.emsConferenced = true;
    state.callSim.transcript.push({
      role: 'system',
      text: '— Fire Rescue conferenced onto the line. EMS is now en route. —',
      category: 'conference_ems',
    });
    state.callSim.transcript.push({
      role: 'caller',
      text: "Oh thank God. Okay. I hear them. Please hurry.",
      category: 'conference_ems',
    });
    render();
    setTimeout(() => {
      const transcript = document.querySelector('.callsim-transcript');
      if (transcript) transcript.scrollTop = transcript.scrollHeight;
      if (state.callSim.autoSpeak && audio.available) speakCallerLine("Oh thank God. Okay. Please hurry.");
      const input = document.querySelector('.callsim-input');
      if (input) input.focus();
    }, 50);
    return;
  }

  state.callSim.transcript.push({ role: 'caller', text: response.line, category: response.category });
  render();

  // Scroll transcript to bottom and speak the response
  setTimeout(() => {
    const transcript = document.querySelector('.callsim-transcript');
    if (transcript) transcript.scrollTop = transcript.scrollHeight;
    if (state.callSim.autoSpeak && audio.available) {
      speakCallerLine(response.line);
    }
    // Re-focus the input so the player can immediately ask the next question
    const input = document.querySelector('.callsim-input');
    if (input) input.focus();
  }, 50);
}

function endCallSim() {
  if (!confirm('End this call and see the debrief?')) return;
  state.callSim.ended = true;
  state.callSim.endedAt = Date.now();
  state.view = 'callsim-debrief';
  recognizer.stop();
  state.callSim.listening = false;
  render();
  window.scrollTo(0, 0);
}

function abandonCallSim() {
  if (state.callSim.started && state.callSim.transcript.length > 2) {
    if (!confirm('Leave this call? Your progress won\'t be saved.')) return;
  }
  recognizer.stop();
  audio.cancel();
  state.callSim.listening = false;
  state.view = 'callsim-picker';
  state.callSim.scenarioId = null;
  state.callSim.transcript = [];
  state.callSim.categoriesAsked = {};
  state.callSim.started = false;
  render();
}

// TTS for caller lines — uses the existing audio engine but with a faster rate
// and slight emotional cues are baked into the script text itself.
function speakCallerLine(text) {
  if (!audio.available) return;
  // Strip stage directions in parens for cleaner speech
  const cleanText = text.replace(/\([^)]*\)/g, '').trim();
  if (!cleanText) return;
  audio.speak(cleanText, { rate: 1.0 });
}

// Voice input — start listening for the dispatcher's spoken question
function callSimToggleMic() {
  if (state.callSim.listening) {
    // Second tap = finish and transcribe what was captured
    showCallSimMicStatus('Processing…');
    recognizer.finish();
    state.callSim.listening = false;
    updateMicButtonUI();
    return;
  }
  if (!recognizer.available) {
    showCallSimMicStatus(recognizerErrorMessage('unsupported'));
    return;
  }
  state.callSim.listening = true;
  updateMicButtonUI();
  showCallSimMicStatus('🎤 Listening… speak, then tap the mic again to finish.');

  recognizer.start({
    onInterim: (text) => {
      // Live feedback — show what's being heard in the input as you speak
      const input = document.getElementById('callsim-input');
      if (input && text) input.value = text;
      if (text) showCallSimMicStatus('🎤 Hearing: "' + text + '" — tap mic to finish.');
    },
    onResult: (alternatives) => {
      const text = (alternatives[0] || '').trim();
      state.callSim.listening = false;
      const input = document.getElementById('callsim-input');
      if (input) {
        input.value = text;
        input.focus();
      }
      updateMicButtonUI();
      showCallSimMicStatus(text ? 'Got it — review and tap "Ask →", or edit first.' : 'Didn\'t catch anything. Tap the mic and try again.');
    },
    onError: (reason) => {
      state.callSim.listening = false;
      updateMicButtonUI();
      showCallSimMicStatus(recognizerErrorMessage(reason));
    },
    onEnd: () => {
      if (state.callSim.listening) {
        state.callSim.listening = false;
        updateMicButtonUI();
        showCallSimMicStatus('Stopped. Tap the mic to try again.');
      }
    },
  });
}

// Update just the mic button's visual state without a full re-render
function updateMicButtonUI() {
  const btn = document.querySelector('.callsim-mic-btn');
  if (btn) btn.classList.toggle('listening', state.callSim.listening);
  const input = document.getElementById('callsim-input');
  if (input) {
    input.placeholder = state.callSim.listening ? 'Listening — speak now…' : 'Ask your question (or tap mic)…';
  }
}

// Show a transient status line under the input
function showCallSimMicStatus(msg) {
  const el = document.getElementById('callsim-mic-status');
  if (el) el.textContent = msg;
}

// Compute the debrief score based on what categories were covered
function gradeCallSim() {
  const scenario = CALL_SCENARIOS.find(s => s.id === state.callSim.scenarioId);
  if (!scenario) return null;
  const asked = state.callSim.categoriesAsked || {};
  const askedCategories = Object.keys(asked);

  const checklist = scenario.priorityChecklist.map(catId => {
    // caller_info is a composite — satisfied if name OR callback was asked
    let isAsked;
    if (catId === 'caller_info') {
      isAsked = !!asked['caller_name'] || !!asked['caller_callback'];
    } else {
      isAsked = !!asked[catId];
    }
    return { id: catId, label: friendlyCategoryName(catId), asked: isAsked };
  });
  const officerSafety = scenario.officerSafety.map(catId => ({
    id: catId,
    label: friendlyCategoryName(catId),
    asked: !!asked[catId],
  }));

  const priorityHits = checklist.filter(c => c.asked).length;
  const priorityTotal = checklist.length;
  const safetyHits = officerSafety.filter(c => c.asked).length;
  const safetyTotal = officerSafety.length;

  // Score: 70% priority, 30% officer safety. If officer safety total is 0, all weight goes to priority.
  let pct;
  if (safetyTotal === 0) {
    pct = priorityTotal === 0 ? 100 : Math.round((priorityHits / priorityTotal) * 100);
  } else {
    pct = Math.round((priorityHits / priorityTotal) * 70 + (safetyHits / safetyTotal) * 30);
  }
  let tier = pct >= 85 ? 'pass' : pct >= 65 ? 'partial' : 'fail';

  // HARD FAIL: on a call that requires EMS, not conferencing them is an automatic
  // failure regardless of everything else. The patient gets no ambulance.
  let autoFail = false;
  let autoFailReason = null;
  if (scenario.requiresEMS && !state.callSim.emsConferenced) {
    autoFail = true;
    autoFailReason = 'You never conferenced Fire Rescue / EMS. On a medical or injury call, that is the call — the patient gets no ambulance. Automatic fail, regardless of everything else you did right.';
    pct = 0;
    tier = 'fail';
  }

  // Grade the CAD call-entry fields against ground truth
  const cad = state.callSim.cad || {};
  const truthAddress = `${scenario.location.address} ${scenario.location.apt || ''} ${scenario.location.city}`.trim();
  const cadResults = {
    location: {
      entered: cad.location || '',
      correct: truthAddress,
      ok: cadLocationMatch(cad.location, scenario),
    },
    signal: {
      entered: cad.signal || '',
      correct: scenario.signal,
      ok: cadSignalMatch(cad.signal, scenario.signal),
    },
    callerName: {
      entered: cad.callerName || '',
      correct: scenario.caller.name,
      ok: cadNameMatch(cad.callerName, scenario.caller.name),
    },
    callerNumber: {
      entered: cad.callerNumber || '',
      correct: scenario.caller.callback,
      ok: cadNumberMatch(cad.callerNumber, scenario.caller.callback),
    },
  };

  return {
    checklist, officerSafety, priorityHits, priorityTotal, safetyHits, safetyTotal,
    pct, tier, autoFail, autoFailReason,
    emsConferenced: !!state.callSim.emsConferenced,
    requiresEMS: !!scenario.requiresEMS,
    cad: cadResults,
    narrative: cad.narrative || '',
  };
}

// CAD field matchers — lenient, since the trainee types from a spoken conversation.
function cadSignalMatch(entered, correct) {
  if (!entered) return false;
  const norm = s => (s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
  return norm(entered) === norm(correct);
}
function cadNumberMatch(entered, correct) {
  if (!entered) return false;
  const digits = s => (s || '').replace(/\D/g, '');
  return digits(entered) === digits(correct);
}
function cadNameMatch(entered, correct) {
  if (!entered) return false;
  const norm = s => (s || '').toLowerCase().replace(/[^a-z ]/g, '').trim();
  const e = norm(entered), c = norm(correct);
  if (!e) return false;
  // Match if entered contains the correct last name (most important) or vice versa
  const cParts = c.split(/\s+/);
  const lastName = cParts[cParts.length - 1];
  return e.includes(lastName) || c.includes(e) || e === c;
}
function cadLocationMatch(entered, scenario) {
  if (!entered) return false;
  const norm = s => (s || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
  const e = norm(entered);
  // The street number is the most important token — check it's present
  const streetNum = (scenario.location.address.match(/\d+/) || [''])[0];
  if (streetNum && e.includes(streetNum)) return true;
  // Or a strong match on the street name
  const addrNorm = norm(scenario.location.address);
  const streetWords = addrNorm.replace(/^\d+\s*/, '');
  return streetWords.length > 0 && e.includes(streetWords.split(' ')[0]) && e.length > 4;
}

/* ---------- CALL SIM RENDER: scenario picker ---------- */

function renderCallSimPicker() {
  // Use the shuffled order; fall back to default order if not set

/* ---------- CALL SIM RENDER: active call ---------- */

function renderCallSimCall() {
  const scenario = CALL_SCENARIOS.find(s => s.id === state.callSim.scenarioId);
  if (!scenario) {
    state.view = 'callsim-picker';
    return renderCallSimPicker();
  }

  // Transcript
  const turns = state.callSim.transcript.map(t => {
    if (t.role === 'system') {
      return `<div class="callsim-turn-system mono">${escapeHtml(t.text)}</div>`;
    }
    return `
    <div class="callsim-turn ${t.role}">
      <span class="callsim-turn-role mono">${t.role === 'dispatcher' ? 'YOU' : 'CALLER'}</span>
      <div class="callsim-turn-text">${escapeHtml(t.text)}</div>
    </div>
  `;
  }).join('');

  // Priority checklist (live, ticks off as the player asks) — hidden behind a toggle
  const asked = state.callSim.categoriesAsked || {};
  const allItems = [
    ...scenario.priorityChecklist.map(c => ({ id: c, priority: true })),
    ...scenario.officerSafety.filter(c => !scenario.priorityChecklist.includes(c)).map(c => ({ id: c, priority: false })),
  ];
  const checklistHtml = allItems.map(item => {
    const isAsked = item.id === 'caller_info'
      ? (!!asked['caller_name'] || !!asked['caller_callback'])
      : !!asked[item.id];
    return `
      <div class="callsim-checklist-item ${isAsked ? 'complete' : ''}">
        <span class="callsim-checklist-icon">${isAsked ? '✓' : '○'}</span>
        <span>${escapeHtml(friendlyCategoryName(item.id))}${item.priority ? '' : ' ⚠'}</span>
      </div>
    `;
  }).join('');

  const micAvailable = recognizer.available;
  const cad = state.callSim.cad;

  // Signal dropdown options — built from the signals category
  const signalCards = ALL_CARDS.signals || [];
  const signalOptions = ['<option value="">— select signal —</option>']
    .concat(signalCards.map(c => `<option value="${escapeHtml(c.code)}" ${cad.signal === c.code ? 'selected' : ''}>${escapeHtml(c.code)} — ${escapeHtml(c.meaning)}</option>`))
    .join('');

  return `
    <main>
      <div class="callsim-wrap">
        <div class="callsim-header">
          <div>
            <button class="back-btn" data-action="abandon-call-sim" style="margin-bottom: 12px;">← END CALL</button>
            <h1>Active Call</h1>
            <div class="callsim-sub mono">Caller on the line · Classify and type up the call</div>
          </div>
        </div>

        <div class="callsim-call-body">
          <div>
            <div class="callsim-transcript">${turns}</div>

            <div class="callsim-input-area">

                  <button class="callsim-mic-btn ${state.callSim.listening ? 'listening' : ''}" data-action="callsim-toggle-mic" title="Speak your question">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                      <line x1="12" y1="19" x2="12" y2="23"/>
                      <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                  </button>
                ` : ''}
                <input
                  type="text"
                  class="callsim-input"
                  id="callsim-input"
                  placeholder="${state.callSim.listening ? 'Listening — speak now…' : 'Ask your question (or tap mic)…'}"
                  autocomplete="off"
                >
                <button class="callsim-send-btn" data-action="callsim-send">Ask →</button>
              </div>
              <div id="callsim-mic-status" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: ${micAvailable && !recognizer.isReliableBrowser ? 'var(--amber)' : 'var(--text-muted)'}; min-height: 14px;">${
                micAvailable && !recognizer.isReliableBrowser
                  ? 'Voice input is only reliable in Google Chrome. In this browser it may not capture — use the text box, or open the app in Chrome.'
                  : ''
              }</div>
              <div class="callsim-options">
                <label>
                  <input type="checkbox" data-action="callsim-toggle-autospeak" ${state.callSim.autoSpeak ? 'checked' : ''}>
                  Read caller responses out loud
                </label>
              </div>
            </div>
          </div>

          <div class="callsim-sidebar">
            ${scenario.requiresEMS && !state.callSim.emsConferenced ? `
              <div class="callsim-panel" style="border-color: var(--red); background: rgba(248, 113, 113, 0.08);">
                <div class="callsim-panel-title mono" style="color: var(--red);">⚠ This call needs EMS</div>
                <div style="font-size: 12px; color: var(--text-2); line-height: 1.5;">
                  Conference Fire Rescue — tell the caller you're connecting them. Not doing it fails the call.
                </div>
              </div>
            ` : ''}
            ${scenario.requiresEMS && state.callSim.emsConferenced ? `
              <div class="callsim-panel" style="border-color: var(--green); background: rgba(74, 222, 128, 0.08);">
                <div class="callsim-panel-title mono" style="color: var(--green);">✓ EMS conferenced</div>
                <div style="font-size: 12px; color: var(--text-2);">Fire Rescue is on the line. Good.</div>
              </div>

            <!-- CAD CALL ENTRY -->
            <div class="callsim-panel callsim-cad">
              <div class="callsim-panel-title mono">Call entry (CAD)</div>
              <label class="callsim-cad-label mono">Location</label>
              <input type="text" class="callsim-cad-input" data-cad="location" value="${escapeHtml(cad.location)}" placeholder="Address / location" autocomplete="off">

              <label class="callsim-cad-label mono">Call class / signal</label>
              <select class="callsim-cad-input callsim-cad-select" data-cad="signal">${signalOptions}</select>

              <input type="text" class="callsim-cad-input" data-cad="callerName" value="${escapeHtml(cad.callerName)}" placeholder="Reporting party" autocomplete="off">

              <label class="callsim-cad-label mono">Caller number</label>
              <input type="text" class="callsim-cad-input" data-cad="callerNumber" value="${escapeHtml(cad.callerNumber)}" placeholder="Callback number" autocomplete="off">

                <div class="callsim-checklist" style="margin-top: 10px;">${checklistHtml}</div>

                </div>
              ` : `
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 6px;">
                  Hidden so you work the call from memory. Reveal it only if you need the training wheels.
                </div>
              `}

            <button class="callsim-end-btn" data-action="end-call-sim">End Call & Debrief →</button>
          </div>
        </div>
      </div>
    </main>
  `;
}

/* ---------- CALL SIM RENDER: debrief ---------- */

function renderCallSimDebrief() {
  const scenario = CALL_SCENARIOS.find(s => s.id === state.callSim.scenarioId);
  if (!scenario) {
    state.view = 'callsim-picker';
    return renderCallSimPicker();
  }

  const grade = gradeCallSim();
  if (!grade) return renderCallSimPicker();

  const duration = state.callSim.endedAt && state.callSim.startedAt
    ? state.callSim.endedAt - state.callSim.startedAt
    : 0;

  const missedPriority = grade.checklist.filter(c => !c.asked);
  const missedSafety = grade.officerSafety.filter(c => !c.asked);

  // Ground-truth recap
  const groundTruth = `
    <ul style="margin: 0; padding-left: 20px; line-height: 1.7; color: var(--text-2);">
      <li><strong>Caller:</strong> ${escapeHtml(scenario.caller.name)} · ${escapeHtml(scenario.caller.callback)}</li>
      <li><strong>Location:</strong> ${escapeHtml(scenario.location.address)}${scenario.location.apt ? ', ' + escapeHtml(scenario.location.apt) : ''}, ${escapeHtml(scenario.location.city)}</li>
      <li><strong>Problem:</strong> ${escapeHtml(scenario.problem.summary)}</li>
    </ul>
  `;

  return `
    <main>
      <div class="callsim-wrap">
        <div class="callsim-header">
          <div>
            <button class="back-btn" data-action="start-call-sim" style="margin-bottom: 12px;">← BACK TO SCENARIOS</button>
            <h1>Debrief: ${escapeHtml(scenario.title)}</h1>
            <div class="callsim-sub mono">${escapeHtml(scenario.signal)} · Call duration: ${formatDuration(duration)}</div>
          </div>
        </div>

        ${grade.autoFail ? `
          <div class="callsim-debrief-section" style="border-color: var(--red); background: rgba(248, 113, 113, 0.08);">
            <h3 style="color: var(--red);">⚠ Automatic Fail</h3>
            <div style="font-size: 14px; line-height: 1.5; color: var(--text);">${escapeHtml(grade.autoFailReason)}</div>
          </div>
        ` : ''}

        <div class="callsim-debrief-summary">
          <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
            <div class="callsim-debrief-score ${grade.tier} mono">${grade.autoFail ? 'FAIL' : grade.pct + '%'}</div>
            <div style="font-size: 14px; line-height: 1.6;">
              ${grade.requiresEMS ? `<div><strong>EMS conferenced:</strong> <span style="color: ${grade.emsConferenced ? 'var(--green)' : 'var(--red)'};">${grade.emsConferenced ? 'YES ✓' : 'NO ✗ — required'}</span></div>` : ''}
              <div><strong>Priority info gathered:</strong> ${grade.priorityHits} of ${grade.priorityTotal}</div>
              ${grade.safetyTotal > 0 ? `<div><strong>Scene/officer safety covered:</strong> ${grade.safetyHits} of ${grade.safetyTotal}</div>` : ''}
              <div style="margin-top: 6px; color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px;">
                ${grade.autoFail ? 'AUTOMATIC FAIL — see above' : grade.tier === 'pass' ? 'PASS — solid call' : grade.tier === 'partial' ? 'PARTIAL — review what you missed' : 'NEEDS WORK — critical items missed'}
              </div>
            </div>
          </div>
        </div>

        ${scenario.callClass ? `
          <div class="callsim-debrief-section">
            <h3>Call classification</h3>
            <div style="font-size: 14px; color: var(--text-2); line-height: 1.5;">${escapeHtml(scenario.callClass)}</div>
          </div>
        ` : ''}

        ${missedPriority.length > 0 ? `
          <div class="callsim-debrief-section">
            <h3>Priority info you didn't ask about</h3>
            <div class="callsim-missed">
              ${missedPriority.map(c => `<div class="callsim-missed-item">${escapeHtml(c.label)}</div>`).join('')}
            </div>
          </div>
        ` : ''}

        ${missedSafety.length > 0 ? `
          <div class="callsim-debrief-section">
            <h3>Officer-safety items you didn't ask about</h3>
            <div class="callsim-missed">
              ${missedSafety.map(c => `<div class="callsim-missed-item">${escapeHtml(c.label)}</div>`).join('')}
            </div>
            <div style="margin-top: 10px; font-size: 12px; color: var(--text-muted);">
              These could put responding units at risk. Always ask.
            </div>
          </div>
        ` : ''}

        <div class="callsim-debrief-section">
          <h3>Your call entry vs. the actual call</h3>
          ${['location','signal','callerName','callerNumber'].map(k => {
            const r = grade.cad[k];
            const labels = { location: 'Location', signal: 'Call class / signal', callerName: 'Caller name', callerNumber: 'Caller number' };
            return `
              <div class="callsim-cad-review-row">
                <div class="callsim-cad-review-label mono">${labels[k]}</div>
                <div class="callsim-cad-review-vals">
                  <div class="callsim-cad-review-entered ${r.ok ? 'ok' : 'bad'}">
                    ${r.ok ? '✓' : '✗'} You: ${escapeHtml(r.entered || '— blank —')}
                  </div>
                  ${!r.ok ? `<div class="callsim-cad-review-correct">Actual: ${escapeHtml(r.correct)}</div>` : ''}
                </div>
              </div>
            `;
          }).join('')}
          ${grade.narrative ? `
            <div style="margin-top: 14px;">
              <div class="callsim-cad-review-label mono" style="margin-bottom: 6px;">Your narrative</div>
              <div style="background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; font-size: 13px; color: var(--text-2); white-space: pre-wrap; line-height: 1.4;">${escapeHtml(grade.narrative)}</div>
            </div>
          ` : `<div style="margin-top: 12px; font-size: 12px; color: var(--text-muted);">No narrative was entered.</div>`}
        </div>

        <div class="callsim-debrief-section">
          <h3>Ground truth — what was actually going on</h3>
          ${groundTruth}
        </div>

        <div class="callsim-debrief-section">
          <h3>Coaching notes</h3>
          <div class="callsim-debrief-advice">${escapeHtml(scenario.closingAdvice)}</div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button class="callsim-send-btn" data-action="pick-call-scenario" data-scenario="${scenario.id}">↻ Retry this scenario</button>
          <button class="callsim-send-btn" style="background: var(--surface-3); color: var(--text);" data-action="start-call-sim">Choose another scenario</button>
          <button class="callsim-send-btn" style="background: var(--surface-3); color: var(--text);" data-action="home">← Home</button>
        </div>
      </div>
    </main>
  `;
}

/* ---------- MAP QUIZ RESULTS VIEW ---------- */

function renderMapQuizResults() {
  const results = state.mapQuizResults || {};
  const total = MAP_QUIZ_LOCATIONS.length;
  let correct = 0;
  for (const n in results) if (results[n].graded === 'correct') correct++;
  const pct = total ? Math.round((correct / total) * 100) : 0;
  const tier = pct >= 90 ? 'pass' : pct >= 70 ? 'partial' : 'fail';
  const elapsed = state.mapQuizFinishedAt && state.mapQuizStartedAt
    ? state.mapQuizFinishedAt - state.mapQuizStartedAt
    : 0;

  const rows = MAP_QUIZ_LOCATIONS.map(loc => {
    const r = results[loc.n] || { graded: 'wrong', userAnswer: '' };
    const isCorrect = r.graded === 'correct';
    const wasBlank = !(r.userAnswer || '').trim();
    return `
      <div class="map-quiz-q ${isCorrect ? 'correct' : 'wrong'}">
        <div class="map-quiz-q-num mono">${loc.n}</div>
        <input
          type="text"
          class="map-quiz-q-input"
          value="${escapeHtml(wasBlank ? '— blank —' : r.userAnswer)}"
          readonly
        >
        <div class="map-quiz-q-mark ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓' : '✗'}</div>
        ${!isCorrect ? `<div class="map-quiz-q-correct-answer"><span>Correct:</span> <span class="right">${escapeHtml(loc.name)}</span></div>` : ''}
      </div>
    `;
  }).join('');

  return `
    <main>
      <div class="map-quiz-wrap">
        <div class="map-quiz-header">
          <div>
            <button class="back-btn" data-action="home" style="margin-bottom: 12px;">← HOME</button>
            <h1>Map Quiz Results</h1>
            <div class="map-quiz-sub mono">${formatDuration(elapsed)} · ${correct}/${total} correct</div>
          </div>
          <div class="map-quiz-results-summary">
            <span class="map-quiz-score ${tier} mono">${pct}%</span>
          </div>
        </div>

        <div class="map-quiz-body">
          <div class="map-quiz-map-col">
            <div style="position: relative;">
              <div class="map-quiz-zoom-hint mono">CLICK TO ZOOM</div>
              <img src="${MAP_QUIZ_IMAGE}" alt="Palm Beach County map" class="map-quiz-image" id="map-quiz-image">
            </div>
          </div>

          <div class="map-quiz-inputs">
            ${rows}
          </div>
        </div>

        <div class="map-quiz-submit-bar">
          <span class="mono" style="color: var(--text-muted); font-size: 12px;">
            ${correct} correct · ${total - correct} incorrect
          </span>
          <div style="display: flex; gap: 8px;">
            <button class="map-quiz-submit-btn" style="background: var(--surface-3); color: var(--text);" data-action="home">← HOME</button>
            <button class="map-quiz-submit-btn" data-action="start-map-quiz">↻ RETRY</button>
          </div>
        </div>
      </div>
    </main>
  `;
}

/* ---------- DAILY DRILL CARD (HOME) ---------- */

function renderDailyCard() {
  storage.ensureDailySession();
  const d = storage.getDaily();
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();
  const dayCount = d.totalDaysCompleted || 0;

  const fcComplete = progress.flashcardSeen >= progress.total && progress.total > 0;
  const qComplete = progress.quizAnswered >= progress.total && progress.total > 0;

  let buttonText, buttonClass;
  if (progress.isCompletedToday) {
    if (progress.isComplete) {
      buttonText = 'REVIEW TODAY\'S SET →';
      buttonClass = 'complete';
    } else {
      buttonText = 'CONTINUE TODAY\'S DRILL →';
      buttonClass = '';
    }
  } else if (progress.flashcardSeen > 0 || progress.quizAnswered > 0) {
    buttonText = 'CONTINUE TODAY\'S DRILL →';
    buttonClass = '';
  } else {
    buttonText = 'START TODAY\'S DRILL →';
    buttonClass = '';
  }

  const settingsId = state.dailySettingsOpen ? 'daily-settings-panel' : '';

  const totalCats = Object.keys(CATEGORIES).length;
  const enabledCats = (d.enabledCategories || Object.keys(CATEGORIES)).length;
  const filterText = enabledCats === totalCats
    ? 'Mixed selection from across all categories'
    : `Mixed selection from ${enabledCats} of ${totalCats} categories`;

  return `
    <div class="daily-card">
      <div class="daily-head">
        <div class="daily-head-left">
          <div class="daily-label mono">DAILY DRILL · ${formatDateForDisplay(todayString())}</div>
          <div class="daily-title">${progress.total} Codes for Today</div>
          <div class="daily-subtitle">${filterText}${dayCount > 0 ? ` · Day ${dayCount} completed` : ''}</div>
          ${progress.isCompletedToday ? `<span class="daily-complete-badge">✓ COMPLETED TODAY</span>` : ''}
        </div>
        <div class="daily-streak">
          <div class="streak-num mono">${streak}</div>
          <div class="streak-label mono">${streak === 1 ? 'DAY' : 'DAYS'} STREAK</div>
        </div>
      </div>

      <div class="daily-progress-rows">
        <div class="dp-row">
          <span class="dp-label mono">FLASHCARDS</span>
          <div class="dp-track"><div class="dp-fill ${fcComplete ? 'complete' : ''}" style="width: ${progress.flashcardPct}%"></div></div>
          <span class="dp-count mono">${progress.flashcardSeen}/${progress.total}</span>
        </div>
        <div class="dp-row">
          <span class="dp-label mono">MULTIPLE CHOICE</span>
          <div class="dp-track"><div class="dp-fill ${qComplete ? 'complete' : ''}" style="width: ${progress.quizPct}%"></div></div>
          <span class="dp-count mono">${progress.quizAnswered}/${progress.total}</span>
        </div>
      </div>

      <div class="daily-actions">
        <button class="daily-start-btn ${buttonClass}" data-action="start-daily">${buttonText}</button>
        ${progress.isComplete ? `
          <button class="daily-cog" data-action="next-batch" title="Get another batch of cards">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        ` : ''}
        <div class="daily-cog-wrap" style="position: relative;">
          <button class="daily-cog" data-action="toggle-daily-settings" title="Daily settings">
            ${gearIcon()}
          </button>
          ${state.dailySettingsOpen ? renderDailySettings() : ''}
        </div>
      </div>
    </div>
  `;
}

function renderDailySettings() {
  const d = storage.getDaily();
  const opts = [5, 10, 15, 20];
  const enabled = d.enabledCategories || Object.keys(CATEGORIES);
  const progress = getDailyProgress();
  const hasProgress = progress.flashcardSeen > 0 || progress.quizAnswered > 0;

  const chips = Object.values(CATEGORIES).map(cat => {
    const isOn = enabled.includes(cat.id);
    const count = ALL_CARDS[cat.id].length;
    return `
      <button class="cat-chip ${isOn ? 'active' : ''}" data-action="toggle-daily-category" data-category="${cat.id}">
        <span class="cat-chip-name">${SHORT_LABELS[cat.id] || cat.label}</span>
        <span class="cat-chip-count mono">${count}</span>
      </button>
    `;
  }).join('');

  return `
    <div class="settings-panel open" id="daily-settings-panel">
      <div class="setting-section-label mono">CARDS PER DAY</div>
      <div class="cards-per-day-options" style="padding: 0 8px 6px;">
        ${opts.map(n => `
          <button class="cpd-opt ${d.cardsPerDay === n ? 'active' : ''}" data-action="set-cards-per-day" data-count="${n}">${n}</button>
        `).join('')}
      </div>

      <div class="setting-sep"></div>

      <div class="setting-section-label mono">PULL FROM</div>
      <div class="category-chips" style="padding: 0 8px 4px;">
        ${chips}
      </div>
      ${hasProgress ? `<div class="filter-note">Filter changes apply to next batch</div>` : ''}

      <div class="setting-sep"></div>

      <div class="setting-row danger" data-action="reset-daily">
        <span>Reset daily progress</span>
        <span>↺</span>
      </div>
    </div>
  `;
}

/* ---------- DAILY VIEW (the actual drill) ---------- */

function renderDailyView() {
  const isEnd = state.index >= state.deck.length;
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();

  let body;
  if (state.deck.length === 0) {
    body = `
      <div class="empty-state">
        <h3>No cards in today's set</h3>
        <p>Try adjusting your cards-per-day setting or get a new batch.</p>
        <button class="empty-btn" data-action="home">Back to Home</button>
      </div>
    `;
  } else if (isEnd) {
    body = renderDailyComplete();
  } else if (state.mode === 'flashcard') {
    body = renderFlashcard();
  } else if (state.mode === 'quiz') {
    body = renderQuiz();
  } else if (state.mode === 'audio') {
    body = renderAudio();
  }

  const overallProgress = state.deck.length ? (state.index / state.deck.length) * 100 : 0;

  return `
    <main class="study">
      <div class="container">
        <div class="study-header">
          <button class="back-btn" data-action="home">← BACK</button>
          <div class="study-title">
            <div class="study-title-label mono">DAILY DRILL · ${formatDateForDisplay(todayString())}</div>
            <div class="study-title-name">${progress.total} Codes <span class="daily-source-tag mono">STREAK · ${streak}</span></div>
          </div>
          <div class="study-controls">
            <button class="icon-btn ${state.shuffleOn ? 'active' : ''}" data-action="toggle-shuffle" title="Order: Random / Numeric (toggle)">
              ${shuffleIcon()}
            </button>
            <button class="icon-btn ${state.reversed ? 'active' : ''}" data-action="toggle-reverse" title="Reverse (meaning → code)">
              ${reverseIcon()}
            </button>
          </div>
        </div>

        <div class="mode-tabs" style="grid-template-columns: repeat(3, 1fr);">
          <button class="mode-tab ${state.mode === 'flashcard' ? 'active' : ''}" data-action="mode" data-mode="flashcard">Flashcards</button>
          <button class="mode-tab ${state.mode === 'quiz' ? 'active' : ''}" data-action="mode" data-mode="quiz">Multiple Choice</button>
          <button class="mode-tab ${state.mode === 'audio' ? 'active' : ''}" data-action="mode" data-mode="audio">Audio</button>
        </div>

        ${!isEnd ? `
          <div class="progress-strip">
            <span class="counter mono">${String(state.index + 1).padStart(2, '0')} / ${String(state.deck.length).padStart(2, '0')}</span>
            ${state.reviewRoundNum > 0 ? `<span class="review-badge">↻ Review ${state.reviewRoundNum}</span>` : ''}
            <div class="track"><div class="fill" style="width: ${overallProgress}%"></div></div>
            ${state.mode === 'quiz' ? `
              <span class="quiz-score mono">
                <span class="correct-num">${state.quizCorrect}✓</span>
                &nbsp;
                <span class="wrong-num">${state.quizWrong}✗</span>
              </span>
            ` : `
              <span class="quiz-score mono">DAILY: ${progress.flashcardSeen + progress.quizAnswered > 0 ? Math.max(progress.flashcardPct, progress.quizPct) : 0}%</span>
            `}
          </div>
        ` : ''}

        ${body}
      </div>
    </main>
  `;
}

function renderDailyComplete() {
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();
  const justCompleted = progress.isCompletedToday;
  const stillLearning = getStillLearningInRound();
  const hasReview = stillLearning.length > 0;
  const isFinal = !hasReview && state.reviewRoundNum > 0;

  const heading = isFinal
    ? 'All Cards Mastered'
    : (state.reviewRoundNum > 0 ? `Review Round ${state.reviewRoundNum} Complete` : (justCompleted ? 'Daily Drill Complete' : 'Round Complete'));

  let subhead;
  if (isFinal) {
    subhead = `You've worked through all the cards you marked for review.`;
  } else if (hasReview) {
    subhead = `${stillLearning.length} card${stillLearning.length === 1 ? '' : 's'} still need${stillLearning.length === 1 ? 's' : ''} review.`;
  } else if (justCompleted) {
    subhead = `Great work — you've finished today's set. Streak: ${streak} ${streak === 1 ? 'day' : 'days'}.`;
  } else {
    subhead = 'Keep going through the cards in another mode, or grab a fresh batch.';
  }

  return `
    <div class="complete-panel">
      <div class="complete-icon">${isFinal ? '★' : (justCompleted ? '✓' : '↻')}</div>
      <h2>${heading}</h2>
      <p>${subhead}</p>
      <div class="complete-stats">
        <div class="cs correct">
          <div class="cs-value mono">${progress.flashcardSeen}/${progress.total}</div>
          <div class="cs-label mono">Flashcards</div>
        </div>
        <div class="cs total">
          <div class="cs-value mono">${progress.quizAnswered}/${progress.total}</div>
          <div class="cs-label mono">Multiple Choice</div>
        </div>
        <div class="cs ${justCompleted ? 'correct' : 'wrong'}">
          <div class="cs-value mono">${streak}</div>
          <div class="cs-label mono">Day Streak</div>
        </div>
      </div>
      <div class="complete-actions">
        ${hasReview ? `
          <button class="action-btn mastered" data-action="review-round">↻ REVIEW ${stillLearning.length} ${state.mode === 'flashcard' ? 'STILL LEARNING' : 'WRONG'}</button>
        ` : ''}
        <button class="action-btn learning" data-action="restart-daily">↻ ${hasReview ? 'ENTIRE SET' : 'REVIEW SAME SET'}</button>
        ${state.mode === 'flashcard' ? `
          <button class="action-btn learning" data-action="switch-to-quiz">→ TRY MULTIPLE CHOICE</button>
        ` : `
          <button class="action-btn learning" data-action="switch-to-flashcard">→ TRY FLASHCARDS</button>
        `}
        <button class="action-btn learning" data-action="next-batch-and-go">↻ NEW BATCH</button>
        <button class="action-btn learning" data-action="home">← HOME</button>
      </div>
    </div>
  `;
}



function renderFlashcard() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const mastery = storage.getMastery(card.id);
  const frontVal = state.reversed ? card.meaning : card.code;
  const backVal = state.reversed ? card.code : card.meaning;
  const frontLabel = state.reversed ? 'MEANING' : 'CODE';
  const backLabel = state.reversed ? 'CODE' : 'MEANING';
  const isLargeFront = !state.reversed;
  const isLargeBack = state.reversed;

    <div class="card-stage">
      <div class="flashcard ${state.flipped ? 'flipped' : ''}" data-action="flip-card">
        <div class="card-face front">
          <div class="card-label mono">${frontLabel}</div>
          <div class="card-mastery ${mastery} mono">${mastery}</div>
          <div class="${isLargeFront ? 'card-code mono' : 'card-meaning'}">${escapeHtml(frontVal)}</div>
          <div class="card-hint mono">TAP OR PRESS SPACE TO REVEAL</div>
        </div>
        <div class="card-face back">
          <div class="card-label mono">${backLabel}</div>
          <div class="card-mastery ${mastery} mono">${mastery}</div>
          <div class="${isLargeBack ? 'card-code mono' : 'card-meaning'}">${escapeHtml(backVal)}</div>

/* ---------- QUIZ ---------- */

function renderQuiz() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const question = state.reversed ? card.meaning : card.code;
  const answerKey = state.reversed ? 'code' : 'meaning';
  const prompt = state.reversed ? 'What is the code for:' : 'What does this signal mean?';

  const options = state.quizOptions.map((opt, i) => {
    const letter = String.fromCharCode(65 + i); // A, B, C, D
    let cls = '';
    if (state.quizAnswered) {
      if (opt.id === card.id) cls = 'correct';
      else if (opt.id === state.quizChoice) cls = 'incorrect';
    }
    return `
      <button class="quiz-option ${cls}" data-action="quiz-pick" data-id="${opt.id}" ${state.quizAnswered ? 'disabled' : ''}>
        <span class="opt-key mono">${letter}</span>
        <span>${escapeHtml(opt[answerKey])}</span>
      </button>
    `;
  }).join('');

  return `
    <div class="quiz-panel">
      <div class="quiz-prompt mono">${prompt}</div>
      <div class="quiz-code mono">${escapeHtml(question)}</div>
      <div class="quiz-options">${options}</div>
      <div class="quiz-footer">
        <div class="quiz-score mono">
          SESSION: <span class="correct-num">${state.quizCorrect} correct</span>
          &nbsp;·&nbsp;
          <span class="wrong-num">${state.quizWrong} wrong</span>
        </div>
        ${state.quizAnswered ? `
          <button class="next-btn" data-action="next">NEXT <span>→</span></button>
        ` : ''}
      </div>
    </div>
    <div class="kbd-help">
      <span><span class="kbd">1</span>–<span class="kbd">4</span> SELECT</span>
      <span><span class="kbd">ENTER</span> NEXT</span>
    </div>
  `;
}

/* ---------- TYPE ---------- */

function renderType() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const question = state.reversed ? card.meaning : card.code;
  const answer = state.reversed ? card.code : card.meaning;
  const prompt = state.reversed ? 'What is the code for:' : 'What does this signal mean?';

  let inputCls = '';

      <div class="type-feedback show ${state.typeCorrect ? 'correct' : 'incorrect'}">
        <div class="fb-row">

            <span class="override-btn-text">${overrideLabel}</span>
          </button>
        </div>
        ${state.typeOverridden ? `<div class="override-applied mono">↻ Overridden — counted as ${state.typeCorrect ? 'correct' : 'wrong'}</div>` : ''}

  return `
    <div class="quiz-panel">

        <div class="quiz-score mono">

          &nbsp;·&nbsp;
          <span class="wrong-num">${state.quizWrong} wrong</span>
        </div>
      </div>
    </div>
    <div class="kbd-help">
      <span><span class="kbd">ENTER</span> CHECK / NEXT</span>

/* ---------- AUDIO ---------- */

function renderAudio() {
  const card = currentCard();
  if (!card) return renderEmpty();

  if (!audio.available) {
    return `
      <div class="audio-stage">
        <div class="audio-unsupported">
          <h3>Audio mode unavailable</h3>
          <p>Your browser doesn't support speech synthesis. Try Chrome, Safari, or Edge.</p>
        </div>
      </div>
    `;
  }

  const phase = state.audioPhase;
  const isSpeaking = phase === 'speaking-prompt' || phase === 'speaking-answer';
  const isPaused = phase === 'pause';
  const isAnswered = phase === 'answered';
  const showAnswer = isPaused === false && (isAnswered || phase === 'speaking-answer');
  const mastery = storage.getMastery(card.id);

  let phaseLabel, phaseClass, indicator;
  if (phase === 'speaking-prompt') {
    phaseLabel = 'PRESENTING CODE';
    phaseClass = 'speaking';
    indicator = '<span class="indicator"></span>';
  } else if (phase === 'pause') {
    phaseLabel = 'YOUR TURN — SAY IT OUT LOUD';
    phaseClass = 'pause';
    indicator = '';
  } else if (phase === 'speaking-answer') {
    phaseLabel = 'REVEALING ANSWER';
    phaseClass = 'speaking';
    indicator = '<span class="indicator"></span>';
  } else if (phase === 'answered') {
    phaseLabel = 'MARK YOUR PROGRESS';
    phaseClass = 'answered';
    indicator = '';
  } else {
    phaseLabel = 'READY';
    phaseClass = '';
    indicator = '';
  }

  // Center visual: waveform when speaking, ring when pausing, blank otherwise
  let visual = '';
  if (isSpeaking) {
    visual = `
      <div class="audio-waveform active">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
      </div>
    `;
  } else if (isPaused) {
    visual = `
      <div class="pause-ring">
        <svg viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="26"></circle>
          <circle class="ring-fill" id="pause-ring-fill" cx="30" cy="30" r="26"
            stroke-dasharray="163.36" stroke-dashoffset="0"></circle>
        </svg>
        <div class="ring-text" id="pause-ring-text">${state.audioPauseSec}</div>
      </div>
    `;
  }

  // Action buttons depend on phase
  let actions;
  if (phase === 'idle') {
    actions = `
      <button class="audio-btn primary" data-action="audio-play">▶ START</button>
      <button class="audio-btn secondary" data-action="audio-skip">SKIP →</button>
    `;
  } else if (isSpeaking || isPaused) {
    actions = `
      <button class="audio-btn secondary" data-action="audio-stop">■ STOP</button>
      ${isPaused ? `<button class="audio-btn primary" data-action="audio-skip-pause">REVEAL NOW →</button>` : ''}
    `;
  } else if (isAnswered) {
    actions = `
      <button class="audio-btn learning" data-action="audio-mark" data-status="learning">
        STILL LEARNING
      </button>
      <button class="audio-btn mastered" data-action="audio-mark" data-status="mastered">
        GOT IT
      </button>
      <button class="audio-btn secondary" data-action="audio-replay">↻ REPLAY</button>
    `;
  }

  // Voice picker
  const voiceOpts = (state.audioVoices || []).map(v =>
    `<option value="${escapeHtml(v.voiceURI)}" ${v.voiceURI === state.audioVoiceURI ? 'selected' : ''}>${escapeHtml(v.name)}</option>`
  ).join('');

  const pauseChips = [2, 4, 6, 8].map(n =>
    `<button class="chip ${state.audioPauseSec === n ? 'active' : ''}" data-action="audio-set-pause" data-sec="${n}">${n}s</button>`
  ).join('');

  // Voice input panel — shown during pause and answered phases when enabled
  let voicePanel = '';
  if (state.voiceInputOn && (isPaused || isAnswered)) {
    if (!recognizer.available) {
      voicePanel = `
        <div class="voice-panel">
          <div class="voice-unsupported">
            Voice input isn't supported in this browser.<br>
            Try Chrome or Edge for hands-free answering.
          </div>
        </div>
      `;
    } else {
      let heardBlock = '';
      if (state.voiceError) {
        const msg = state.voiceError === 'not-allowed'
          ? 'Microphone access denied. Check your browser permissions.'
          : state.voiceError === 'no-speech'
          ? "Didn't catch that — try speaking again."
          : 'Voice recognition error — try again or mark manually.';
        heardBlock = `<div class="voice-error">${msg}</div>`;
      } else if (state.voiceHeard) {
        const v = state.voiceJudged;
        heardBlock = `
          <div class="voice-heard ${v || ''}">
            <div class="voice-heard-label mono">I heard</div>
            <div class="voice-heard-text">"${escapeHtml(state.voiceHeard)}"</div>
            ${v ? `<div class="voice-heard-verdict ${v}">${v === 'correct' ? '✓ Match' : '✗ No match'}</div>` : ''}
          </div>
          ${v ? `
            <div class="audio-controls" style="margin-top: 4px;">
              <button class="audio-btn ${v === 'correct' ? 'mastered' : 'learning'}" data-action="voice-accept">
                ${v === 'correct' ? '✓ ACCEPT — GOT IT' : '✗ ACCEPT — STILL LEARNING'}
              </button>
              <button class="audio-btn secondary" data-action="voice-override">
                ↻ ${v === 'correct' ? 'I WAS WRONG' : 'I WAS RIGHT'}
              </button>
              <button class="audio-btn secondary" data-action="voice-listen">↻ RETRY</button>
            </div>
          ` : ''}
        `;
      }

      const micLabel = state.voiceListening ? 'LISTENING — SPEAK NOW' : 'TAP MIC & SAY THE ANSWER';
      voicePanel = `
        <div class="voice-panel">
          <button class="voice-mic-btn ${state.voiceListening ? 'listening' : ''}" data-action="voice-listen" title="Speak your answer">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <div class="voice-status ${state.voiceListening ? 'listening' : ''} mono">${micLabel}</div>
          ${heardBlock}
        </div>
      `;
    }
  }

  return `
    <div class="audio-stage">
      <div class="audio-display">
        <div class="audio-phase-label ${phaseClass} mono">${indicator}${phaseLabel}</div>

        ${visual}

        <div class="audio-code mono">${escapeHtml(card.code)}</div>
        ${showAnswer
          ? `<div class="audio-meaning">${escapeHtml(card.meaning)}</div>`
          : `<div class="audio-meaning hidden">— answer hidden —</div>`
        }
      </div>

      ${voicePanel}

      <div class="audio-controls">${actions}</div>

      <div class="audio-settings">
        <div class="audio-setting">
          <span>VOICE</span>
          <select data-action="audio-set-voice">${voiceOpts}</select>
        </div>
        <div class="audio-setting">
          <span>PAUSE</span>
          ${pauseChips}
        </div>
        <div class="audio-setting">
          <span>AUTO-ADVANCE</span>
          <button class="chip ${state.audioAutoAdvance ? 'active' : ''}" data-action="audio-toggle-auto">
            ${state.audioAutoAdvance ? 'ON' : 'OFF'}
          </button>
        </div>
        <div class="audio-setting">
          <span>VOICE INPUT</span>
          <button class="chip ${state.voiceInputOn ? 'active' : ''}" data-action="audio-toggle-voice-input">
            ${state.voiceInputOn ? 'ON' : 'OFF'}
          </button>
        </div>
      </div>

      <div class="kbd-help">
        <span><span class="kbd">SPACE</span> PLAY/STOP</span>
        ${state.voiceInputOn && recognizer.available ? `<span><span class="kbd">M</span> MIC</span>` : ''}
        <span><span class="kbd">1</span> LEARNING</span>
        <span><span class="kbd">2</span> GOT IT</span>
        <span><span class="kbd">→</span> NEXT</span>
      </div>
    </div>
  `;
}

/* ---------- AUDIO SEQUENCER ---------- */

function audioPlayCurrent() {
  const card = currentCard();
  if (!card) return;

  audio.cancel();
  state.audioPhase = 'speaking-prompt';
  render();

  const promptText = audio.speakable(card.code, true);
  audio.speak(promptText, {
    onEnd: () => {
      // Move to pause phase
      state.audioPhase = 'pause';
      render();
      animatePauseRing(state.audioPauseSec, () => {
        // After pause, speak the answer
        if (state.audioPhase !== 'pause') return; // user interrupted
        state.audioPhase = 'speaking-answer';
        render();
        const answerText = audio.speakable(card.meaning, false);
        audio.speak(answerText, {
          onEnd: () => {
            state.audioPhase = 'answered';
            render();
          },
          onCancel: () => {
            state.audioPhase = 'idle';
            render();
          },
        });
      });
    },
    onCancel: () => {
      state.audioPhase = 'idle';
      render();
    },
  });
}

function animatePauseRing(seconds, onDone) {
  const total = seconds * 1000;
  const startedAt = Date.now();
  const tick = () => {
    if (state.audioPhase !== 'pause') return;
    const elapsed = Date.now() - startedAt;
    const remaining = Math.max(0, total - elapsed);
    const ringFill = document.getElementById('pause-ring-fill');
    const ringText = document.getElementById('pause-ring-text');
    if (ringFill) {
      const circumference = 163.36;
      const offset = circumference * (elapsed / total);
      ringFill.style.strokeDashoffset = Math.min(circumference, offset);
    }
    if (ringText) {
      ringText.textContent = Math.ceil(remaining / 1000);
    }
    if (remaining <= 0) {
      if (onDone) onDone();
    } else {
      requestAnimationFrame(tick);
    }
  };
  requestAnimationFrame(tick);
}

function audioStop() {
  audio.cancel();
  recognizer.stop();
  state.voiceListening = false;
  state.audioPhase = 'idle';
  render();
}

function audioSkipPause() {
  if (state.audioPhase !== 'pause') return;
  audio.cancel();
  // Trigger answer phase immediately
  const card = currentCard();
  if (!card) return;
  state.audioPhase = 'speaking-answer';
  render();
  const answerText = audio.speakable(card.meaning, false);
  audio.speak(answerText, {
    onEnd: () => {
      state.audioPhase = 'answered';
      render();
    },
    onCancel: () => {
      state.audioPhase = 'idle';
      render();
    },
  });
}

function audioMark(status) {
  markCurrent(status);
  audioAdvanceOrEnd();
}

function audioAdvanceOrEnd() {
  // Clear voice-input session state when moving on
  recognizer.stop();
  state.voiceListening = false;
  state.voiceHeard = null;
  state.voiceJudged = null;
  state.voiceError = null;

  if (state.index < state.deck.length - 1) {
    state.index++;
    state.audioPhase = 'idle';
    if (state.audioAutoAdvance) {
      render();
      // tiny delay so the new card paints before TTS starts
      setTimeout(() => audioPlayCurrent(), 200);
    } else {
      render();
    }
  } else {
    state.index = state.deck.length;
    state.audioPhase = 'idle';
    render();
  }
}

/* ---------- VOICE INPUT ---------- */

// Start listening for the user's spoken answer.
function voiceStartListening() {
  if (!recognizer.available) return;
  const card = currentCard();
  if (!card) return;

  state.voiceListening = true;
  state.voiceHeard = null;
  state.voiceJudged = null;
  state.voiceError = null;
  render();

  recognizer.start({
    onResult: (alternatives) => {
      // The recognizer gives several alternative transcripts; judge against
      // whichever one scores best, so a near-miss transcription still passes.
      const card2 = currentCard();
      if (!card2) return;
      const target = card2.meaning;        // audio mode always asks code -> meaning
      const targetCode = card2.code;

      let bestTranscript = alternatives[0] || '';
      let matched = false;

      for (const alt of alternatives) {
        const comparable = transcriptToComparable(alt);
        // Accept a match against the meaning OR the code (some users say the code back)
        if (isAnswerCorrect(comparable, target) || isAnswerCorrect(alt, target)
            || isAnswerCorrect(comparable, targetCode) || isAnswerCorrect(alt, targetCode)) {
          matched = true;
          bestTranscript = alt;
          break;
        }
      }

      state.voiceHeard = bestTranscript;
      state.voiceJudged = matched ? 'correct' : 'wrong';
      state.voiceListening = false;
      render();
    },
    onError: (reason) => {
      state.voiceError = reason;
      state.voiceListening = false;
      render();
    },
    onEnd: () => {
      // If recognition ended with no result and no error, just stop the spinner
      if (state.voiceListening) {
        state.voiceListening = false;
        render();
      }
    },
  });
}

function voiceToggleListening() {
  if (state.voiceListening) {
    recognizer.finish();   // finalize and transcribe, don't discard
    state.voiceListening = false;
    render();
  } else {
    voiceStartListening();
  }
}

// Apply the voice verdict: mark the card and advance, same as a manual mark.
function voiceAcceptVerdict() {
  if (!state.voiceJudged) return;
  const status = state.voiceJudged === 'correct' ? 'mastered' : 'learning';
  audioMark(status);
}

function renderEmpty() {
  return `
    <div class="empty-state">
      <h3>No cards available</h3>
      <p>Adjust your settings to include more cards.</p>
      <button class="empty-btn" data-action="home">Back to Home</button>
    </div>
  `;
}

function renderComplete() {
  const total = state.deck.length;
  const isMasteredReview = state.specialDeck === 'mastered';
  const stats = state.category ? getCategoryStats(state.category) : null;
  const masteredStats = isMasteredReview ? getMasteredStats() : null;
  const stillLearning = getStillLearningInRound();
  const masteredThisRound = state.deck.filter(c => state.roundResults[c.id] === 'mastered').length;
  const hasReview = stillLearning.length > 0;
  const isFinal = !hasReview && state.reviewRoundNum > 0;

  const heading = isFinal
    ? 'All Cards Mastered'
    : (state.reviewRoundNum > 0 ? `Review Round ${state.reviewRoundNum} Complete` : 'Round Complete');

  const subhead = isFinal
    ? `You've worked through all the cards you marked for review.`
    : (hasReview
        ? `${stillLearning.length} card${stillLearning.length === 1 ? '' : 's'} still need${stillLearning.length === 1 ? 's' : ''} review.`
        : `You've worked through all ${total} cards in this round.`);

  // Right-most stat depends on context
  const rightStat = isMasteredReview
    ? `<div class="cs total">
         <div class="cs-value mono">${masteredStats.total}</div>
         <div class="cs-label mono">Mastered Total</div>
       </div>`
    : `<div class="cs total">
         <div class="cs-value mono">${stats.mastered}/${stats.total}</div>
         <div class="cs-label mono">Overall</div>
       </div>`;

  return `
    <div class="complete-panel">
      <div class="complete-icon">${isFinal ? '★' : '✓'}</div>
      <h2>${heading}</h2>
      <p>${subhead}</p>
      <div class="complete-stats">
        ${state.mode !== 'flashcard' ? `
          <div class="cs correct">
            <div class="cs-value mono">${state.quizCorrect}</div>
            <div class="cs-label mono">Correct</div>
          </div>
          <div class="cs wrong">
            <div class="cs-value mono">${state.quizWrong}</div>
            <div class="cs-label mono">Wrong</div>
          </div>
          <div class="cs total">
            <div class="cs-value mono">${state.quizCorrect + state.quizWrong ? Math.round(state.quizCorrect / (state.quizCorrect + state.quizWrong) * 100) : 0}%</div>
            <div class="cs-label mono">Accuracy</div>
          </div>
        ` : `
          <div class="cs correct">
            <div class="cs-value mono">${masteredThisRound}</div>
            <div class="cs-label mono">Got It</div>
          </div>
          <div class="cs wrong">
            <div class="cs-value mono">${stillLearning.length}</div>
            <div class="cs-label mono">Still Learning</div>
          </div>
          ${rightStat}
        `}
      </div>
      <div class="complete-actions">
        ${hasReview ? `
          <button class="action-btn mastered" data-action="review-round">↻ REVIEW ${stillLearning.length} ${state.mode === 'flashcard' ? 'STILL LEARNING' : 'WRONG'}</button>
        ` : ''}
        <button class="action-btn learning" data-action="restart">↻ ${hasReview ? 'ENTIRE DECK' : 'REVIEW AGAIN'}</button>
        <button class="action-btn learning" data-action="home">← BACK TO HOME</button>
      </div>
    </div>
  `;
}
