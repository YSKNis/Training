<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PBSO Dispatch Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d13;
    --bg-2: #0f1420;
    --surface: #141a28;
    --surface-2: #1b2234;
    --surface-3: #252e44;
    --border: #2a3550;
    --border-strong: #3a4666;
    --text: #e8ecf3;
    --text-2: #b4bdd1;
    --text-muted: #7482a0;
    --amber: #f0b429;
    --amber-dim: #c8951d;
    --amber-glow: rgba(240, 180, 41, 0.2);
    --green: #4ade80;
    --green-dim: #22c55e;
    --red: #f87171;
    --red-dim: #ef4444;
    --blue: #60a5fa;
    --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.6);
    --radius: 10px;
    --radius-sm: 6px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(240, 180, 41, 0.04), transparent 50%),
      radial-gradient(circle at 90% 100%, rgba(96, 165, 250, 0.04), transparent 50%),
      linear-gradient(var(--bg), var(--bg));
  }

  /* Subtle scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 255, 255, 0.008) 2px,
      rgba(255, 255, 255, 0.008) 3px
    );
    z-index: 1;
  }

  .mono {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    font-feature-settings: "zero" on;
  }

  button {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  input {
    font-family: inherit;
    color: inherit;
  }

  /* ===== APP SHELL ===== */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    width: 100%;
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-2), var(--bg));
    padding: 10px 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  .status-bar .inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .status-right .divider {
    color: var(--border-strong);
  }

  /* ===== HOME VIEW ===== */
  .home {
    padding: 48px 0 80px;
    animation: fadeIn 0.5s var(--ease);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero {
    margin-bottom: 48px;
  }

  .hero-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hero-label::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--amber);
  }

  .hero h1 {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  .hero h1 .accent {
    color: var(--amber);
  }

  .hero p {
    color: var(--text-2);
    font-size: 17px;
    max-width: 620px;
  }

  .overall-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 32px 0 48px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
  }

  .overall-stats::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.4;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
  }

  .stat.mastered .stat-value { color: var(--green); }
  .stat.learning .stat-value { color: var(--amber); }

  .section-heading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .category-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    position: relative;
    overflow: hidden;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 180px;
  }

  .category-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--amber);
    width: var(--progress, 0%);
    transition: width 0.5s var(--ease);
  }

  .category-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    background: var(--surface-2);
  }

  .category-card:hover .category-arrow {
    transform: translateX(4px);
    color: var(--amber);
  }

  .category-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .category-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .category-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 2px;
  }

  .category-arrow {
    color: var(--text-muted);
    transition: all 0.2s var(--ease);
    font-size: 20px;
  }

  .category-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
  }

  .category-count .number {
    color: var(--text);
    font-weight: 600;
  }

  .progress-track {
    height: 4px;
    background: var(--surface-3);
    border-radius: 2px;
    overflow: hidden;
    margin-top: auto;
  }

  .progress-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.5s var(--ease);
  }

  .category-breakdown {
    display: flex;
    gap: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }

  .bd-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
  }

  .bd-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .bd-dot.mastered { background: var(--green); }
  .bd-dot.learning { background: var(--amber); }
  .bd-dot.unseen { background: var(--text-muted); opacity: 0.5; }

  /* ===== STUDY VIEW ===== */
  .study {
    padding: 24px 0 80px;
    animation: fadeIn 0.4s var(--ease);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .study-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    color: var(--text-2);
    transition: all 0.15s var(--ease);
  }

  .back-btn:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
    color: var(--text);
  }

  .study-title {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }

  .study-title-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .study-title-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .study-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    transition: all 0.15s var(--ease);
    position: relative;
  }

  .icon-btn:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
    color: var(--text);
  }

  .icon-btn.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(240, 180, 41, 0.08);
  }

  /* Mode tabs */
  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 28px;
  }

  .mode-tab {
    padding: 10px 14px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: all 0.15s var(--ease);
    text-align: center;
  }

  .mode-tab:hover {
    color: var(--text-2);
  }

  .mode-tab.active {
    background: var(--surface-3);
    color: var(--amber);
  }

  /* Progress strip */
  .progress-strip {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .review-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    background: rgba(240, 180, 41, 0.12);
    border: 1px solid var(--amber);
    border-radius: 12px;
    color: var(--amber);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .progress-strip .counter {
    color: var(--text);
    font-weight: 500;
  }

  .progress-strip .track {
    flex: 1;
    height: 2px;
    background: var(--surface-3);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-strip .fill {
    height: 100%;
    background: var(--amber);
    transition: width 0.3s var(--ease);
  }

  /* ===== FLASHCARD ===== */
  .card-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 420px;
    position: relative;
    perspective: 1500px;
  }

  .flashcard {
    width: 100%;
    max-width: 640px;
    height: 340px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s var(--ease);
    cursor: pointer;
  }

  .flashcard.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .card-face::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.3;
  }

  .card-face.back {
    transform: rotateY(180deg);
    background: var(--surface-2);
  }

  .card-face.back::before {
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }

  .card-label {
    position: absolute;
    top: 18px;
    left: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .card-mastery {
    position: absolute;
    top: 18px;
    right: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid;
  }

  .card-mastery.unseen {
    color: var(--text-muted);
    border-color: var(--border);
  }

  .card-mastery.learning {
    color: var(--amber);
    border-color: var(--amber);
    background: rgba(240, 180, 41, 0.08);
  }

  .card-mastery.mastered {
    color: var(--green);
    border-color: var(--green);
    background: rgba(74, 222, 128, 0.08);
  }

  .card-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--amber);
    margin-bottom: 12px;
    line-height: 1;
  }

  .card-meaning {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    line-height: 1.2;
    max-width: 520px;
  }

  .card-back-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 18px;
    letter-spacing: 0.05em;
  }

  .card-hint {
    position: absolute;
    bottom: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.7;
  }

  .card-actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 12px 22px;
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid;
  }

  .action-btn.learning {
    background: rgba(240, 180, 41, 0.08);
    border-color: var(--amber);
    color: var(--amber);
  }

  .action-btn.learning:hover {
    background: var(--amber);
    color: var(--bg);
  }

  .action-btn.mastered {
    background: rgba(74, 222, 128, 0.08);
    border-color: var(--green);
    color: var(--green);
  }

  .action-btn.mastered:hover {
    background: var(--green);
    color: var(--bg);
  }

  .action-btn .key {
    font-size: 9px;
    padding: 2px 5px;
    border: 1px solid currentColor;
    border-radius: 2px;
    opacity: 0.6;
  }

  .nav-arrows {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 640px;
    margin-top: 18px;
  }

  .nav-arrow {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-arrow:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }

  .nav-arrow:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ===== QUIZ VIEW ===== */
  .quiz-panel {
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    position: relative;
    animation: quizIn 0.3s var(--ease);
  }

  .quiz-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.3;
  }

  @keyframes quizIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quiz-prompt {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  .quiz-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(36px, 6vw, 54px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--amber);
    margin-bottom: 28px;
    line-height: 1;
    text-align: center;
    padding: 20px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }

  .quiz-options {
    display: grid;
    gap: 10px;
  }

  .quiz-option {
    padding: 16px 18px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: left;
    font-size: 15px;
    color: var(--text);
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: var(--surface-3);
    transform: translateX(2px);
  }

  .quiz-option .opt-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .quiz-option.correct {
    border-color: var(--green);
    background: rgba(74, 222, 128, 0.1);
    color: var(--green);
  }

  .quiz-option.correct .opt-key {
    border-color: var(--green);
    color: var(--green);
  }

  .quiz-option.incorrect {
    border-color: var(--red);
    background: rgba(248, 113, 113, 0.1);
    color: var(--red);
  }

  .quiz-option.incorrect .opt-key {
    border-color: var(--red);
    color: var(--red);
  }

  .quiz-option:disabled {
    cursor: default;
  }

  .quiz-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 16px;
  }

  .quiz-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .quiz-score .num {
    color: var(--text);
    font-weight: 600;
  }

  .quiz-score .correct-num { color: var(--green); }
  .quiz-score .wrong-num { color: var(--red); }

  .next-btn {
    padding: 11px 22px;
    background: var(--amber);
    color: var(--bg);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-btn:hover {
    background: #ffc94d;
    transform: translateX(2px);
  }

  /* ===== TYPE MODE ===== */
  .type-input-row {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }

  .type-input {
    flex: 1;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s var(--ease);
  }

  .type-input:focus {
    border-color: var(--amber);
  }

  .type-input.correct {
    border-color: var(--green);
    color: var(--green);
  }

  .type-input.incorrect {
    border-color: var(--red);
  }

  .type-feedback {
    margin-top: 20px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    display: none;
    font-size: 14px;
    animation: quizIn 0.2s var(--ease);
  }

  .type-feedback.show { display: block; }

  .type-feedback.correct {
    background: rgba(74, 222, 128, 0.08);
    border: 1px solid var(--green);
    color: var(--green);
  }

  .type-feedback.incorrect {
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid var(--red);
    color: var(--red);
  }

  .type-feedback .fb-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.85;
  }

  .type-feedback .fb-answer {
    color: var(--text);
    font-weight: 500;
  }

  .type-feedback .fb-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 14px;
    flex-wrap: wrap;
  }

  .type-feedback .fb-content {
    flex: 1;
    min-width: 0;
  }

  .override-btn {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid currentColor;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: inherit;
    opacity: 0.75;
    transition: all 0.15s var(--ease);
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .override-btn:hover {
    opacity: 1;
    background: currentColor;
  }

  .override-btn:hover .override-btn-text {
    color: var(--bg);
  }

  .override-btn-text {
    color: inherit;
    transition: color 0.15s var(--ease);
  }

  .override-applied {
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .submit-btn {
    padding: 14px 22px;
    background: var(--surface-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
  }

  .submit-btn:hover {
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
  }

  /* ===== AUDIO MODE ===== */
  .audio-stage {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  .audio-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
  }

  .audio-display::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    opacity: 0.3;
  }

  .audio-phase-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 16px;
  }

  .audio-phase-label.speaking { color: var(--amber); }
  .audio-phase-label.pause { color: var(--blue); }
  .audio-phase-label.answered { color: var(--green); }

  .audio-phase-label .indicator {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .audio-phase-label.speaking .indicator {
    animation: pulse 0.8s infinite;
    box-shadow: 0 0 8px currentColor;
  }

  /* Animated waveform when speaking */
  /* ===== VOICE INPUT ===== */
  .voice-panel {
    margin-top: 18px;
    padding: 18px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .voice-mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--surface-3);
    border: 2px solid var(--border-strong);
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s var(--ease);
    cursor: pointer;
    position: relative;
  }

  .voice-mic-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
  }

  .voice-mic-btn.listening {
    border-color: var(--red);
    color: var(--red);
    background: rgba(248, 113, 113, 0.1);
  }

  .voice-mic-btn.listening::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--red);
    opacity: 0.6;
    animation: voicePulse 1.4s ease-out infinite;
  }

  @keyframes voicePulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  .voice-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
  }

  .voice-status.listening { color: var(--red); }

  .voice-heard {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
    animation: quizIn 0.2s var(--ease);
  }

  .voice-heard.correct { border-color: var(--green); }
  .voice-heard.wrong { border-color: var(--red); }

  .voice-heard-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .voice-heard-text {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
  }

  .voice-heard-verdict {
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .voice-heard-verdict.correct { color: var(--green); }
  .voice-heard-verdict.wrong { color: var(--red); }

  .voice-error {
    width: 100%;
    padding: 12px 14px;
    background: rgba(240, 180, 41, 0.08);
    border: 1px solid var(--amber);
    border-radius: var(--radius-sm);
    color: var(--amber);
    font-size: 12px;
    text-align: center;
  }

  .voice-unsupported {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.5;
  }

  .audio-waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 50px;
    margin: 0 auto;
  }

  .audio-waveform .bar {
    width: 4px;
    background: var(--amber);
    border-radius: 2px;
    height: 8px;
    transition: height 0.15s var(--ease);
  }

  .audio-waveform.active .bar {
    animation: wave 1s ease-in-out infinite;
  }

  .audio-waveform .bar:nth-child(1) { animation-delay: 0.0s; }
  .audio-waveform .bar:nth-child(2) { animation-delay: 0.1s; }
  .audio-waveform .bar:nth-child(3) { animation-delay: 0.2s; }
  .audio-waveform .bar:nth-child(4) { animation-delay: 0.3s; }
  .audio-waveform .bar:nth-child(5) { animation-delay: 0.4s; }
  .audio-waveform .bar:nth-child(6) { animation-delay: 0.5s; }
  .audio-waveform .bar:nth-child(7) { animation-delay: 0.6s; }

  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 38px; }
  }

  /* Pause countdown ring */
  .pause-ring {
    width: 60px;
    height: 60px;
    margin: 0 auto;
    position: relative;
  }

  .pause-ring svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .pause-ring .ring-bg {
    fill: none;
    stroke: var(--surface-3);
    stroke-width: 4;
  }

  .pause-ring .ring-fill {
    fill: none;
    stroke: var(--blue);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.1s linear;
  }

  .pause-ring .ring-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--blue);
  }

  .audio-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(36px, 7vw, 60px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--amber);
    line-height: 1;
  }

  .audio-meaning {
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    max-width: 520px;
    margin: 0 auto;
  }

  .audio-meaning.hidden {
    color: var(--text-muted);
    font-style: italic;
    font-size: 16px;
    font-weight: 400;
  }

  .audio-controls {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .audio-btn {
    padding: 12px 22px;
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid;
  }

  .audio-btn.primary {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    font-weight: 600;
  }

  .audio-btn.primary:hover {
    background: #ffc94d;
    transform: translateY(-1px);
  }

  .audio-btn.secondary {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-2);
  }

  .audio-btn.secondary:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }

  .audio-btn.learning {
    background: rgba(240, 180, 41, 0.08);
    border-color: var(--amber);
    color: var(--amber);
  }

  .audio-btn.learning:hover {
    background: var(--amber);
    color: var(--bg);
  }

  .audio-btn.mastered {
    background: rgba(74, 222, 128, 0.08);
    border-color: var(--green);
    color: var(--green);
  }

  .audio-btn.mastered:hover {
    background: var(--green);
    color: var(--bg);
  }

  .audio-settings {
    margin-top: 18px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    align-items: center;
  }

  .audio-setting {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .audio-setting select,
  .audio-setting button.chip {
    background: var(--surface-2);
    color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
  }

  .audio-setting button.chip:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }

  .audio-setting button.chip.active {
    background: rgba(240, 180, 41, 0.12);
    border-color: var(--amber);
    color: var(--amber);
  }

  .audio-unsupported {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }

  .audio-unsupported h3 {
    color: var(--text);
    font-size: 18px;
    margin-bottom: 8px;
  }

  /* ===== SETTINGS PANEL ===== */
  .settings-panel {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface-2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 8px;
    min-width: 240px;
    box-shadow: var(--shadow);
    z-index: 100;
    display: none;
    animation: quizIn 0.15s var(--ease);
  }

  .settings-panel.open { display: block; }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.1s var(--ease);
    font-size: 13px;
  }

  .setting-row:hover {
    background: var(--surface-3);
  }

  .setting-row .toggle {
    width: 32px;
    height: 18px;
    background: var(--surface-3);
    border-radius: 9px;
    position: relative;
    transition: background 0.15s var(--ease);
    flex-shrink: 0;
  }

  .setting-row .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: all 0.15s var(--ease);
  }

  .setting-row.on .toggle {
    background: var(--amber);
  }

  .setting-row.on .toggle::after {
    left: 16px;
    background: var(--bg);
  }

  .setting-sep {
    height: 1px;
    background: var(--border);
    margin: 6px 4px;
  }

  .setting-row.danger {
    color: var(--red);
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state h3 {
    color: var(--text);
    margin-bottom: 8px;
    font-size: 20px;
  }

  .empty-state p {
    margin-bottom: 20px;
  }

  .empty-btn {
    padding: 10px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
  }

  .empty-btn:hover {
    border-color: var(--amber);
    color: var(--amber);
  }

  /* ===== KEYBOARD HELP ===== */
  .kbd-help {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 28px;
    flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .kbd-help span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kbd-help .kbd {
    padding: 2px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-2);
  }

  /* ===== COMPLETION ===== */
  .complete-panel {
    max-width: 520px;
    margin: 0 auto;
    text-align: center;
    padding: 48px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    animation: quizIn 0.4s var(--ease);
  }

  .complete-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .complete-panel h2 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .complete-panel p {
    color: var(--text-2);
    margin-bottom: 28px;
  }

  .complete-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
    padding: 20px;
    background: var(--bg);
    border-radius: var(--radius-sm);
  }

  .cs {
    text-align: center;
  }

  .cs-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .cs.correct .cs-value { color: var(--green); }
  .cs.wrong .cs-value { color: var(--red); }
  .cs.total .cs-value { color: var(--amber); }

  .cs-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .complete-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ===== TEST CARD (HOME) ===== */
  .test-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    transition: all 0.2s var(--ease);
    position: relative;
    overflow: hidden;
  }

  .test-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 3px;
    background: var(--blue);
    opacity: 0.6;
  }

  .test-card:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }

  .test-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(96, 165, 250, 0.1);
    color: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--blue);
  }

  .test-btn {
    padding: 11px 18px;
    background: transparent;
    border: 1px solid var(--blue);
    border-radius: var(--radius-sm);
    color: var(--blue);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    white-space: nowrap;
    flex-shrink: 0;
    cursor: pointer;
  }

  .test-btn:hover {
    background: var(--blue);
    color: var(--bg);
  }

  /* Test config view */
  .test-config { max-width: 720px; margin: 0 auto; padding: 32px 0 60px; animation: fadeIn 0.4s var(--ease); }
  .test-config h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
  .test-config-sub { color: var(--text-2); margin-bottom: 36px; }
  .config-section { margin-bottom: 32px; }
  .config-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
  }
  .config-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .config-options { display: grid; gap: 8px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .config-opt {
    padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); text-align: left; color: var(--text-2);
    transition: all 0.15s var(--ease); cursor: pointer;
    display: flex; flex-direction: column; gap: 2px; font-size: 14px;
  }
  .config-opt:hover { border-color: var(--border-strong); color: var(--text); }
  .config-opt.active {
    background: rgba(96, 165, 250, 0.08); border-color: var(--blue); color: var(--blue);
  }
  .config-opt .opt-sub {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.05em;
  }
  .config-opt.active .opt-sub { color: var(--blue); opacity: 0.7; }
  .config-actions { display: flex; gap: 12px; margin-top: 40px; flex-wrap: wrap; }
  .start-test-btn {
    flex: 1; min-width: 200px; padding: 16px 24px; background: var(--blue);
    color: var(--bg); border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase; transition: all 0.15s var(--ease);
  }
  .start-test-btn:hover { background: #82baff; transform: translateY(-1px); }

  /* Test running */
  .test-running { padding: 24px 0 80px; animation: fadeIn 0.4s var(--ease); }
  .test-running-header {
    background: var(--bg); padding: 16px 0; margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
  }
  .test-info { display: flex; flex-direction: column; gap: 4px; }
  .test-info-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }
  .test-info-name { font-size: 18px; font-weight: 600; }
  .test-meta {
    display: flex; gap: 18px; align-items: center;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-2);
  }
  .test-meta .answered-count { color: var(--text); }
  .test-meta .answered-count.complete { color: var(--green); }
  .test-meta .timer { color: var(--blue); }
  .test-questions {
    display: flex; flex-direction: column; gap: 12px;
    max-width: 760px; margin: 0 auto;
  }
  .test-q {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    transition: border-color 0.15s var(--ease);
    display: grid; grid-template-columns: 40px 1fr 240px;
    gap: 18px; align-items: center;
  }
  /* Stacked layout for MC and T/F questions */
  .test-q.test-q-mc, .test-q.test-q-tf {
    display: block;
    padding: 18px 20px;
  }
  .test-q.test-q-mc .test-q-header,
  .test-q.test-q-tf .test-q-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .test-q-type-badge {
    display: inline-block;
    padding: 3px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .test-q-type-badge.mc { color: var(--blue); border-color: var(--blue); background: rgba(96, 165, 250, 0.08); }
  .test-q-type-badge.tf { color: var(--amber); border-color: var(--amber); background: rgba(240, 180, 41, 0.08); }
  .test-q-type-badge.fill { color: var(--green); border-color: var(--green); background: rgba(74, 222, 128, 0.08); }

  .test-q-cat-badge {
    display: inline-block;
    padding: 3px 8px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-2);
    flex-shrink: 0;
  }

  .test-q-mc-statement {
    font-size: 16px;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .test-q-mc-statement .code {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--amber);
  }
  .test-q-mc-options {
    display: grid;
    gap: 8px;
  }
  .test-q-mc-option {
    padding: 12px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: left;
    font-size: 14px;
    color: var(--text);
    transition: all 0.12s var(--ease);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .test-q-mc-option:hover {
    border-color: var(--border-strong);
    background: var(--surface-3);
  }
  .test-q-mc-option.selected {
    border-color: var(--blue);
    background: rgba(96, 165, 250, 0.12);
    color: var(--blue);
  }
  .test-q-mc-option .opt-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 7px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 24px;
    text-align: center;
  }
  .test-q-mc-option.selected .opt-letter {
    border-color: var(--blue);
    color: var(--blue);
  }

  .test-q-tf-statement {
    font-size: 17px;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 12px;
  }
  .test-q-tf-statement .code {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    color: var(--amber);
  }
  .test-q-tf-statement .claim {
    font-weight: 500;
  }
  .test-q-tf-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .test-q-tf-option {
    padding: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-2);
    transition: all 0.12s var(--ease);
    cursor: pointer;
    text-align: center;
  }
  .test-q-tf-option:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }
  .test-q-tf-option.selected.true {
    border-color: var(--green);
    background: rgba(74, 222, 128, 0.12);
    color: var(--green);
  }
  .test-q-tf-option.selected.false {
    border-color: var(--red);
    background: rgba(248, 113, 113, 0.12);
    color: var(--red);
  }

  /* Slider for question count */
  .slider-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 14px;
  }
  .slider-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: -0.02em;
    min-width: 100px;
    flex-shrink: 0;
  }
  .slider-value-suffix {
    font-size: 14px;
    color: var(--text-muted);
    margin-left: 6px;
  }
  .test-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--surface-3);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .test-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--blue);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--blue);
    cursor: pointer;
    transition: transform 0.1s var(--ease);
  }
  .test-slider::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
  .test-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--blue);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 1px var(--blue);
    cursor: pointer;
  }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 8px;
  }
  .slider-all-btn {
    margin-top: 14px;
    padding: 10px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s var(--ease);
    width: 100%;
  }
  .slider-all-btn:hover {
    border-color: var(--border-strong);
    color: var(--text);
  }
  .slider-all-btn.active {
    background: rgba(96, 165, 250, 0.1);
    border-color: var(--blue);
    color: var(--blue);
  }
  .slider-breakdown {
    margin-top: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }
  .slider-breakdown .bd-pill {
    display: inline-block;
    margin-right: 12px;
  }
  .slider-breakdown .bd-pill .num {
    color: var(--text);
    font-weight: 600;
  }
  .slider-breakdown .bd-pill.fill .num { color: var(--green); }
  .slider-breakdown .bd-pill.mc .num { color: var(--blue); }
  .slider-breakdown .bd-pill.tf .num { color: var(--amber); }

  /* Type-mix sliders */
  .type-mix-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .type-mix-row:last-of-type { margin-bottom: 0; }
  .type-mix-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .type-mix-label .bd-pill {
    display: inline-block;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface-2);
  }
  .type-mix-label .bd-pill .num { font-weight: 600; margin-right: 4px; }
  .type-mix-label .bd-pill.fill .num { color: var(--green); }
  .type-mix-label .bd-pill.mc .num { color: var(--blue); }
  .type-mix-label .bd-pill.tf .num { color: var(--amber); }
  .type-mix-slider::-webkit-slider-thumb { background: var(--text-2); box-shadow: 0 0 0 1px var(--text-2); }
  .type-mix-slider::-moz-range-thumb { background: var(--text-2); box-shadow: 0 0 0 1px var(--text-2); }
  .type-mix-sum {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-align: center;
  }
  @media (max-width: 600px) {
    .type-mix-row { grid-template-columns: 1fr; gap: 6px; }
  }

  .test-q:focus-within { border-color: var(--blue); }
  .test-q.answered { background: var(--surface-2); }
  .test-q-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text-muted); text-align: right;
  }
  .test-q-prompt { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .test-q-prompt-code {
    font-family: 'IBM Plex Mono', monospace; font-size: 18px;
    font-weight: 600; color: var(--amber); flex-shrink: 0;
  }
  .test-q-prompt-text {
    font-size: 15px; font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .test-q-input {
    width: 100%; padding: 10px 12px; background: var(--bg);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif; outline: none;
    transition: border-color 0.15s var(--ease);
  }
  .test-q-input:focus { border-color: var(--blue); }
  .test-submit-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
    gap: 16px; flex-wrap: wrap;
    max-width: 760px; margin-left: auto; margin-right: auto;
  }
  .submit-test-btn {
    padding: 14px 32px; background: var(--blue); color: var(--bg);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    transition: all 0.15s var(--ease);
  }
  .submit-test-btn:hover { background: #82baff; transform: translateY(-1px); }

  /* Test results */
  .test-results { padding: 24px 0 80px; animation: fadeIn 0.4s var(--ease); max-width: 760px; margin: 0 auto; }
  .results-summary {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 32px; margin-bottom: 32px;
    text-align: center; position: relative; overflow: hidden;
  }
  .results-summary::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    opacity: 0.5;
  }
  .results-grade {
    font-family: 'IBM Plex Mono', monospace; font-size: 72px; font-weight: 600;
    letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px;
  }
  .results-grade.pass { color: var(--green); }
  .results-grade.partial { color: var(--amber); }
  .results-grade.fail { color: var(--red); }
  .results-headline { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .results-subhead { color: var(--text-2); margin-bottom: 24px; }
  .results-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding-top: 24px; border-top: 1px solid var(--border);
  }
  .results-stat { display: flex; flex-direction: column; gap: 4px; }
  .results-stat-value {
    font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600;
  }
  .results-stat-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);
  }
  .results-section-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
  }
  .results-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .results-q {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; margin-bottom: 8px;
    display: grid; grid-template-columns: 40px 1fr auto;
    gap: 16px; align-items: center;
  }
  .results-q.correct { border-left-color: var(--green); }
  .results-q.wrong { border-left-color: var(--red); }
  .results-q.unanswered { border-left-color: var(--text-muted); opacity: 0.7; }
  .results-q-num {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text-muted); text-align: right;
  }
  .results-q-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .results-q-prompt { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .results-q-prompt-code {
    font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    font-weight: 600; color: var(--amber);
  }
  .results-q-prompt-text { color: var(--text-2); font-size: 13px; }
  .results-q-answers { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; }
  .results-q-answers .label {
    font-family: 'IBM Plex Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-muted); margin-right: 6px;
  }
  .results-q-answers .your { color: var(--text); }
  .results-q-answers .your.correct-text { color: var(--green); }
  .results-q-answers .your.wrong-text { color: var(--red); }
  .results-q-answers .right { color: var(--green); }
  .results-q-answers .none { color: var(--text-muted); font-style: italic; }
  .results-q-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .results-override-btn {
    padding: 5px 10px; background: transparent; border: 1px solid currentColor;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-muted); opacity: 0.7;
    transition: all 0.15s var(--ease); white-space: nowrap;
  }
  .results-override-btn:hover { opacity: 1; color: var(--text); }
  .results-q.overridden { background: var(--surface-2); }
  .results-q.overridden .results-q-num::after {
    content: '↻'; margin-left: 4px; color: var(--amber);
  }
  .results-actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
  .results-action-btn {
    padding: 12px 22px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    transition: all 0.15s var(--ease);
  }
  .results-action-btn:hover { border-color: var(--blue); color: var(--blue); }
  .results-action-btn.primary {
    background: var(--blue); color: var(--bg); border-color: var(--blue);
  }
  .results-action-btn.primary:hover { background: #82baff; }
  .test-history { margin-top: 40px; }
  .history-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 16px;
    padding: 12px 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-bottom: 6px; font-size: 13px; align-items: center;
  }
  .history-row .h-meta {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.05em;
  }
  .history-row .h-score {
    font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    font-weight: 600; min-width: 70px; text-align: right;
  }
  .history-row .h-score.pass { color: var(--green); }
  .history-row .h-score.partial { color: var(--amber); }
  .history-row .h-score.fail { color: var(--red); }
  .history-row .h-pct {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    color: var(--text-2); min-width: 50px; text-align: right;
  }

  /* ===== REVIEW MASTERED CARD (HOME) ===== */
  .mastered-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    transition: all 0.2s var(--ease);
    position: relative;
    overflow: hidden;
  }

  .mastered-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 3px;
    background: var(--green);
    opacity: 0.6;
  }

  .mastered-card:hover {
    border-color: var(--border-strong);
    background: var(--surface-2);
  }

  .mastered-card.disabled {
    opacity: 0.55;
  }

  .mastered-card.disabled:hover {
    border-color: var(--border);
    background: var(--surface);
  }

  .mc-left {
    display: flex;
    align-items: center;
    gap: 16px;
    flex: 1;
    min-width: 0;
  }

  .mc-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(74, 222, 128, 0.1);
    color: var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--green);
  }

  .mc-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .mc-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .mc-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.005em;
  }

  .mc-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
  }

  .mc-btn {
    padding: 11px 18px;
    background: transparent;
    border: 1px solid var(--green);
    border-radius: var(--radius-sm);
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .mc-btn:hover {
    background: var(--green);
    color: var(--bg);
  }

  .mc-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--text-muted);
  }

  .mc-btn:disabled:hover {
    background: transparent;
    color: var(--text-muted);
  }

  /* ===== DAILY DRILL CARD (HOME) ===== */
  .daily-card {
    background:
      radial-gradient(circle at 92% 0%, rgba(240, 180, 41, 0.18), transparent 38%),
      linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 36px;
    position: relative;
    transition: all 0.2s var(--ease);
  }

  .daily-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--amber), var(--amber-dim), var(--amber));
    opacity: 0.6;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .daily-card:hover {
    background:
      radial-gradient(circle at 92% 0%, rgba(240, 180, 41, 0.26), transparent 40%),
      linear-gradient(135deg, var(--surface-2) 0%, var(--surface) 100%);
  }

  .daily-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 18px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .daily-head-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .daily-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .daily-label::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 10px var(--amber);
    animation: pulse 2s infinite;
  }

  .daily-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .daily-subtitle {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 4px;
  }

  .daily-streak {
    text-align: right;
    padding-left: 16px;
    border-left: 1px solid var(--border);
  }

  .streak-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 38px;
    font-weight: 600;
    color: var(--amber);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .streak-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .daily-progress-rows {
    display: grid;
    gap: 14px;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }

  .dp-row {
    display: grid;
    grid-template-columns: 130px 1fr auto;
    gap: 14px;
    align-items: center;
  }

  .dp-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .dp-track {
    height: 6px;
    background: var(--surface-3);
    border-radius: 3px;
    overflow: hidden;
  }

  .dp-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 3px;
    transition: width 0.5s var(--ease);
  }

  .dp-fill.complete { background: var(--green); }

  .dp-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    min-width: 48px;
    text-align: right;
  }

  .daily-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .daily-start-btn {
    flex: 1;
    min-width: 200px;
    padding: 14px 22px;
    background: var(--amber);
    color: var(--bg);
    border-radius: var(--radius-sm);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all 0.15s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .daily-start-btn:hover {
    background: #ffc94d;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px -8px var(--amber);
  }

  .daily-start-btn.complete {
    background: var(--green);
  }

  .daily-start-btn.complete:hover {
    background: #6ee893;
    box-shadow: 0 8px 20px -8px var(--green);
  }

  .daily-cog {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    transition: all 0.15s var(--ease);
    position: relative;
  }

  .daily-cog:hover {
    border-color: var(--amber);
    color: var(--amber);
  }

  .daily-cog .settings-panel {
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
  }

  .daily-cog-wrap .settings-panel {
    min-width: 280px;
    max-height: calc(100vh - 200px);
    overflow-y: auto;
  }

  .daily-complete-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(74, 222, 128, 0.1);
    border: 1px solid var(--green);
    border-radius: 12px;
    color: var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .cards-per-day-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-top: 6px;
  }

  .cpd-opt {
    padding: 8px 4px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
    text-align: center;
    transition: all 0.1s var(--ease);
  }

  .cpd-opt:hover { border-color: var(--border-strong); color: var(--text); }
  .cpd-opt.active {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
    font-weight: 600;
  }

  .category-chips {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }

  .cat-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 8px 10px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    color: var(--text-muted);
    transition: all 0.1s var(--ease);
    text-align: left;
    min-width: 0;
  }

  .cat-chip:hover {
    border-color: var(--border-strong);
    color: var(--text-2);
  }

  .cat-chip.active {
    background: rgba(240, 180, 41, 0.12);
    border-color: var(--amber);
    color: var(--amber);
  }

  .cat-chip-name {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cat-chip-count {
    font-size: 10px;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .cat-chip.active .cat-chip-count {
    opacity: 1;
  }

  .filter-note {
    padding: 8px 12px 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .setting-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 8px 12px 4px;
  }

  /* Daily card-info chip on flashcard/quiz */
  .daily-source-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 9px;
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-left: 8px;
  }

  /* ===== MOBILE ===== */
  @media (max-width: 640px) {
    .container {
      padding: 0 16px;
    }

    .home {
      padding: 32px 0 60px;
    }

    .hero h1 {
      font-size: 32px;
    }

    .overall-stats {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
    }

    .category-grid {
      grid-template-columns: 1fr;
    }

    .flashcard {
      height: 300px;
    }

    .card-face {
      padding: 28px 20px;
    }

    .quiz-panel {
      padding: 24px 18px;
    }

    .mode-tabs .mode-tab {
      padding: 10px 8px;
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    .kbd-help { display: none; }

    .study-header {
      gap: 12px;
    }

    .study-title-name {
      font-size: 17px;
    }

    .daily-card { padding: 22px 18px; }
    .daily-title { font-size: 22px; }
    .streak-num { font-size: 32px; }
    .dp-row {
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .dp-row .dp-track {
      grid-column: 1 / -1;
      order: 3;
    }
    .daily-streak {
      padding-left: 12px;
    }

    .mastered-card {
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      padding: 18px;
    }
    .mc-btn { width: 100%; text-align: center; }

    .test-card {
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
      padding: 18px;
    }
    .test-btn { width: 100%; text-align: center; }
    .test-q {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .test-q-num { text-align: left; }
    .test-q-input { width: 100%; }
    .results-q { grid-template-columns: 30px 1fr; }
    .results-q-actions { grid-column: 1 / -1; justify-content: flex-end; }
    .results-stats { grid-template-columns: repeat(2, 1fr); }
    .results-grade { font-size: 56px; }
    .config-options { grid-template-columns: 1fr 1fr; }
  }

  /* Hide scrollbar but allow scroll */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

const ALL_CARDS = {};
for (const key in CATEGORIES) {
  ALL_CARDS[key] = CATEGORIES[key].items.map(([code, meaning]) => ({
    id: `${key}:${code}`,
    category: key,
    code,
    meaning,
  }));
}

/* ============================================================
   STORAGE — window.storage with graceful fallback
   ============================================================ */

const DEFAULT_DAILY = () => ({
  cardsPerDay: 10,
  enabledCategories: Object.keys(CATEGORIES),  // which categories to pull daily cards from
  currentDate: null,        // 'YYYY-MM-DD' the day current set was generated
  currentCards: [],         // [cardId] in today's set
  flashcardSeen: {},        // { cardId: true } flipped & marked today
  quizAnswered: {},         // { cardId: 'correct' | 'wrong' } answered today
  assigned: {},             // { cardId: 'YYYY-MM-DD' last time assigned }
  streak: 0,
  lastCompletedDate: null,  // 'YYYY-MM-DD'
  totalDaysCompleted: 0,
  batchesToday: 1,          // how many sets they've done today (for "next batch")
});

const STORAGE_KEY = 'pbso-data';

const storage = {
  data: { mastery: {}, settings: {}, daily: DEFAULT_DAILY() },
  ready: false,

  async load() {
    let raw = null;

    // Try Claude artifact storage first
    try {
      if (window.storage && typeof window.storage.get === 'function') {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) raw = result.value;
      }
    } catch (e) { /* fall through */ }

    // Fall back to localStorage (works in any browser, including downloaded HTML)
    if (!raw) {
      try {
        raw = localStorage.getItem(STORAGE_KEY);
      } catch (e) { /* localStorage unavailable */ }
    }

    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') this.data = parsed;
      } catch (e) { /* corrupted data, ignore */ }
    }

    if (!this.data.mastery) this.data.mastery = {};
    if (!this.data.settings) this.data.settings = {};
    if (!this.data.daily) {
      this.data.daily = DEFAULT_DAILY();
    } else {
      // Backfill any missing fields (forward-compatibility)
      const def = DEFAULT_DAILY();
      for (const k in def) {
        if (this.data.daily[k] === undefined) this.data.daily[k] = def[k];
      }
    }
    // Hydrate persistent UI preferences into state
    if (typeof this.data.settings.shuffleOn === 'boolean') {
      state.shuffleOn = this.data.settings.shuffleOn;
    }
    if (typeof this.data.settings.reversed === 'boolean') {
      state.reversed = this.data.settings.reversed;
    }
    if (this.data.settings.testConfig && typeof this.data.settings.testConfig === 'object') {
      state.testConfig = { ...state.testConfig, ...this.data.settings.testConfig };
      // Backward compat: if loaded config has fillInPercent but no typeMix,
      // derive the typeMix from it (rest split evenly between MC and T/F).
      if (!state.testConfig.typeMix || typeof state.testConfig.typeMix !== 'object') {
        const fill = Math.max(0, Math.min(100, Number(state.testConfig.fillInPercent ?? 30)));
        const remaining = 100 - fill;
        const mc = Math.ceil(remaining / 2);
        const tf = remaining - mc;
        state.testConfig.typeMix = { fill, mc, tf };
      }
    }
    if (typeof this.data.settings.voiceInputOn === 'boolean') {
      state.voiceInputOn = this.data.settings.voiceInputOn;
    }
    this.ready = true;
  },

  async save() {
    const json = JSON.stringify(this.data);
    // Save to both backends for redundancy & cross-context portability
    try {
      if (window.storage && typeof window.storage.set === 'function') {
        await window.storage.set(STORAGE_KEY, json);
      }
    } catch (e) { /* ignore */ }
    try {
      localStorage.setItem(STORAGE_KEY, json);
    } catch (e) { /* ignore */ }
  },

  getMastery(cardId) {
    return this.data.mastery[cardId] || 'unseen';
  },

  setMastery(cardId, status) {
    if (status === 'unseen') {
      delete this.data.mastery[cardId];
    } else {
      this.data.mastery[cardId] = status;
    }
    this.save();
  },

  resetCategory(categoryId) {
    const prefix = `${categoryId}:`;
    for (const key in this.data.mastery) {
      if (key.startsWith(prefix)) delete this.data.mastery[key];
    }
    this.save();
  },

  resetAll() {
    this.data.mastery = {};
    this.save();
  },

  /* ---- UI preferences ---- */

  setShuffle(on) {
    this.data.settings.shuffleOn = on;
    this.save();
  },

  setReversed(on) {
    this.data.settings.reversed = on;
    this.save();
  },

  /* ---- Test methods ---- */

  getTestConfig() {
    return this.data.settings.testConfig || null;
  },

  saveTestConfig(cfg) {
    this.data.settings.testConfig = { ...cfg };
    this.save();
  },

  getTestHistory() {
    return this.data.testHistory || [];
  },

  // Save a completed test result; cap history at 20 entries
  pushTestResult(entry) {
    if (!this.data.testHistory) this.data.testHistory = [];
    this.data.testHistory.unshift(entry);
    if (this.data.testHistory.length > 20) {
      this.data.testHistory = this.data.testHistory.slice(0, 20);
    }
    this.save();
  },

  clearTestHistory() {
    this.data.testHistory = [];
    this.save();
  },

  /* ---- Daily methods ---- */

  getDaily() {
    return this.data.daily;
  },

  setCardsPerDay(n) {
    this.data.daily.cardsPerDay = n;
    this.save();
  },

  // Toggle a category in the daily filter. Returns true if toggled, false if refused
  // (we always require at least one enabled category).
  toggleCategory(categoryId) {
    const enabled = this.data.daily.enabledCategories || Object.keys(CATEGORIES);
    let next;
    if (enabled.includes(categoryId)) {
      next = enabled.filter(c => c !== categoryId);
      if (next.length === 0) return false; // refuse — must keep at least one
    } else {
      next = [...enabled, categoryId];
    }
    this.data.daily.enabledCategories = next;
    this.save();
    return true;
  },

  // Generate a new set for today (or another batch)
  generateDailySet(isNewDay) {
    const d = this.data.daily;
    const today = todayString();
    const cards = pickDailyCards(d.cardsPerDay);

    d.currentDate = today;
    d.currentCards = cards.map(c => c.id);
    d.flashcardSeen = {};
    d.quizAnswered = {};

    if (isNewDay) {
      d.batchesToday = 1;
    } else {
      d.batchesToday = (d.batchesToday || 0) + 1;
    }

    // Mark these cards as assigned today
    for (const c of cards) {
      d.assigned[c.id] = today;
    }
    this.save();
    return cards;
  },

  // Make sure today's session is initialized; rolls over if it's a new day
  ensureDailySession() {
    const d = this.data.daily;
    const today = todayString();
    if (d.currentDate !== today) {
      this.generateDailySet(true);
    } else if (!d.currentCards || d.currentCards.length === 0) {
      this.generateDailySet(true);
    }
  },

  startNewBatch() {
    this.generateDailySet(false);
  },

  markFlashcardSeen(cardId) {
    this.data.daily.flashcardSeen[cardId] = true;
    this.checkDailyCompletion();
    this.save();
  },

  markQuizAnswered(cardId, correct) {
    this.data.daily.quizAnswered[cardId] = correct ? 'correct' : 'wrong';
    this.checkDailyCompletion();
    this.save();
  },

  // Check if today's set is complete in any mode and update streak if so
  checkDailyCompletion() {
    const d = this.data.daily;
    const today = todayString();
    const ids = d.currentCards || [];
    if (ids.length === 0) return;

    const flashcardDone = ids.every(id => d.flashcardSeen[id]);
    const quizDone = ids.every(id => d.quizAnswered[id]);
    const completedAnyMode = flashcardDone || quizDone;

    if (completedAnyMode && d.lastCompletedDate !== today) {
      // First completion today — update streak
      const yesterday = yesterdayString();
      if (d.lastCompletedDate === yesterday) {
        d.streak = (d.streak || 0) + 1;
      } else {
        d.streak = 1;
      }
      d.lastCompletedDate = today;
      d.totalDaysCompleted = (d.totalDaysCompleted || 0) + 1;
    }
  },

  // For display: streak might be stale if user missed days
  getDisplayStreak() {
    const d = this.data.daily;
    if (!d.lastCompletedDate) return 0;
    const today = todayString();
    const yesterday = yesterdayString();
    if (d.lastCompletedDate === today || d.lastCompletedDate === yesterday) {
      return d.streak || 0;
    }
    // Missed a day — streak broken (but don't write yet, just display 0)
    return 0;
  },

  resetDaily() {
    this.data.daily = DEFAULT_DAILY();
    this.save();
  },
};
