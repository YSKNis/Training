/* ============================================================
   AUDIO ENGINE — Web Speech API
   ============================================================ */

const audio = {
  // Sequencer state — separate from UI state, but UI subscribes via callback
  current: null,        // current sequence id (cancellation token)
  pauseTimer: null,
  available: 'speechSynthesis' in window,

  // Initialize voice list. Voices load asynchronously in some browsers.
  initVoices() {
    if (!this.available) return;
    const load = () => {
      const voices = window.speechSynthesis.getVoices();
      // Prefer English voices, sort by quality hints
      const englishVoices = voices.filter(v => /^en[-_]/i.test(v.lang) || v.lang === 'en');
      state.audioVoices = englishVoices.length ? englishVoices : voices;

      // Auto-pick a sensible default if none chosen yet
      if (!state.audioVoiceURI && state.audioVoices.length) {
        const preferred =
          state.audioVoices.find(v => /Google US English/i.test(v.name)) ||
          state.audioVoices.find(v => /Samantha/i.test(v.name)) ||
          state.audioVoices.find(v => /^en[-_]US/i.test(v.lang)) ||
          state.audioVoices[0];
        state.audioVoiceURI = preferred.voiceURI;
      }
    };
    load();
    if (window.speechSynthesis.onvoiceschanged !== undefined) {
      window.speechSynthesis.onvoiceschanged = load;
    }
  },

  getVoice() {
    if (!this.available) return null;
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v => v.voiceURI === state.audioVoiceURI) || voices[0] || null;
  },

  // Convert a code or meaning to TTS-friendly text.
  // Examples:
  //   "S/41B"     -> "Signal 41 B"
  //   "S/41B-0"   -> "Signal 41 B armed"
  //   "S/41BIP"   -> "Signal 41 B in progress"
  //   "S/73OD"    -> "Signal 73 overdose"
  //   "10-50"     -> "10 50"
  //   "S/RED"     -> "Signal Red"
  //   "S/TRAIN"   -> "Signal Train"
  //   "S/PPI"     -> "Signal P P I"
  //   "S/911"     -> "Signal 9 1 1"
  speakable(text, isCode) {
    if (!isCode) return text;

    // Special-case codes that should be spoken as their full meaning (rare suffixes)
    // These are word-codes that look like acronyms but aren't.
    const wordCodes = {
      'S/RED': 'Signal Red',
      'S/REPO': 'Signal Repo',
      'S/TEST': 'Signal Test',
      'S/TRAIN': 'Signal Train',
      'S/PPI': 'Signal P P I',
      'S/PRI INV': 'Signal Private Investigator',
      'S/JOC': 'Signal J O C',
      // P1 Desk CAD commands — pronounce these intelligibly
      'Mod Cir': 'mod sir',
      'AU/ON': 'A U on',
      'L/L': 'L L',
      '%': 'percent',
      'CAN': 'C A N',
      'BR': 'B R',
      'WH': 'W H',
      'QY': 'Q Y',
    };
    if (wordCodes[text]) return wordCodes[text];

    let s = text;

    // S/X family — read as "Signal X"
    if (/^S\//i.test(s)) {
      s = s.replace(/^S\//i, 'Signal ');
    }

    // Handle suffix combinations BEFORE separating numbers from letters,
    // because "41BIP" has no word boundary between B and IP.
    // Order matters: longer suffixes first.
    s = s.replace(/IP-0\b/g, ' in progress armed');
    s = s.replace(/IP\b/g, ' in progress');
    s = s.replace(/-0\b/g, ' armed');

    // Two-letter pseudo-suffixes that are really abbreviations
    s = s.replace(/\bOD\b/g, 'overdose');
    s = s.replace(/(\d)OD\b/g, '$1 overdose');
    s = s.replace(/(\d)ED\b/g, '$1 excited delirium');
    s = s.replace(/(\d)NR\b/g, '$1 N R');

    // Hyphens between numbers/words become spaces (10-50 -> "10 50", 99-A -> "99 A")
    s = s.replace(/-/g, ' ');

    // Insert space between number and following letter (41B -> "41 B")
    s = s.replace(/(\d)([A-Za-z])/g, '$1 $2');

    // 911 should be read as digits
    s = s.replace(/\b911\b/g, '9 1 1');

    // Spell out 2+ letter acronyms (like remaining PPI, etc) as letters
    s = s.replace(/\b([A-Z]{2,})\b/g, (m) => m.split('').join(' '));

    return s.replace(/\s+/g, ' ').trim();
  },

  // Speak text and call onEnd when done. Returns the seq id so callers can cancel.
  speak(text, { rate, onEnd, onCancel } = {}) {
    if (!this.available) {
      if (onEnd) onEnd();
      return null;
    }
    this.cancel();
    const seq = Symbol('seq');
    this.current = seq;

    const u = new SpeechSynthesisUtterance(text);
    const voice = this.getVoice();
    if (voice) u.voice = voice;
    u.rate = rate ?? state.audioRate;
    u.pitch = 1.0;
    u.volume = 1.0;

    u.onend = () => {
      if (this.current !== seq) return;
      this.current = null;
      if (onEnd) onEnd();
    };
    u.onerror = () => {
      if (this.current !== seq) return;
      this.current = null;
      if (onCancel) onCancel();
      else if (onEnd) onEnd();
    };

    // Some browsers (notably Chrome) need a tiny delay after cancel
    setTimeout(() => {
      if (this.current === seq) window.speechSynthesis.speak(u);
    }, 50);
    return seq;
  },

  cancel() {
    this.current = null;
    if (this.pauseTimer) {
      clearTimeout(this.pauseTimer);
      this.pauseTimer = null;
    }
    if (this.available) {
      try { window.speechSynthesis.cancel(); } catch (e) {}
    }
  },

  pause(ms, onDone) {
    if (this.pauseTimer) clearTimeout(this.pauseTimer);
    this.pauseTimer = setTimeout(() => {
      this.pauseTimer = null;
      if (onDone) onDone();
    }, ms);
  },
};

/* ============================================================
   SPEECH RECOGNITION ENGINE — Web Speech API (input side)
   ============================================================ */

const recognizer = {
  available: ('SpeechRecognition' in window) || ('webkitSpeechRecognition' in window),
  rec: null,
  listening: false,

  // Start a single-shot recognition. onResult(transcript), onError(reason), onEnd()
  start({ onResult, onError, onEnd } = {}) {
    if (!this.available) {
      if (onError) onError('unsupported');
      return;
    }
    // Stop any prior session
    this.stop();

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 3;     // we'll grade against the best matching alternative
    rec.continuous = false;

    let gotResult = false;

    rec.onresult = (e) => {
      gotResult = true;
      // Collect all alternatives from the first result
      const alternatives = [];
      const res = e.results[0];
      for (let i = 0; i < res.length; i++) {
        alternatives.push(res[i].transcript);
      }
      if (onResult) onResult(alternatives);
    };

    rec.onerror = (e) => {
      if (onError) onError(e.error || 'error');
    };

    rec.onend = () => {
      this.listening = false;
      this.rec = null;
      if (!gotResult && onEnd) onEnd();
      else if (onEnd) onEnd();
    };

    this.rec = rec;
    this.listening = true;
    try {
      rec.start();
    } catch (e) {
      this.listening = false;
      this.rec = null;
      if (onError) onError('start-failed');
    }
  },

  stop() {
    if (this.rec) {
      try { this.rec.stop(); } catch (e) {}
      try { this.rec.abort(); } catch (e) {}
      this.rec = null;
    }
    this.listening = false;
  },
};

// Convert a spoken transcript into something comparable to a code or meaning.
// Handles number-words, the word "signal", phonetic quirks, etc.
const NUMBER_WORDS = {
  zero: '0', oh: '0', one: '1', two: '2', three: '3', four: '4', five: '5',
  six: '6', seven: '7', eight: '8', nine: '9', ten: '10', eleven: '11',
  twelve: '12', thirteen: '13', fourteen: '14', fifteen: '15', sixteen: '16',
  seventeen: '17', eighteen: '18', nineteen: '19', twenty: '20', thirty: '30',
  forty: '40', fifty: '50', sixty: '60', seventy: '70', eighty: '80', ninety: '90',
  hundred: '100',
};

// Turn "ten fifty" -> "10 50", "signal thirty" -> "signal 30", etc.
function transcriptToComparable(transcript) {
  let t = ' ' + transcript.toLowerCase().trim() + ' ';
  // Replace compound number-words first (e.g. "twenty one" -> "21")
  // Simple approach: replace each known word; good enough for these codes.
  const words = t.split(/\s+/).filter(Boolean);
  const out = [];
  for (let i = 0; i < words.length; i++) {
    let w = words[i].replace(/[.,!?]/g, '');
    // "twenty-one" hyphenated
    if (w.includes('-')) {
      const parts = w.split('-');
      const mapped = parts.map(p => NUMBER_WORDS[p] || p);
      // if two number parts like 20 + 1 -> 21
      if (mapped.length === 2 && /^\d+0$/.test(mapped[0]) && /^\d$/.test(mapped[1])) {
        out.push(String(parseInt(mapped[0]) + parseInt(mapped[1])));
        continue;
      }
      out.push(mapped.join(' '));
      continue;
    }
    if (NUMBER_WORDS[w] !== undefined) {
      // tens + ones combination: "twenty" followed by "one"
      const next = words[i + 1] ? words[i + 1].replace(/[.,!?]/g, '') : null;
      if (/^(twenty|thirty|forty|fifty|sixty|seventy|eighty|ninety)$/.test(w)
          && next && /^(one|two|three|four|five|six|seven|eight|nine)$/.test(next)) {
        out.push(String(parseInt(NUMBER_WORDS[w]) + parseInt(NUMBER_WORDS[next])));
        i++; // consume next
        continue;
      }
      out.push(NUMBER_WORDS[w]);
      continue;
    }
    out.push(w);
  }
  return out.join(' ').replace(/\s+/g, ' ').trim();
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => !exclude || x.id !== exclude.id);
  return shuffle(pool).slice(0, n);
}

function normalize(s) {
  return s.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  if (m === 0) return n;
  if (n === 0) return m;
  const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      dp[i][j] = Math.min(dp[i-1][j] + 1, dp[i][j-1] + 1, dp[i-1][j-1] + cost);
    }
  }
  return dp[m][n];
}

function isAnswerCorrect(user, target) {
  const u = normalize(user);
  const t = normalize(target);
  if (!u) return false;
  if (u === t) return true;

  // Accept if the user's answer is a substring match with substantial length
  if (t.length > 12 && u.length >= Math.floor(t.length * 0.5) && t.includes(u)) return true;

  // Accept small typos — Levenshtein distance tolerance
  const dist = levenshtein(u, t);
  const tolerance = t.length < 10 ? 1 : Math.max(2, Math.floor(t.length * 0.15));
  return dist <= tolerance;
}

function todayString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function yesterdayString() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateForDisplay(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m - 1, d);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}

function findCardById(id) {
  for (const key in ALL_CARDS) {
    const found = ALL_CARDS[key].find(c => c.id === id);
    if (found) return found;
  }
  return null;
}

// Pick N cards for daily drill, prioritizing:
//   1. Never assigned (highest priority — fresh material)
//   2. Marked "learning" (need reinforcement)
//   3. Unseen but assigned before
//   4. Mastered (lowest — review only when nothing else)
// Only pulls from categories enabled in the daily filter.
function pickDailyCards(count) {
  const assigned = storage.data.daily.assigned || {};
  const enabled = storage.data.daily.enabledCategories || Object.keys(CATEGORIES);
  const buckets = { fresh: [], learning: [], unseen: [], mastered: [] };

  for (const key of enabled) {
    const cards = ALL_CARDS[key];
    if (!cards) continue;
    for (const card of cards) {
      const wasAssigned = !!assigned[card.id];
      const mastery = storage.getMastery(card.id);
      if (!wasAssigned) {
        buckets.fresh.push(card);
      } else if (mastery === 'learning') {
        buckets.learning.push(card);
      } else if (mastery === 'mastered') {
        buckets.mastered.push(card);
      } else {
        buckets.unseen.push(card);
      }
    }
  }

  const ordered = [
    ...shuffle(buckets.fresh),
    ...shuffle(buckets.learning),
    ...shuffle(buckets.unseen),
    ...shuffle(buckets.mastered),
  ];

  return ordered.slice(0, count);
}

function getDailyProgress() {
  const d = storage.getDaily();
  const ids = d.currentCards || [];
  const total = ids.length;
  if (total === 0) return { total: 0, flashcardSeen: 0, quizAnswered: 0, isComplete: false, flashcardPct: 0, quizPct: 0 };

  let flashcardSeen = 0, quizAnswered = 0;
  for (const id of ids) {
    if (d.flashcardSeen[id]) flashcardSeen++;
    if (d.quizAnswered[id]) quizAnswered++;
  }
  return {
    total,
    flashcardSeen,
    quizAnswered,
    flashcardPct: Math.round(flashcardSeen / total * 100),
    quizPct: Math.round(quizAnswered / total * 100),
    isComplete: (flashcardSeen >= total) || (quizAnswered >= total),
    isCompletedToday: d.lastCompletedDate === todayString(),
  };
}

// All cards currently marked as 'mastered', across every category.
function getAllMasteredCards() {
  const result = [];
  for (const key in ALL_CARDS) {
    for (const card of ALL_CARDS[key]) {
      if (storage.getMastery(card.id) === 'mastered') {
        result.push(card);
      }
    }
  }
  return result;
}

// Stats for the "Review Mastered" home card.
function getMasteredStats() {
  const cards = getAllMasteredCards();
  const cats = new Set(cards.map(c => c.category));
  return {
    total: cards.length,
    categoryCount: cats.size,
  };
}

// Format ms duration as MM:SS (or HH:MM:SS over an hour)
function formatDuration(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const pad = n => String(n).padStart(2, '0');
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}`;
}

// Format a category value (string, array, or 'all') as a display label
function getCategoryDisplayLabel(category, short = false) {
  if (category === 'all' || category == null) return short ? 'All' : 'All Categories';
  if (Array.isArray(category)) {
    if (category.length === 0) return 'None';
    if (category.length === 1) {
      return CATEGORIES[category[0]]?.label || 'Custom';
    }
    // All categories check
    if (category.length === Object.keys(ALL_CARDS).length) return short ? 'All' : 'All Categories';
    return `${category.length} categories`;
  }
  // Single string
  return CATEGORIES[category]?.label || 'Custom';
}

// Resolve cfg.category to an array of category IDs. Accepts:
//   'all'              → all category ids
//   string id          → [id]  (backward compat)
//   array of ids       → as-is
function resolveTestCategories(category) {
  if (category === 'all' || category == null) return Object.keys(ALL_CARDS);
  if (Array.isArray(category)) return category.filter(c => ALL_CARDS[c]);
  if (typeof category === 'string' && ALL_CARDS[category]) return [category];
  return Object.keys(ALL_CARDS);
}

// Get the candidate cards for a test based on the chosen categories
function getTestCardPool(category) {
  const ids = resolveTestCategories(category);
  const result = [];
  for (const id of ids) {
    if (ALL_CARDS[id]) result.push(...ALL_CARDS[id]);
  }
  return result;
}

// Build a test deck of N questions from the pool.
// - 'random' order: shuffle the pool, take the first N
// - 'numeric' order: sort the pool by code, take the first N (true sequential —
//   the test always begins with the first code in the category, so e.g. 10-Codes
//   tests start at 10-01, not a random subset that happens to be sorted)
// Build a mixed test deck — array of question objects with explicit types.
// Question types: 'mc' (multiple choice, 4 options), 'tf' (true/false), 'fill' (typed answer).
// fillInPercent (0-100) controls how many are fill-in; the rest split evenly MC/TF.
// Normalize a type-mix object so its fields sum to 100.
// Handles missing fields, all-zero, and sums that don't equal 100.
function normalizeTypeMix(mix) {
  const m = {
    fill: Math.max(0, Number(mix?.fill ?? 30)),
    mc:   Math.max(0, Number(mix?.mc   ?? 35)),
    tf:   Math.max(0, Number(mix?.tf   ?? 35)),
  };
  const sum = m.fill + m.mc + m.tf;
  if (sum === 0) return { fill: 30, mc: 35, tf: 35 };
  if (sum === 100) return m;
  // Scale to 100
  return {
    fill: (m.fill / sum) * 100,
    mc:   (m.mc / sum) * 100,
    tf:   (m.tf / sum) * 100,
  };
}

// Given a total number of questions and a normalized mix, return integer counts
// per type that sum exactly to the total. Off-by-one rounding errors are
// absorbed by the largest bucket.
function getTypeMixCounts(total, mix) {
  const n = normalizeTypeMix(mix);
  let fillCount = Math.round(total * (n.fill / 100));
  let mcCount = Math.round(total * (n.mc / 100));
  let tfCount = total - fillCount - mcCount;
  if (tfCount < 0) {
    if (fillCount >= mcCount) fillCount += tfCount;
    else mcCount += tfCount;
    tfCount = 0;
  }
  return { fill: fillCount, mc: mcCount, tf: tfCount };
}

function buildTestDeck(category, questionCount, order, typeMix, direction) {
  const pool = getTestCardPool(category);
  const limit = questionCount === 'all' ? pool.length : Math.min(questionCount, pool.length);

  // Pick the cards first
  let cards;
  if (order === 'numeric') {
    cards = sortCardsByCode(pool).slice(0, limit);
  } else {
    cards = shuffle(pool).slice(0, limit);
  }

  // Normalize the type mix in case the percentages don't sum to exactly 100
  const total = cards.length;
  const { fill: fillCount, mc: mcCount, tf: tfCount } = getTypeMixCounts(total, typeMix);

  const typeAssignments = [
    ...Array(fillCount).fill('fill'),
    ...Array(mcCount).fill('mc'),
    ...Array(tfCount).fill('tf'),
  ];

  // Shuffle the type assignments so question types are interleaved
  // (unless numeric order — then keep types arbitrary but cards in code order)
  const shuffledTypes = order === 'numeric' ? typeAssignments : shuffle(typeAssignments);

  const questions = cards.map((card, i) => {
    const type = shuffledTypes[i];
    const q = { card, type, direction };

    if (type === 'mc') {
      // 4 options: the correct meaning + 3 distractors from same category
      const promptIsCode = direction === 'codeToMeaning';
      const correctValue = promptIsCode ? card.meaning : card.code;
      const samePool = ALL_CARDS[card.category] || [];
      const distractors = pickRandom(samePool, 3, card);
      // Top up with cross-category distractors if the category was tiny
      if (distractors.length < 3) {
        const all = Object.values(ALL_CARDS).flat();
        distractors.push(...pickRandom(all, 3 - distractors.length, card)
          .filter(d => !distractors.find(x => x.id === d.id)));
      }
      const optionValues = [correctValue, ...distractors.map(d => promptIsCode ? d.meaning : d.code)];
      const shuffledOptions = shuffle(optionValues);
      q.options = shuffledOptions;
      q.correctOptionIndex = shuffledOptions.indexOf(correctValue);
    } else if (type === 'tf') {
      // 50/50: state the true pairing or a false one
      const trueStatement = Math.random() < 0.5;
      const promptIsCode = direction === 'codeToMeaning';
      const otherSide = promptIsCode ? card.meaning : card.code;
      if (trueStatement) {
        q.statementValue = otherSide;
        q.tfCorrectAnswer = true;
      } else {
        // Pick a different card's meaning/code from the same category
        const samePool = ALL_CARDS[card.category] || [];
        const decoyPool = samePool.filter(c => c.id !== card.id);
        const decoy = decoyPool.length
          ? decoyPool[Math.floor(Math.random() * decoyPool.length)]
          : Object.values(ALL_CARDS).flat().find(c => c.id !== card.id);
        q.statementValue = promptIsCode ? decoy.meaning : decoy.code;
        q.tfCorrectAnswer = false;
      }
    }
    // fill: no extra data — just the card itself

    return q;
  });

  return questions;
}

// Strict matching: case-insensitive, whitespace-trimmed, but must match closely
function isTestAnswerCorrect(user, target, strict) {
  if (strict) {
    return normalize(user || '') === normalize(target || '');
  }
  return isAnswerCorrect(user || '', target || '');
}

// Grade the test — handles all three question types
function gradeTest() {
  const cfg = state.testConfig;
  const results = {};
  state.testQuestions.forEach((q, i) => {
    const userAnswer = state.testAnswers[i];
    let graded, displayUserAnswer;

    if (userAnswer === undefined || userAnswer === null || userAnswer === '') {
      graded = 'unanswered';
      displayUserAnswer = '';
    } else if (q.type === 'fill') {
      const target = cfg.direction === 'codeToMeaning' ? q.card.meaning : q.card.code;
      const user = (userAnswer || '').trim();
      if (user === '') {
        graded = 'unanswered';
      } else {
        graded = isTestAnswerCorrect(user, target, cfg.strict) ? 'correct' : 'wrong';
      }
      displayUserAnswer = user;
    } else if (q.type === 'mc') {
      // userAnswer is the option index
      graded = userAnswer === q.correctOptionIndex ? 'correct' : 'wrong';
      displayUserAnswer = q.options[userAnswer];
    } else if (q.type === 'tf') {
      // userAnswer is true or false
      graded = userAnswer === q.tfCorrectAnswer ? 'correct' : 'wrong';
      displayUserAnswer = userAnswer ? 'True' : 'False';
    }

    results[i] = { graded, userAnswer, displayUserAnswer, overridden: false, type: q.type };
  });
  return results;
}

// Compute summary numbers from a results object
function computeTestSummary(results, total) {
  let correct = 0, wrong = 0, unanswered = 0;
  for (const id in results) {
    const r = results[id];
    if (r.graded === 'correct') correct++;
    else if (r.graded === 'wrong') wrong++;
    else unanswered++;
  }
  const pct = total ? Math.round((correct / total) * 100) : 0;
  let tier;
  if (pct >= 90) tier = 'pass';
  else if (pct >= 70) tier = 'partial';
  else tier = 'fail';
  return { correct, wrong, unanswered, total, pct, tier };
}

// Slider value changed — update displayed number, breakdown, start-button label.
// Done without a full re-render so the slider's drag interaction stays smooth.
// Type-mix slider value changed — update its pill label, the running sum,
// the bottom breakdown, and the start-button label. No full re-render so
// the user's slider drag isn't interrupted.
function handleTypeMixChange(key, v) {
  const cfg = state.testConfig;
  if (!cfg.typeMix) cfg.typeMix = { fill: 30, mc: 35, tf: 35 };
  cfg.typeMix[key] = v;
  storage.saveTestConfig(cfg);

  // Update this slider's own pill label
  const labelPill = document.querySelector(`#type-mix-${key}`)?.closest('.type-mix-row')?.querySelector('.bd-pill .num');
  if (labelPill) labelPill.textContent = `${v}%`;

  // Update the sum indicator
  const sum = (cfg.typeMix.fill || 0) + (cfg.typeMix.mc || 0) + (cfg.typeMix.tf || 0);
  const sumEl = document.getElementById('type-mix-sum');
  if (sumEl) {
    sumEl.innerHTML = sum === 100
      ? `<span style="color: var(--green);">✓ Total: 100%</span>`
      : `<span style="color: var(--amber);">⚠ Total: ${Math.round(sum)}% — will be normalized to 100% when test starts</span>`;
  }

  // Update the count breakdown at the bottom of the question count section
  const selectedCats = resolveTestCategories(cfg.category);
  const catCardCount = selectedCats.reduce((s, id) => s + (ALL_CARDS[id]?.length || 0), 0);
  const willActually = cfg.questionCount === 'all'
    ? catCardCount
    : Math.min(typeof cfg.questionCount === 'number' ? cfg.questionCount : 100, catCardCount);
  const counts = getTypeMixCounts(willActually, cfg.typeMix);
  const breakdown = document.querySelector('.slider-breakdown');
  if (breakdown && !breakdown.textContent.includes('Only')) {
    // Only the main breakdown — not the warning variant
    breakdown.innerHTML = `
      <span class="bd-pill fill">FILL-IN: <span class="num">${counts.fill}</span></span>
      <span class="bd-pill mc">MULTIPLE CHOICE: <span class="num">${counts.mc}</span></span>
      <span class="bd-pill tf">TRUE/FALSE: <span class="num">${counts.tf}</span></span>
    `;
  }
}

function handleSliderChange(v) {
  state.testConfig.questionCount = v;
  const cfg = state.testConfig;
  const selectedCats = resolveTestCategories(cfg.category);
  const catCardCount = selectedCats.reduce((sum, id) => sum + (ALL_CARDS[id]?.length || 0), 0);
  const willActually = Math.min(v, catCardCount);
  const counts = getTypeMixCounts(willActually, cfg.typeMix);
  const fillC = counts.fill;
  const mcC = counts.mc;
  const tfC = counts.tf;

  const valEl = document.querySelector('.slider-value');
  if (valEl) {
    valEl.innerHTML = `${willActually}<span class="slider-value-suffix">questions</span>`;
  }
  const breakdown = document.querySelector('.slider-breakdown');
  if (breakdown) {
    breakdown.innerHTML = `
      <span class="bd-pill fill">FILL-IN: <span class="num">${fillC}</span></span>
      <span class="bd-pill mc">MULTIPLE CHOICE: <span class="num">${mcC}</span></span>
      <span class="bd-pill tf">TRUE/FALSE: <span class="num">${tfC}</span></span>
    `;
  }
  const startBtn = document.querySelector('.start-test-btn');
  if (startBtn) startBtn.textContent = `START ${willActually}-QUESTION TEST →`;
  storage.saveTestConfig(cfg);
}

// Test view dispatch: start, abandon, submit, override
// Recompute and update the answered-count pills in the test view without a
// full re-render — keeps scroll position and slider focus intact.
function updateAnsweredCount() {
  const total = state.testQuestions.length;
  let count = 0;
  state.testQuestions.forEach((q, i) => {
    const a = state.testAnswers[i];
    if (a === undefined || a === null) return;
    if (q.type === 'fill') {
      if ((a || '').trim() !== '') count++;
    } else {
      count++;
    }
  });
  document.querySelectorAll('.answered-count').forEach(el => {
    const isLong = el.textContent.includes(' of ');
    el.textContent = isLong ? `${count} of ${total} answered` : `${count}/${total} answered`;
    el.classList.toggle('complete', count === total);
  });
}

function startTestConfig() {
  state.view = 'test-config';
  // Clear any leftover test session
  state.testQuestions = [];
  state.testAnswers = {};
  state.testStartedAt = null;
  state.testFinishedAt = null;
  state.testResults = null;
  render();
}

function startTest() {
  const cfg = state.testConfig;
  storage.saveTestConfig(cfg);
  const deck = buildTestDeck(cfg.category, cfg.questionCount, cfg.order, cfg.typeMix, cfg.direction);
  if (deck.length === 0) {
    alert('No cards available for this category. Pick another.');
    return;
  }
  state.testQuestions = deck;
  state.testAnswers = {};
  state.testStartedAt = Date.now();
  state.testFinishedAt = null;
  state.testResults = null;
  state.view = 'test';
  render();
  // Focus first fill-in input, if any
  setTimeout(() => {
    const first = document.querySelector('.test-q-input');
    if (first) first.focus();
  }, 50);
}

function submitTest() {
  const total = state.testQuestions.length;
  // Count answered: for fill-in, must be non-empty string; for MC/TF, must not be undefined
  let answeredCount = 0;
  state.testQuestions.forEach((q, i) => {
    const a = state.testAnswers[i];
    if (a === undefined || a === null) return;
    if (q.type === 'fill') {
      if ((a || '').trim() !== '') answeredCount++;
    } else {
      answeredCount++;
    }
  });
  if (answeredCount < total) {
    const skipped = total - answeredCount;
    if (!confirm(`You have ${skipped} unanswered question${skipped === 1 ? '' : 's'}. Submit anyway?`)) {
      return;
    }
  }
  state.testFinishedAt = Date.now();
  state.testResults = gradeTest();
  state.view = 'test-results';

  // Persist to history
  const summary = computeTestSummary(state.testResults, total);
  storage.pushTestResult({
    timestamp: state.testFinishedAt,
    category: state.testConfig.category,
    direction: state.testConfig.direction,
    strict: state.testConfig.strict,
    questionCount: total,
    correct: summary.correct,
    wrong: summary.wrong,
    unanswered: summary.unanswered,
    pct: summary.pct,
    durationMs: state.testFinishedAt - state.testStartedAt,
  });

  render();
  window.scrollTo(0, 0);
}

function overrideTestAnswer(questionIndex) {
  const r = state.testResults && state.testResults[questionIndex];
  if (!r) return;
  if (r.graded === 'correct') {
    r.graded = 'wrong';
  } else if (r.graded === 'wrong') {
    r.graded = 'correct';
  } else {
    // unanswered → mark as correct (you knew it but didn't write it down)
    r.graded = 'correct';
  }
  r.overridden = !r.overridden;
  render();
}

function abandonTest() {
  if (!confirm('Abandon this test? Your answers will not be saved.')) return;
  state.testQuestions = [];
  state.testAnswers = {};
  state.testStartedAt = null;
  state.testResults = null;
  state.view = 'home';
  render();
}

function getCategoryStats(categoryId) {
  const cards = ALL_CARDS[categoryId];
  let mastered = 0, learning = 0;
  for (const c of cards) {
    const m = storage.getMastery(c.id);
    if (m === 'mastered') mastered++;
    else if (m === 'learning') learning++;
  }
  const total = cards.length;
  const unseen = total - mastered - learning;
  return { total, mastered, learning, unseen, pct: total ? Math.round(mastered / total * 100) : 0 };
}

function getOverallStats() {
  let total = 0, mastered = 0, learning = 0;
  for (const key in ALL_CARDS) {
    const s = getCategoryStats(key);
    total += s.total;
    mastered += s.mastered;
    learning += s.learning;
  }
  return { total, mastered, learning, unseen: total - mastered - learning };
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* ============================================================
   DECK MANAGEMENT
   ============================================================ */

// Sort cards in natural numeric order: by category order first (matches the
// home-screen layout), then by code. Uses localeCompare's numeric option so
// "S/2" comes before "S/10" and "10-99" before "10-100".
function sortCardsByCode(cards) {
  const categoryOrder = Object.keys(CATEGORIES);
  return cards.slice().sort((a, b) => {
    const ai = categoryOrder.indexOf(a.category);
    const bi = categoryOrder.indexOf(b.category);
    if (ai !== bi) return ai - bi;
    return a.code.localeCompare(b.code, undefined, { numeric: true, sensitivity: 'base' });
  });
}

function buildDeck() {
  audio.cancel();
  state.audioPhase = 'idle';
  let cards;
  if (state.isDaily) {
    const ids = storage.getDaily().currentCards || [];
    cards = ids.map(id => findCardById(id)).filter(Boolean);
    cards = state.shuffleOn ? shuffle(cards) : sortCardsByCode(cards);
  } else if (state.specialDeck === 'mastered') {
    cards = getAllMasteredCards();
    cards = state.shuffleOn ? shuffle(cards) : sortCardsByCode(cards);
  } else {
    cards = ALL_CARDS[state.category].slice();
    if (state.onlyLearning) {
      cards = cards.filter(c => storage.getMastery(c.id) !== 'mastered');
      if (cards.length === 0) cards = ALL_CARDS[state.category].slice();
    }
    // Per-category source data is already in natural order, so just shuffle if requested.
    if (state.shuffleOn) cards = shuffle(cards);
  }
  state.deck = cards;
  state.index = 0;
  state.flipped = false;
  state.quizAnswered = false;
  state.quizChoice = null;
  state.typeChecked = false;
  state.typeOverridden = false;
  state.roundResults = {};
  state.reviewRoundNum = 0;
  if (state.mode === 'quiz') generateQuizOptions();
}

function currentCard() {
  return state.deck[state.index];
}

function generateQuizOptions() {
  const card = currentCard();
  if (!card) return;
  // Use the card's own category for distractors so daily-mode (mixed categories) works correctly
  const pool = ALL_CARDS[card.category] || [];
  const distractors = pickRandom(pool, 3, card);
  // If category is tiny, pool from all categories
  if (distractors.length < 3) {
    const all = Object.values(ALL_CARDS).flat();
    const more = pickRandom(all, 3 - distractors.length, card);
    distractors.push(...more);
  }
  state.quizOptions = shuffle([card, ...distractors]);
}

function next() {
  state.flipped = false;
  state.quizAnswered = false;
  state.quizChoice = null;
  state.typeChecked = false;
  state.typeOverridden = false;
  if (state.index < state.deck.length - 1) {
    state.index++;
    if (state.mode === 'quiz') generateQuizOptions();
    render();
  } else {
    // End of deck
    state.index = state.deck.length;
    render();
  }
}

function prev() {
  state.flipped = false;
  if (state.index > 0) {
    state.index--;
    if (state.mode === 'quiz') generateQuizOptions();
    render();
  }
}

// Get cards from the current deck that the user marked "still learning" this round.
function getStillLearningInRound() {
  return state.deck.filter(c => state.roundResults[c.id] === 'learning');
}

// Start a focused review round of just the cards still marked "learning" from
// the current round. Resets per-round tracking but keeps the session alive.
function startReviewRound() {
  const stillLearning = getStillLearningInRound();
  if (stillLearning.length === 0) return;

  state.deck = state.shuffleOn ? shuffle(stillLearning) : stillLearning;
  state.index = 0;
  state.flipped = false;
  state.quizAnswered = false;
  state.quizChoice = null;
  state.typeChecked = false;
  state.typeOverridden = false;
  state.roundResults = {};
  state.reviewRoundNum = (state.reviewRoundNum || 0) + 1;
  state.quizCorrect = 0;
  state.quizWrong = 0;
  if (state.mode === 'quiz') generateQuizOptions();
  render();
}

function markCurrent(status) {
  const card = currentCard();
  if (!card) return;
  storage.setMastery(card.id, status);
  state.roundResults[card.id] = status;
  if (state.isDaily) {
    storage.markFlashcardSeen(card.id);
  }
}

function renderStudy() {

  return `

/* ---------- TEST CARD (HOME) ---------- */

function renderTestCard() {
  const history = storage.getTestHistory();
  const last = history[0];
  let subtitle;
  if (last) {
    const ago = humanTimeAgo(last.timestamp);
    const catLabel = last.category === 'all' ? 'All categories' : (CATEGORIES[last.category]?.label || 'Custom');
    subtitle = `Last: ${last.pct}% on ${last.questionCount}q · ${catLabel} · ${ago}`;
  } else {
    subtitle = 'Take a graded fill-in-the-blank assessment';
  }

  return `
    <div class="test-card">
      <div class="mc-left">
        <div class="test-icon">✎</div>
        <div class="mc-text">
          <div class="mc-label mono">TAKE A TEST</div>
          <div class="mc-title">Assessment mode</div>
          <div class="mc-subtitle mono">${escapeHtml(subtitle)}</div>
        </div>
      </div>
      <button class="test-btn" data-action="open-test-config">START TEST →</button>
    </div>
  `;
}

function humanTimeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  if (days < 30) return `${days}d ago`;
  const months = Math.floor(days / 30);
  return `${months}mo ago`;
}

/* ---------- TEST RUNNING VIEW ---------- */

function renderTest() {
  const cfg = state.testConfig;
  const total = state.testQuestions.length;
  // Count answered questions (varies by type)
  let answeredCount = 0;
  state.testQuestions.forEach((q, i) => {
    const a = state.testAnswers[i];
    if (a === undefined || a === null) return;
    if (q.type === 'fill') {
      if ((a || '').trim() !== '') answeredCount++;
    } else {
      answeredCount++;
    }
  });
  const elapsed = state.testStartedAt ? Date.now() - state.testStartedAt : 0;
  const catLabel = getCategoryDisplayLabel(cfg.category, false);

  const questions = state.testQuestions.map((q, i) => {
    const userAnswer = state.testAnswers[i];
    const card = q.card;
    const isCodeToMeaning = cfg.direction === 'codeToMeaning';
    const num = `<div class="test-q-num mono">${String(i + 1).padStart(2, '0')}</div>`;
    const typeBadge = `<span class="test-q-type-badge ${q.type}">${q.type === 'fill' ? 'FILL IN' : q.type === 'mc' ? 'MULTIPLE CHOICE' : 'TRUE / FALSE'}</span>`;
    const catName = SHORT_LABELS[card.category] || CATEGORIES[card.category]?.label || '';
    const catBadge = catName ? `<span class="test-q-cat-badge">${escapeHtml(catName)}</span>` : '';

    if (q.type === 'fill') {
      const promptCode = isCodeToMeaning ? card.code : '';
      const promptText = isCodeToMeaning ? '' : card.meaning;
      const placeholder = isCodeToMeaning ? 'Type the meaning…' : 'Type the code…';
      const fillValue = (typeof userAnswer === 'string') ? userAnswer : '';
      const isAnswered = fillValue.trim() !== '';
      return `
        <div class="test-q ${isAnswered ? 'answered' : ''}">
          ${num}
          <div class="test-q-prompt">
            ${typeBadge}
            ${catBadge}
            ${promptCode ? `<span class="test-q-prompt-code">${escapeHtml(promptCode)}</span>` : ''}
            ${promptText ? `<span class="test-q-prompt-text">${escapeHtml(promptText)}</span>` : ''}
          </div>
          <input
            type="text"
            class="test-q-input"
            data-q-index="${i}"
            placeholder="${placeholder}"
            value="${escapeHtml(fillValue)}"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          >
        </div>
      `;
    }

    if (q.type === 'mc') {
      const promptValue = isCodeToMeaning ? card.code : card.meaning;
      const promptLabel = isCodeToMeaning ? 'Which is the meaning of' : 'Which is the code for';
      const promptCodeClass = isCodeToMeaning ? 'code' : '';
      const selected = typeof userAnswer === 'number' ? userAnswer : -1;
      const options = q.options.map((opt, oi) => {
        const letter = String.fromCharCode(65 + oi);
        const isSel = selected === oi;
        return `
          <button class="test-q-mc-option ${isSel ? 'selected' : ''}" data-action="set-test-mc" data-q-index="${i}" data-option-index="${oi}">
            <span class="opt-letter mono">${letter}</span>
            <span>${escapeHtml(opt)}</span>
          </button>
        `;
      }).join('');
      return `
        <div class="test-q test-q-mc ${selected >= 0 ? 'answered' : ''}">
          <div class="test-q-header">
            ${num}
            ${typeBadge}
            ${catBadge}
          </div>
          <div class="test-q-mc-statement">
            ${promptLabel} <span class="${promptCodeClass}">${escapeHtml(promptValue)}</span>?
          </div>
          <div class="test-q-mc-options">${options}</div>
        </div>
      `;
    }

    if (q.type === 'tf') {
      const leftValue = isCodeToMeaning ? card.code : card.meaning;
      const rightValue = q.statementValue;
      const verb = isCodeToMeaning ? 'means' : 'is the code for';
      const selected = typeof userAnswer === 'boolean' ? userAnswer : null;
      return `
        <div class="test-q test-q-tf ${selected !== null ? 'answered' : ''}">
          <div class="test-q-header">
            ${num}
            ${typeBadge}
            ${catBadge}
          </div>
          <div class="test-q-tf-statement">
            <span class="code">${escapeHtml(leftValue)}</span> ${verb} <span class="claim">"${escapeHtml(rightValue)}"</span>
          </div>
          <div class="test-q-tf-options">
            <button class="test-q-tf-option ${selected === true ? 'selected true' : ''}" data-action="set-test-tf" data-q-index="${i}" data-value="true">TRUE</button>
            <button class="test-q-tf-option ${selected === false ? 'selected false' : ''}" data-action="set-test-tf" data-q-index="${i}" data-value="false">FALSE</button>
          </div>
        </div>
      `;
    }
  }).join('');

  return `
    <main class="test-running">
      <div class="container">
        <div class="test-running-header">
          <div class="test-info">
            <div class="test-info-label mono">TEST IN PROGRESS · ${catLabel.toUpperCase()}</div>
            <div class="test-info-name">${total} Question${total === 1 ? '' : 's'} · Mixed Format</div>
          </div>
          <div class="test-meta">
            <span class="answered-count ${answeredCount === total ? 'complete' : ''}">${answeredCount}/${total} answered</span>
            <span class="timer" id="test-timer">${formatDuration(elapsed)}</span>
            <button class="results-action-btn" data-action="abandon-test">ABANDON</button>
          </div>
        </div>

        <div class="test-questions">
          ${questions}
        </div>

        <div class="test-submit-bar">
          <span class="test-meta">
            <span class="answered-count ${answeredCount === total ? 'complete' : ''}">${answeredCount} of ${total} answered</span>
          </span>
          <button class="submit-test-btn" data-action="submit-test">SUBMIT TEST →</button>
        </div>
      </div>
    </main>
  `;
}

/* ---------- TEST RESULTS VIEW ---------- */

function renderTestResults() {
  const cfg = state.testConfig;
  const results = state.testResults || {};
  const total = state.testQuestions.length;
  const summary = computeTestSummary(results, total);
  const duration = (state.testFinishedAt || Date.now()) - (state.testStartedAt || Date.now());
  const catLabel = getCategoryDisplayLabel(cfg.category, false);

  let headline, subhead;
  if (summary.tier === 'pass') {
    headline = 'Excellent work';
    subhead = `You scored ${summary.pct}% — solid command of this material.`;
  } else if (summary.tier === 'partial') {
    headline = 'Good progress';
    subhead = `You scored ${summary.pct}% — some gaps to close.`;
  } else {
    headline = 'Keep studying';
    subhead = `You scored ${summary.pct}% — more reps will help.`;
  }

  const questionRows = state.testQuestions.map((q, i) => {
    const card = q.card;
    const r = results[i] || { graded: 'unanswered', displayUserAnswer: '', overridden: false, type: q.type };
    const isCodeToMeaning = cfg.direction === 'codeToMeaning';
    const target = isCodeToMeaning ? card.meaning : card.code;
    const promptValue = isCodeToMeaning ? card.code : card.meaning;
    const typeBadge = `<span class="test-q-type-badge ${q.type}" style="margin-right: 6px;">${q.type === 'fill' ? 'FILL' : q.type === 'mc' ? 'MC' : 'T/F'}</span>`;
    const catName = SHORT_LABELS[card.category] || CATEGORIES[card.category]?.label || '';
    const catBadge = catName ? `<span class="test-q-cat-badge" style="margin-right: 6px;">${escapeHtml(catName)}</span>` : '';

    let promptDisplay, answerSection;

    if (q.type === 'fill') {
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-code">${escapeHtml(isCodeToMeaning ? card.code : '')}</span>
        ${!isCodeToMeaning ? `<span class="results-q-prompt-text">${escapeHtml(card.meaning)} → ${escapeHtml(card.code)}</span>` : ''}
      `;
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${escapeHtml(target)}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `
          <span><span class="label mono">Your answer</span><span class="your correct-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          ${normalize(r.displayUserAnswer) !== normalize(target) ? `<span><span class="label mono">Expected</span><span class="right">${escapeHtml(target)}</span></span>` : ''}
        `;
      } else {
        answerSection = `
          <span><span class="label mono">Your answer</span><span class="your wrong-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${escapeHtml(target)}</span></span>
        `;
      }
    } else if (q.type === 'mc') {
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-text">${isCodeToMeaning ? 'Meaning of' : 'Code for'} <span class="results-q-prompt-code">${escapeHtml(promptValue)}</span></span>
      `;
      const correct = q.options[q.correctOptionIndex];
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${escapeHtml(correct)}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `<span><span class="label mono">Selected</span><span class="your correct-text">${escapeHtml(r.displayUserAnswer)}</span></span>`;
      } else {
        answerSection = `
          <span><span class="label mono">You picked</span><span class="your wrong-text">${escapeHtml(r.displayUserAnswer)}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${escapeHtml(correct)}</span></span>
        `;
      }
    } else if (q.type === 'tf') {
      const verb = isCodeToMeaning ? 'means' : 'is the code for';
      promptDisplay = `
        ${typeBadge}
        ${catBadge}
        <span class="results-q-prompt-text">
          <span class="results-q-prompt-code">${escapeHtml(promptValue)}</span> ${verb} "${escapeHtml(q.statementValue)}"
        </span>
      `;
      const correctStr = q.tfCorrectAnswer ? 'True' : 'False';
      if (r.graded === 'unanswered') {
        answerSection = `<span class="none">No answer · correct: <span class="right">${correctStr}</span></span>`;
      } else if (r.graded === 'correct') {
        answerSection = `<span><span class="label mono">Selected</span><span class="your correct-text">${r.displayUserAnswer}</span></span>`;
      } else {
        answerSection = `
          <span><span class="label mono">You picked</span><span class="your wrong-text">${r.displayUserAnswer}</span></span>
          <span><span class="label mono">Correct</span><span class="right">${correctStr}</span></span>
        `;
      }
    }

    // Only fill-in can be ambiguously graded — hide override on MC/TF
    const showOverride = q.type === 'fill' && r.graded !== 'unanswered';
    const overrideLabel = r.graded === 'correct' ? 'Mark wrong' : 'Mark correct';

    return `
      <div class="results-q ${r.graded} ${r.overridden ? 'overridden' : ''}">
        <div class="results-q-num mono">${String(i + 1).padStart(2, '0')}</div>
        <div class="results-q-body">
          <div class="results-q-prompt">
            ${promptDisplay}
          </div>
          <div class="results-q-answers">${answerSection}</div>
        </div>
        <div class="results-q-actions">
          ${showOverride ? `<button class="results-override-btn" data-action="override-test-answer" data-q-index="${i}">${overrideLabel}</button>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <main class="test-results">
      <div class="container">
        <button class="back-btn" data-action="home" style="margin-bottom: 24px;">← BACK TO HOME</button>

        <div class="results-summary">
          <div class="results-grade ${summary.tier}">${summary.pct}%</div>
          <div class="results-headline">${headline}</div>
          <div class="results-subhead">${subhead}</div>
          <div class="results-stats">
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--green);">${summary.correct}</span>
              <span class="results-stat-label mono">Correct</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--red);">${summary.wrong}</span>
              <span class="results-stat-label mono">Wrong</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--text-muted);">${summary.unanswered}</span>
              <span class="results-stat-label mono">Skipped</span>
            </div>
            <div class="results-stat">
              <span class="results-stat-value" style="color: var(--blue);">${formatDuration(duration)}</span>
              <span class="results-stat-label mono">Duration</span>
            </div>
          </div>
        </div>

        <div class="results-section-label mono">QUESTION REVIEW · ${catLabel}</div>
        <div>${questionRows}</div>

        <div class="results-actions">
          <button class="results-action-btn primary" data-action="open-test-config">↻ TAKE ANOTHER TEST</button>
          <button class="results-action-btn" data-action="home">← BACK TO HOME</button>
        </div>
      </div>
    </main>
  `;
}
