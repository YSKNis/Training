/* ---------- DAILY DRILL CARD (HOME) ---------- */

function renderDailyCard() {
  storage.ensureDailySession();
  const d = storage.getDaily();
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();
  const dayCount = d.totalDaysCompleted || 0;

  const fcComplete = progress.flashcardSeen >= progress.total && progress.total > 0;
  const qComplete = progress.quizAnswered >= progress.total && progress.total > 0;

  let buttonText, buttonClass;
  if (progress.isCompletedToday) {
    if (progress.isComplete) {
      buttonText = 'REVIEW TODAY\'S SET →';
      buttonClass = 'complete';
    } else {
      buttonText = 'CONTINUE TODAY\'S DRILL →';
      buttonClass = '';
    }
  } else if (progress.flashcardSeen > 0 || progress.quizAnswered > 0) {
    buttonText = 'CONTINUE TODAY\'S DRILL →';
    buttonClass = '';
  } else {
    buttonText = 'START TODAY\'S DRILL →';
    buttonClass = '';
  }

  const settingsId = state.dailySettingsOpen ? 'daily-settings-panel' : '';

  const totalCats = Object.keys(CATEGORIES).length;
  const enabledCats = (d.enabledCategories || Object.keys(CATEGORIES)).length;
  const filterText = enabledCats === totalCats
    ? 'Mixed selection from across all categories'
    : `Mixed selection from ${enabledCats} of ${totalCats} categories`;

  return `
    <div class="daily-card">
      <div class="daily-head">
        <div class="daily-head-left">
          <div class="daily-label mono">DAILY DRILL · ${formatDateForDisplay(todayString())}</div>
          <div class="daily-title">${progress.total} Codes for Today</div>
          <div class="daily-subtitle">${filterText}${dayCount > 0 ? ` · Day ${dayCount} completed` : ''}</div>
          ${progress.isCompletedToday ? `<span class="daily-complete-badge">✓ COMPLETED TODAY</span>` : ''}
        </div>
        <div class="daily-streak">
          <div class="streak-num mono">${streak}</div>
          <div class="streak-label mono">${streak === 1 ? 'DAY' : 'DAYS'} STREAK</div>
        </div>
      </div>

      <div class="daily-progress-rows">
        <div class="dp-row">
          <span class="dp-label mono">FLASHCARDS</span>
          <div class="dp-track"><div class="dp-fill ${fcComplete ? 'complete' : ''}" style="width: ${progress.flashcardPct}%"></div></div>
          <span class="dp-count mono">${progress.flashcardSeen}/${progress.total}</span>
        </div>
        <div class="dp-row">
          <span class="dp-label mono">MULTIPLE CHOICE</span>
          <div class="dp-track"><div class="dp-fill ${qComplete ? 'complete' : ''}" style="width: ${progress.quizPct}%"></div></div>
          <span class="dp-count mono">${progress.quizAnswered}/${progress.total}</span>
        </div>
      </div>

      <div class="daily-actions">
        <button class="daily-start-btn ${buttonClass}" data-action="start-daily">${buttonText}</button>
        ${progress.isComplete ? `
          <button class="daily-cog" data-action="next-batch" title="Get another batch of cards">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
        ` : ''}
        <div class="daily-cog-wrap" style="position: relative;">
          <button class="daily-cog" data-action="toggle-daily-settings" title="Daily settings">
            ${gearIcon()}
          </button>
          ${state.dailySettingsOpen ? renderDailySettings() : ''}
        </div>
      </div>
    </div>
  `;
}

const SHORT_LABELS = {
  signals: 'Signals',
  modifiers: 'Modifiers',
  signal99: 'Signal 99',
  tenCodes: '10-Codes',
  phonetic: 'Phonetic',
  states: 'States',
  provinces: 'Provinces',
  cadCommands: 'P1 Desk',
  dispositions: 'Dispositions',
  commandStrings: 'Cmd Strings',
  districts: 'Districts',
  commonAbbr: 'Abbrevs',
  cityCodes: 'Cities',
  streets: 'Streets',
  vehicleStyles: 'Veh. Styles',
  vehicleMakes: 'Veh. Makes',
  colors: 'Colors',
};

function renderDailySettings() {
  const d = storage.getDaily();
  const opts = [5, 10, 15, 20];
  const enabled = d.enabledCategories || Object.keys(CATEGORIES);
  const progress = getDailyProgress();
  const hasProgress = progress.flashcardSeen > 0 || progress.quizAnswered > 0;

  const chips = Object.values(CATEGORIES).map(cat => {
    const isOn = enabled.includes(cat.id);
    const count = ALL_CARDS[cat.id].length;
    return `
      <button class="cat-chip ${isOn ? 'active' : ''}" data-action="toggle-daily-category" data-category="${cat.id}">
        <span class="cat-chip-name">${SHORT_LABELS[cat.id] || cat.label}</span>
        <span class="cat-chip-count mono">${count}</span>
      </button>
    `;
  }).join('');

  return `
    <div class="settings-panel open" id="daily-settings-panel">
      <div class="setting-section-label mono">CARDS PER DAY</div>
      <div class="cards-per-day-options" style="padding: 0 8px 6px;">
        ${opts.map(n => `
          <button class="cpd-opt ${d.cardsPerDay === n ? 'active' : ''}" data-action="set-cards-per-day" data-count="${n}">${n}</button>
        `).join('')}
      </div>

      <div class="setting-sep"></div>

      <div class="setting-section-label mono">PULL FROM</div>
      <div class="category-chips" style="padding: 0 8px 4px;">
        ${chips}
      </div>
      ${hasProgress ? `<div class="filter-note">Filter changes apply to next batch</div>` : ''}

      <div class="setting-sep"></div>

      <div class="setting-row danger" data-action="reset-daily">
        <span>Reset daily progress</span>
        <span>↺</span>
      </div>
    </div>
  `;
}

/* ---------- DAILY VIEW (the actual drill) ---------- */

function renderDailyView() {
  const isEnd = state.index >= state.deck.length;
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();

  let body;
  if (state.deck.length === 0) {
    body = `
      <div class="empty-state">
        <h3>No cards in today's set</h3>
        <p>Try adjusting your cards-per-day setting or get a new batch.</p>
        <button class="empty-btn" data-action="home">Back to Home</button>
      </div>
    `;
  } else if (isEnd) {
    body = renderDailyComplete();
  } else if (state.mode === 'flashcard') {
    body = renderFlashcard();
  } else if (state.mode === 'quiz') {
    body = renderQuiz();
  } else if (state.mode === 'audio') {
    body = renderAudio();
  }

  const overallProgress = state.deck.length ? (state.index / state.deck.length) * 100 : 0;

  return `
    <main class="study">
      <div class="container">
        <div class="study-header">
          <button class="back-btn" data-action="home">← BACK</button>
          <div class="study-title">
            <div class="study-title-label mono">DAILY DRILL · ${formatDateForDisplay(todayString())}</div>
            <div class="study-title-name">${progress.total} Codes <span class="daily-source-tag mono">STREAK · ${streak}</span></div>
          </div>
          <div class="study-controls">
            <button class="icon-btn ${state.shuffleOn ? 'active' : ''}" data-action="toggle-shuffle" title="Order: Random / Numeric (toggle)">
              ${shuffleIcon()}
            </button>
            <button class="icon-btn ${state.reversed ? 'active' : ''}" data-action="toggle-reverse" title="Reverse (meaning → code)">
              ${reverseIcon()}
            </button>
          </div>
        </div>

        <div class="mode-tabs" style="grid-template-columns: repeat(3, 1fr);">
          <button class="mode-tab ${state.mode === 'flashcard' ? 'active' : ''}" data-action="mode" data-mode="flashcard">Flashcards</button>
          <button class="mode-tab ${state.mode === 'quiz' ? 'active' : ''}" data-action="mode" data-mode="quiz">Multiple Choice</button>
          <button class="mode-tab ${state.mode === 'audio' ? 'active' : ''}" data-action="mode" data-mode="audio">Audio</button>
        </div>

        ${!isEnd ? `
          <div class="progress-strip">
            <span class="counter mono">${String(state.index + 1).padStart(2, '0')} / ${String(state.deck.length).padStart(2, '0')}</span>
            ${state.reviewRoundNum > 0 ? `<span class="review-badge">↻ Review ${state.reviewRoundNum}</span>` : ''}
            <div class="track"><div class="fill" style="width: ${overallProgress}%"></div></div>
            ${state.mode === 'quiz' ? `
              <span class="quiz-score mono">
                <span class="correct-num">${state.quizCorrect}✓</span>
                &nbsp;
                <span class="wrong-num">${state.quizWrong}✗</span>
              </span>
            ` : `
              <span class="quiz-score mono">DAILY: ${progress.flashcardSeen + progress.quizAnswered > 0 ? Math.max(progress.flashcardPct, progress.quizPct) : 0}%</span>
            `}
          </div>
        ` : ''}

        ${body}
      </div>
    </main>
  `;
}

function renderDailyComplete() {
  const progress = getDailyProgress();
  const streak = storage.getDisplayStreak();
  const justCompleted = progress.isCompletedToday;
  const stillLearning = getStillLearningInRound();
  const hasReview = stillLearning.length > 0;
  const isFinal = !hasReview && state.reviewRoundNum > 0;

  const heading = isFinal
    ? 'All Cards Mastered'
    : (state.reviewRoundNum > 0 ? `Review Round ${state.reviewRoundNum} Complete` : (justCompleted ? 'Daily Drill Complete' : 'Round Complete'));

  let subhead;
  if (isFinal) {
    subhead = `You've worked through all the cards you marked for review.`;
  } else if (hasReview) {
    subhead = `${stillLearning.length} card${stillLearning.length === 1 ? '' : 's'} still need${stillLearning.length === 1 ? 's' : ''} review.`;
  } else if (justCompleted) {
    subhead = `Great work — you've finished today's set. Streak: ${streak} ${streak === 1 ? 'day' : 'days'}.`;
  } else {
    subhead = 'Keep going through the cards in another mode, or grab a fresh batch.';
  }

  return `
    <div class="complete-panel">
      <div class="complete-icon">${isFinal ? '★' : (justCompleted ? '✓' : '↻')}</div>
      <h2>${heading}</h2>
      <p>${subhead}</p>
      <div class="complete-stats">
        <div class="cs correct">
          <div class="cs-value mono">${progress.flashcardSeen}/${progress.total}</div>
          <div class="cs-label mono">Flashcards</div>
        </div>
        <div class="cs total">
          <div class="cs-value mono">${progress.quizAnswered}/${progress.total}</div>
          <div class="cs-label mono">Multiple Choice</div>
        </div>
        <div class="cs ${justCompleted ? 'correct' : 'wrong'}">
          <div class="cs-value mono">${streak}</div>
          <div class="cs-label mono">Day Streak</div>
        </div>
      </div>
      <div class="complete-actions">
        ${hasReview ? `
          <button class="action-btn mastered" data-action="review-round">↻ REVIEW ${stillLearning.length} ${state.mode === 'flashcard' ? 'STILL LEARNING' : 'WRONG'}</button>
        ` : ''}
        <button class="action-btn learning" data-action="restart-daily">↻ ${hasReview ? 'ENTIRE SET' : 'REVIEW SAME SET'}</button>
        ${state.mode === 'flashcard' ? `
          <button class="action-btn learning" data-action="switch-to-quiz">→ TRY MULTIPLE CHOICE</button>
        ` : `
          <button class="action-btn learning" data-action="switch-to-flashcard">→ TRY FLASHCARDS</button>
        `}
        <button class="action-btn learning" data-action="next-batch-and-go">↻ NEW BATCH</button>
        <button class="action-btn learning" data-action="home">← HOME</button>
      </div>
    </div>
  `;
}



function renderFlashcard() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const mastery = storage.getMastery(card.id);
  const frontVal = state.reversed ? card.meaning : card.code;
  const backVal = state.reversed ? card.code : card.meaning;
  const frontLabel = state.reversed ? 'MEANING' : 'CODE';
  const backLabel = state.reversed ? 'CODE' : 'MEANING';
  const isLargeFront = !state.reversed;
  const isLargeBack = state.reversed;

  return `
    <div class="card-stage">
      <div class="flashcard ${state.flipped ? 'flipped' : ''}" data-action="flip-card">
        <div class="card-face front">
          <div class="card-label mono">${frontLabel}</div>
          <div class="card-mastery ${mastery} mono">${mastery}</div>
          <div class="${isLargeFront ? 'card-code mono' : 'card-meaning'}">${escapeHtml(frontVal)}</div>
          <div class="card-hint mono">TAP OR PRESS SPACE TO REVEAL</div>
        </div>
        <div class="card-face back">
          <div class="card-label mono">${backLabel}</div>
          <div class="card-mastery ${mastery} mono">${mastery}</div>
          <div class="${isLargeBack ? 'card-code mono' : 'card-meaning'}">${escapeHtml(backVal)}</div>
          <div class="card-back-code mono">${escapeHtml(card.code)} — ${escapeHtml(card.meaning)}</div>
          <div class="card-hint mono">MARK YOUR PROGRESS BELOW</div>
        </div>
      </div>

      <div class="card-actions">
        <button class="action-btn learning" data-action="mark" data-status="learning">
          <span class="key">1</span>
          Still Learning
        </button>
        <button class="action-btn mastered" data-action="mark" data-status="mastered">
          <span class="key">2</span>
          Got It
        </button>
      </div>

      <div class="nav-arrows">
        <button class="nav-arrow" data-action="prev" ${state.index === 0 ? 'disabled' : ''}>← PREV</button>
        <button class="nav-arrow" data-action="next">NEXT →</button>
      </div>

      <div class="kbd-help">
        <span><span class="kbd">SPACE</span> FLIP</span>
        <span><span class="kbd">←</span> <span class="kbd">→</span> NAVIGATE</span>
        <span><span class="kbd">1</span> LEARNING</span>
        <span><span class="kbd">2</span> MASTERED</span>
      </div>
    </div>
  `;
}

/* ---------- QUIZ ---------- */

function renderQuiz() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const question = state.reversed ? card.meaning : card.code;
  const answerKey = state.reversed ? 'code' : 'meaning';
  const prompt = state.reversed ? 'What is the code for:' : 'What does this signal mean?';

  const options = state.quizOptions.map((opt, i) => {
    const letter = String.fromCharCode(65 + i); // A, B, C, D
    let cls = '';
    if (state.quizAnswered) {
      if (opt.id === card.id) cls = 'correct';
      else if (opt.id === state.quizChoice) cls = 'incorrect';
    }
    return `
      <button class="quiz-option ${cls}" data-action="quiz-pick" data-id="${opt.id}" ${state.quizAnswered ? 'disabled' : ''}>
        <span class="opt-key mono">${letter}</span>
        <span>${escapeHtml(opt[answerKey])}</span>
      </button>
    `;
  }).join('');

  return `
    <div class="quiz-panel">
      <div class="quiz-prompt mono">${prompt}</div>
      <div class="quiz-code mono">${escapeHtml(question)}</div>
      <div class="quiz-options">${options}</div>
      <div class="quiz-footer">
        <div class="quiz-score mono">
          SESSION: <span class="correct-num">${state.quizCorrect} correct</span>
          &nbsp;·&nbsp;
          <span class="wrong-num">${state.quizWrong} wrong</span>
        </div>
        ${state.quizAnswered ? `
          <button class="next-btn" data-action="next">NEXT <span>→</span></button>
        ` : ''}
      </div>
    </div>
    <div class="kbd-help">
      <span><span class="kbd">1</span>–<span class="kbd">4</span> SELECT</span>
      <span><span class="kbd">ENTER</span> NEXT</span>
    </div>
  `;
}

/* ---------- TYPE ---------- */

function renderType() {
  const card = currentCard();
  if (!card) return renderEmpty();
  const question = state.reversed ? card.meaning : card.code;
  const answer = state.reversed ? card.code : card.meaning;
  const prompt = state.reversed ? 'What is the code for:' : 'What does this signal mean?';

  let inputCls = '';
  let feedback = '';
  if (state.typeChecked) {
    inputCls = state.typeCorrect ? 'correct' : 'incorrect';
    const fbLabel = state.typeCorrect ? '✓ CORRECT' : '✗ CORRECT ANSWER:';
    const overrideLabel = state.typeCorrect ? 'MARK AS WRONG' : 'MARK AS CORRECT';
    const overrideIcon = state.typeCorrect ? '✗' : '✓';
    feedback = `
      <div class="type-feedback show ${state.typeCorrect ? 'correct' : 'incorrect'}">
        <div class="fb-row">
          <div class="fb-content">
            <div class="fb-label mono">${fbLabel}</div>
            <div class="fb-answer">${escapeHtml(answer)}</div>
          </div>
          <button class="override-btn" data-action="type-override" title="Override the auto-judgment">
            <span>${overrideIcon}</span>
            <span class="override-btn-text">${overrideLabel}</span>
          </button>
        </div>
        ${state.typeOverridden ? `<div class="override-applied mono">↻ Overridden — counted as ${state.typeCorrect ? 'correct' : 'wrong'}</div>` : ''}
      </div>
    `;
  }

  return `
    <div class="quiz-panel">
      <div class="quiz-prompt mono">${prompt}</div>
      <div class="quiz-code mono">${escapeHtml(question)}</div>
      <div class="type-input-row">
        <input
          type="text"
          class="type-input ${inputCls}"
          id="type-input"
          placeholder="Type your answer…"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          ${state.typeChecked ? 'disabled' : ''}
        >
        ${!state.typeChecked
          ? `<button class="submit-btn" data-action="type-submit">CHECK</button>`
          : `<button class="next-btn" data-action="next">NEXT →</button>`
        }
      </div>
      ${feedback}
      <div class="quiz-footer">
        <div class="quiz-score mono">
          SESSION: <span class="correct-num">${state.quizCorrect} correct</span>
          &nbsp;·&nbsp;
          <span class="wrong-num">${state.quizWrong} wrong</span>
        </div>
      </div>
    </div>
    <div class="kbd-help">
      <span><span class="kbd">ENTER</span> CHECK / NEXT</span>
      ${state.typeChecked ? `<span><span class="kbd">O</span> OVERRIDE</span>` : ''}
    </div>
  `;
}

/* ---------- EMPTY / COMPLETE ---------- */

/* ---------- AUDIO ---------- */

function renderAudio() {
  const card = currentCard();
  if (!card) return renderEmpty();

  if (!audio.available) {
    return `
      <div class="audio-stage">
        <div class="audio-unsupported">
          <h3>Audio mode unavailable</h3>
          <p>Your browser doesn't support speech synthesis. Try Chrome, Safari, or Edge.</p>
        </div>
      </div>
    `;
  }

  const phase = state.audioPhase;
  const isSpeaking = phase === 'speaking-prompt' || phase === 'speaking-answer';
  const isPaused = phase === 'pause';
  const isAnswered = phase === 'answered';
  const showAnswer = isPaused === false && (isAnswered || phase === 'speaking-answer');
  const mastery = storage.getMastery(card.id);

  let phaseLabel, phaseClass, indicator;
  if (phase === 'speaking-prompt') {
    phaseLabel = 'PRESENTING CODE';
    phaseClass = 'speaking';
    indicator = '<span class="indicator"></span>';
  } else if (phase === 'pause') {
    phaseLabel = 'YOUR TURN — SAY IT OUT LOUD';
    phaseClass = 'pause';
    indicator = '';
  } else if (phase === 'speaking-answer') {
    phaseLabel = 'REVEALING ANSWER';
    phaseClass = 'speaking';
    indicator = '<span class="indicator"></span>';
  } else if (phase === 'answered') {
    phaseLabel = 'MARK YOUR PROGRESS';
    phaseClass = 'answered';
    indicator = '';
  } else {
    phaseLabel = 'READY';
    phaseClass = '';
    indicator = '';
  }

  // Center visual: waveform when speaking, ring when pausing, blank otherwise
  let visual = '';
  if (isSpeaking) {
    visual = `
      <div class="audio-waveform active">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
      </div>
    `;
  } else if (isPaused) {
    visual = `
      <div class="pause-ring">
        <svg viewBox="0 0 60 60">
          <circle class="ring-bg" cx="30" cy="30" r="26"></circle>
          <circle class="ring-fill" id="pause-ring-fill" cx="30" cy="30" r="26"
            stroke-dasharray="163.36" stroke-dashoffset="0"></circle>
        </svg>
        <div class="ring-text" id="pause-ring-text">${state.audioPauseSec}</div>
      </div>
    `;
  }

  // Action buttons depend on phase
  let actions;
  if (phase === 'idle') {
    actions = `
      <button class="audio-btn primary" data-action="audio-play">▶ START</button>
      <button class="audio-btn secondary" data-action="audio-skip">SKIP →</button>
    `;
  } else if (isSpeaking || isPaused) {
    actions = `
      <button class="audio-btn secondary" data-action="audio-stop">■ STOP</button>
      ${isPaused ? `<button class="audio-btn primary" data-action="audio-skip-pause">REVEAL NOW →</button>` : ''}
    `;
  } else if (isAnswered) {
    actions = `
      <button class="audio-btn learning" data-action="audio-mark" data-status="learning">
        STILL LEARNING
      </button>
      <button class="audio-btn mastered" data-action="audio-mark" data-status="mastered">
        GOT IT
      </button>
      <button class="audio-btn secondary" data-action="audio-replay">↻ REPLAY</button>
    `;
  }

  // Voice picker
  const voiceOpts = (state.audioVoices || []).map(v =>
    `<option value="${escapeHtml(v.voiceURI)}" ${v.voiceURI === state.audioVoiceURI ? 'selected' : ''}>${escapeHtml(v.name)}</option>`
  ).join('');

  const pauseChips = [2, 4, 6, 8].map(n =>
    `<button class="chip ${state.audioPauseSec === n ? 'active' : ''}" data-action="audio-set-pause" data-sec="${n}">${n}s</button>`
  ).join('');

  // Voice input panel — shown during pause and answered phases when enabled
  let voicePanel = '';
  if (state.voiceInputOn && (isPaused || isAnswered)) {
    if (!recognizer.available) {
      voicePanel = `
        <div class="voice-panel">
          <div class="voice-unsupported">
            Voice input isn't supported in this browser.<br>
            Try Chrome or Edge for hands-free answering.
          </div>
        </div>
      `;
    } else {
      let heardBlock = '';
      if (state.voiceError) {
        const msg = state.voiceError === 'not-allowed'
          ? 'Microphone access denied. Check your browser permissions.'
          : state.voiceError === 'no-speech'
          ? "Didn't catch that — try speaking again."
          : 'Voice recognition error — try again or mark manually.';
        heardBlock = `<div class="voice-error">${msg}</div>`;
      } else if (state.voiceHeard) {
        const v = state.voiceJudged;
        heardBlock = `
          <div class="voice-heard ${v || ''}">
            <div class="voice-heard-label mono">I heard</div>
            <div class="voice-heard-text">"${escapeHtml(state.voiceHeard)}"</div>
            ${v ? `<div class="voice-heard-verdict ${v}">${v === 'correct' ? '✓ Match' : '✗ No match'}</div>` : ''}
          </div>
          ${v ? `
            <div class="audio-controls" style="margin-top: 4px;">
              <button class="audio-btn ${v === 'correct' ? 'mastered' : 'learning'}" data-action="voice-accept">
                ${v === 'correct' ? '✓ ACCEPT — GOT IT' : '✗ ACCEPT — STILL LEARNING'}
              </button>
              <button class="audio-btn secondary" data-action="voice-override">
                ↻ ${v === 'correct' ? 'I WAS WRONG' : 'I WAS RIGHT'}
              </button>
              <button class="audio-btn secondary" data-action="voice-listen">↻ RETRY</button>
            </div>
          ` : ''}
        `;
      }

      const micLabel = state.voiceListening ? 'LISTENING — SPEAK NOW' : 'TAP MIC & SAY THE ANSWER';
      voicePanel = `
        <div class="voice-panel">
          <button class="voice-mic-btn ${state.voiceListening ? 'listening' : ''}" data-action="voice-listen" title="Speak your answer">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <div class="voice-status ${state.voiceListening ? 'listening' : ''} mono">${micLabel}</div>
          ${heardBlock}
        </div>
      `;
    }
  }

  return `
    <div class="audio-stage">
      <div class="audio-display">
        <div class="audio-phase-label ${phaseClass} mono">${indicator}${phaseLabel}</div>

        ${visual}

        <div class="audio-code mono">${escapeHtml(card.code)}</div>
        ${showAnswer
          ? `<div class="audio-meaning">${escapeHtml(card.meaning)}</div>`
          : `<div class="audio-meaning hidden">— answer hidden —</div>`
        }
      </div>

      ${voicePanel}

      <div class="audio-controls">${actions}</div>

      <div class="audio-settings">
        <div class="audio-setting">
          <span>VOICE</span>
          <select data-action="audio-set-voice">${voiceOpts}</select>
        </div>
        <div class="audio-setting">
          <span>PAUSE</span>
          ${pauseChips}
        </div>
        <div class="audio-setting">
          <span>AUTO-ADVANCE</span>
          <button class="chip ${state.audioAutoAdvance ? 'active' : ''}" data-action="audio-toggle-auto">
            ${state.audioAutoAdvance ? 'ON' : 'OFF'}
          </button>
        </div>
        <div class="audio-setting">
          <span>VOICE INPUT</span>
          <button class="chip ${state.voiceInputOn ? 'active' : ''}" data-action="audio-toggle-voice-input">
            ${state.voiceInputOn ? 'ON' : 'OFF'}
          </button>
        </div>
      </div>

      <div class="kbd-help">
        <span><span class="kbd">SPACE</span> PLAY/STOP</span>
        ${state.voiceInputOn && recognizer.available ? `<span><span class="kbd">M</span> MIC</span>` : ''}
        <span><span class="kbd">1</span> LEARNING</span>
        <span><span class="kbd">2</span> GOT IT</span>
        <span><span class="kbd">→</span> NEXT</span>
      </div>
    </div>
  `;
}

/* ---------- AUDIO SEQUENCER ---------- */

function audioPlayCurrent() {
  const card = currentCard();
  if (!card) return;

  audio.cancel();
  state.audioPhase = 'speaking-prompt';
  render();

  const promptText = audio.speakable(card.code, true);
  audio.speak(promptText, {
    onEnd: () => {
      // Move to pause phase
      state.audioPhase = 'pause';
      render();
      animatePauseRing(state.audioPauseSec, () => {
        // After pause, speak the answer
        if (state.audioPhase !== 'pause') return; // user interrupted
        state.audioPhase = 'speaking-answer';
        render();
        const answerText = audio.speakable(card.meaning, false);
        audio.speak(answerText, {
          onEnd: () => {
            state.audioPhase = 'answered';
            render();
          },
          onCancel: () => {
            state.audioPhase = 'idle';
            render();
          },
        });
      });
    },
    onCancel: () => {
      state.audioPhase = 'idle';
      render();
    },
  });
}

function animatePauseRing(seconds, onDone) {
  const total = seconds * 1000;
  const startedAt = Date.now();
  const tick = () => {
    if (state.audioPhase !== 'pause') return;
    const elapsed = Date.now() - startedAt;
    const remaining = Math.max(0, total - elapsed);
    const ringFill = document.getElementById('pause-ring-fill');
    const ringText = document.getElementById('pause-ring-text');
    if (ringFill) {
      const circumference = 163.36;
      const offset = circumference * (elapsed / total);
      ringFill.style.strokeDashoffset = Math.min(circumference, offset);
    }
    if (ringText) {
      ringText.textContent = Math.ceil(remaining / 1000);
    }
    if (remaining <= 0) {
      if (onDone) onDone();
    } else {
      requestAnimationFrame(tick);
    }
  };
  requestAnimationFrame(tick);
}

function audioStop() {
  audio.cancel();
  recognizer.stop();
  state.voiceListening = false;
  state.audioPhase = 'idle';
  render();
}

function audioSkipPause() {
  if (state.audioPhase !== 'pause') return;
  audio.cancel();
  // Trigger answer phase immediately
  const card = currentCard();
  if (!card) return;
  state.audioPhase = 'speaking-answer';
  render();
  const answerText = audio.speakable(card.meaning, false);
  audio.speak(answerText, {
    onEnd: () => {
      state.audioPhase = 'answered';
      render();
    },
    onCancel: () => {
      state.audioPhase = 'idle';
      render();
    },
  });
}

function audioMark(status) {
  markCurrent(status);
  audioAdvanceOrEnd();
}

function audioAdvanceOrEnd() {
  // Clear voice-input session state when moving on
  recognizer.stop();
  state.voiceListening = false;
  state.voiceHeard = null;
  state.voiceJudged = null;
  state.voiceError = null;

  if (state.index < state.deck.length - 1) {
    state.index++;
    state.audioPhase = 'idle';
    if (state.audioAutoAdvance) {
      render();
      // tiny delay so the new card paints before TTS starts
      setTimeout(() => audioPlayCurrent(), 200);
    } else {
      render();
    }
  } else {
    state.index = state.deck.length;
    state.audioPhase = 'idle';
    render();
  }
}

/* ---------- VOICE INPUT ---------- */

// Start listening for the user's spoken answer.
function voiceStartListening() {
  if (!recognizer.available) return;
  const card = currentCard();
  if (!card) return;

  state.voiceListening = true;
  state.voiceHeard = null;
  state.voiceJudged = null;
  state.voiceError = null;
  render();

  recognizer.start({
    onResult: (alternatives) => {
      // The recognizer gives several alternative transcripts; judge against
      // whichever one scores best, so a near-miss transcription still passes.
      const card2 = currentCard();
      if (!card2) return;
      const target = card2.meaning;        // audio mode always asks code -> meaning
      const targetCode = card2.code;

      let bestTranscript = alternatives[0] || '';
      let matched = false;

      for (const alt of alternatives) {
        const comparable = transcriptToComparable(alt);
        // Accept a match against the meaning OR the code (some users say the code back)
        if (isAnswerCorrect(comparable, target) || isAnswerCorrect(alt, target)
            || isAnswerCorrect(comparable, targetCode) || isAnswerCorrect(alt, targetCode)) {
          matched = true;
          bestTranscript = alt;
          break;
        }
      }

      state.voiceHeard = bestTranscript;
      state.voiceJudged = matched ? 'correct' : 'wrong';
      state.voiceListening = false;
      render();
    },
    onError: (reason) => {
      state.voiceError = reason;
      state.voiceListening = false;
      render();
    },
    onEnd: () => {
      // If recognition ended with no result and no error, just stop the spinner
      if (state.voiceListening) {
        state.voiceListening = false;
        render();
      }
    },
  });
}

function voiceToggleListening() {
  if (state.voiceListening) {
    recognizer.stop();
    state.voiceListening = false;
    render();
  } else {
    voiceStartListening();
  }
}

// Apply the voice verdict: mark the card and advance, same as a manual mark.
function voiceAcceptVerdict() {
  if (!state.voiceJudged) return;
  const status = state.voiceJudged === 'correct' ? 'mastered' : 'learning';
  audioMark(status);
}

function renderEmpty() {
  return `
    <div class="empty-state">
      <h3>No cards available</h3>
      <p>Adjust your settings to include more cards.</p>
      <button class="empty-btn" data-action="home">Back to Home</button>
    </div>
  `;
}

function renderComplete() {
  const total = state.deck.length;
  const isMasteredReview = state.specialDeck === 'mastered';
  const stats = state.category ? getCategoryStats(state.category) : null;
  const masteredStats = isMasteredReview ? getMasteredStats() : null;
  const stillLearning = getStillLearningInRound();
  const masteredThisRound = state.deck.filter(c => state.roundResults[c.id] === 'mastered').length;
  const hasReview = stillLearning.length > 0;
  const isFinal = !hasReview && state.reviewRoundNum > 0;

  const heading = isFinal
    ? 'All Cards Mastered'
    : (state.reviewRoundNum > 0 ? `Review Round ${state.reviewRoundNum} Complete` : 'Round Complete');

  const subhead = isFinal
    ? `You've worked through all the cards you marked for review.`
    : (hasReview
        ? `${stillLearning.length} card${stillLearning.length === 1 ? '' : 's'} still need${stillLearning.length === 1 ? 's' : ''} review.`
        : `You've worked through all ${total} cards in this round.`);

  // Right-most stat depends on context
  const rightStat = isMasteredReview
    ? `<div class="cs total">
         <div class="cs-value mono">${masteredStats.total}</div>
         <div class="cs-label mono">Mastered Total</div>
       </div>`
    : `<div class="cs total">
         <div class="cs-value mono">${stats.mastered}/${stats.total}</div>
         <div class="cs-label mono">Overall</div>
       </div>`;

  return `
    <div class="complete-panel">
      <div class="complete-icon">${isFinal ? '★' : '✓'}</div>
      <h2>${heading}</h2>
      <p>${subhead}</p>
      <div class="complete-stats">
        ${state.mode !== 'flashcard' ? `
          <div class="cs correct">
            <div class="cs-value mono">${state.quizCorrect}</div>
            <div class="cs-label mono">Correct</div>
          </div>
          <div class="cs wrong">
            <div class="cs-value mono">${state.quizWrong}</div>
            <div class="cs-label mono">Wrong</div>
          </div>
          <div class="cs total">
            <div class="cs-value mono">${state.quizCorrect + state.quizWrong ? Math.round(state.quizCorrect / (state.quizCorrect + state.quizWrong) * 100) : 0}%</div>
            <div class="cs-label mono">Accuracy</div>
          </div>
        ` : `
          <div class="cs correct">
            <div class="cs-value mono">${masteredThisRound}</div>
            <div class="cs-label mono">Got It</div>
          </div>
          <div class="cs wrong">
            <div class="cs-value mono">${stillLearning.length}</div>
            <div class="cs-label mono">Still Learning</div>
          </div>
          ${rightStat}
        `}
      </div>
      <div class="complete-actions">
        ${hasReview ? `
          <button class="action-btn mastered" data-action="review-round">↻ REVIEW ${stillLearning.length} ${state.mode === 'flashcard' ? 'STILL LEARNING' : 'WRONG'}</button>
        ` : ''}
        <button class="action-btn learning" data-action="restart">↻ ${hasReview ? 'ENTIRE DECK' : 'REVIEW AGAIN'}</button>
        <button class="action-btn learning" data-action="home">← BACK TO HOME</button>
      </div>
    </div>
  `;
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */

function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });

  // Voice picker (select element fires 'change', not 'click')
  const voiceSelect = document.querySelector('select[data-action="audio-set-voice"]');
  if (voiceSelect) {
    voiceSelect.addEventListener('change', (e) => {
      state.audioVoiceURI = e.target.value;
      // Don't re-render mid-speech, just update selection silently
    });
  }

  // Test count slider (input event, not click). Direct handler bypasses
  // the data-action click loop so dragging doesn't fire a competing event.
  const slider = document.getElementById('test-count-slider');
  if (slider) {
    slider.addEventListener('input', (e) => {
      handleSliderChange(parseInt(e.target.value));
    });
  }

  // Type-mix sliders — same pattern as the count slider above.
  ['type-mix-fill', 'type-mix-mc', 'type-mix-tf'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = id.split('-').pop(); // 'fill', 'mc', or 'tf'
    el.addEventListener('input', (e) => {
      handleTypeMixChange(key, parseInt(e.target.value));
    });
  });

  // Focus typing input when in type mode; blur it once answer's been checked
  // so the global keyboard handler can advance on Enter.
  if ((state.view === 'study' || state.view === 'daily') && state.mode === 'type') {
    const input = document.getElementById('type-input');
    if (input) {
      if (!state.typeChecked) {
        input.focus();
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            e.preventDefault();
            // Stop the same Enter event from bubbling to the document listener,
            // which would otherwise immediately advance past the feedback.
            e.stopPropagation();
            submitTyped();
          }
        });
      } else {
        // Move focus off the disabled input so global Enter handler catches advance
        input.blur();
      }
    }
  }

  // Test-mode input handling: capture answers, advance focus on Enter,
  // and tick the elapsed timer once per second without re-rendering everything.
  if (state.view === 'test') {
    const inputs = document.querySelectorAll('.test-q-input');
    inputs.forEach((input, idx) => {
      input.addEventListener('input', e => {
        const qIdx = parseInt(e.target.dataset.qIndex);
        state.testAnswers[qIdx] = e.target.value;
        // Toggle the .answered class on the parent .test-q
        const q = e.target.closest('.test-q');
        if (q) q.classList.toggle('answered', e.target.value.trim() !== '');
        updateAnsweredCount();
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          e.stopPropagation();
          // Move to next fill-in input, or submit if last
          const next = inputs[idx + 1];
          if (next) next.focus();
          else submitTest();
        }
      });
    });

    // Live timer tick (avoids full re-render churn on every second)
    if (state._testTimerInterval) clearInterval(state._testTimerInterval);
    state._testTimerInterval = setInterval(() => {
      if (state.view !== 'test') {
        clearInterval(state._testTimerInterval);
        state._testTimerInterval = null;
        return;
      }
      const el = document.getElementById('test-timer');
      if (el && state.testStartedAt) {
        el.textContent = formatDuration(Date.now() - state.testStartedAt);
      }
    }, 1000);
  } else if (state._testTimerInterval) {
    clearInterval(state._testTimerInterval);
    state._testTimerInterval = null;
  }

  // Close settings when clicking outside
  if (state.settingsOpen) {
    setTimeout(() => {
      document.addEventListener('click', closeSettingsOutside, { once: true });
    }, 0);
  }
  if (state.dailySettingsOpen) {
    setTimeout(() => {
      document.addEventListener('click', closeDailySettingsOutside, { once: true });
    }, 0);
  }
}

function closeSettingsOutside(e) {
  if (!e.target.closest('#settings-panel') && !e.target.closest('[data-action="toggle-settings"]')) {
    state.settingsOpen = false;
    render();
  }
}

function closeDailySettingsOutside(e) {
  if (!e.target.closest('#daily-settings-panel') && !e.target.closest('[data-action="toggle-daily-settings"]') && !e.target.closest('[data-action="set-cards-per-day"]')) {
    state.dailySettingsOpen = false;
    render();
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  switch (action) {
    case 'home':
      goHome();
      break;

    case 'open-category':
      openCategory(el.dataset.category);
      break;

    case 'mode':
      setMode(el.dataset.mode);
      break;

    case 'flip-card':
      state.flipped = !state.flipped;
      render();
      break;

    case 'mark':
      markCurrent(el.dataset.status);
      next();
      break;

    case 'next':
      next();
      break;

    case 'prev':
      prev();
      break;

    case 'toggle-shuffle':
      state.shuffleOn = !state.shuffleOn;
      storage.setShuffle(state.shuffleOn);
      buildDeck();
      render();
      break;

    case 'toggle-reverse':
      state.reversed = !state.reversed;
      storage.setReversed(state.reversed);
      state.flipped = false;
      render();
      break;

    case 'toggle-settings':
      state.settingsOpen = !state.settingsOpen;
      render();
      break;

    case 'toggle-only-learning':
      state.onlyLearning = !state.onlyLearning;
      buildDeck();
      render();
      break;

    case 'reset-category':
      if (confirm('Reset progress for this category? This cannot be undone.')) {
        storage.resetCategory(state.category);
        state.settingsOpen = false;
        render();
      }
      break;

    case 'quiz-pick':
      handleQuizPick(el.dataset.id);
      break;

    case 'type-submit':
      submitTyped();
      break;

    case 'type-override':
      overrideTypeJudgment();
      break;

    case 'restart':
      buildDeck();
      state.quizCorrect = 0;
      state.quizWrong = 0;
      render();
      break;

    case 'review-round':
      startReviewRound();
      break;

    case 'audio-play':
      audioPlayCurrent();
      break;

    case 'audio-stop':
      audioStop();
      break;

    case 'audio-skip-pause':
      audioSkipPause();
      break;

    case 'audio-replay':
      audioPlayCurrent();
      break;

    case 'audio-skip':
      audio.cancel();
      audioAdvanceOrEnd();
      break;

    case 'audio-mark':
      audioMark(el.dataset.status);
      break;

    case 'audio-set-pause':
      state.audioPauseSec = parseInt(el.dataset.sec);
      render();
      break;

    case 'audio-toggle-auto':
      state.audioAutoAdvance = !state.audioAutoAdvance;
      render();
      break;

    case 'audio-toggle-voice-input':
      state.voiceInputOn = !state.voiceInputOn;
      storage.data.settings.voiceInputOn = state.voiceInputOn;
      storage.save();
      if (!state.voiceInputOn) {
        recognizer.stop();
        state.voiceListening = false;
        state.voiceHeard = null;
        state.voiceJudged = null;
        state.voiceError = null;
      }
      render();
      break;

    case 'voice-listen':
      voiceToggleListening();
      break;

    case 'voice-accept':
      voiceAcceptVerdict();
      break;

    case 'voice-override':
      // Flip the verdict, then accept it
      if (state.voiceJudged === 'correct') state.voiceJudged = 'wrong';
      else if (state.voiceJudged === 'wrong') state.voiceJudged = 'correct';
      voiceAcceptVerdict();
      break;

    case 'start-daily':
      startDaily();
      break;

    case 'start-mastered-review':
      startMasteredReview();
      break;

    case 'open-test-config':
      startTestConfig();
      break;

    case 'toggle-test-category': {
      const id = el.dataset.category;
      const current = resolveTestCategories(state.testConfig.category);
      let next;
      if (current.includes(id)) {
        next = current.filter(c => c !== id);
      } else {
        next = [...current, id];
      }
      // If now all selected, normalize back to 'all' sentinel
      const allIds = Object.keys(ALL_CARDS);
      if (next.length === allIds.length && allIds.every(a => next.includes(a))) {
        state.testConfig.category = 'all';
      } else {
        state.testConfig.category = next;
      }
      storage.saveTestConfig(state.testConfig);
      render();
      break;
    }

    case 'set-test-cats-all':
      state.testConfig.category = 'all';
      storage.saveTestConfig(state.testConfig);
      render();
      break;

    case 'set-test-cats-clear':
      state.testConfig.category = [];
      storage.saveTestConfig(state.testConfig);
      render();
      break;

    case 'set-type-mix-preset': {
      const presets = {
        balanced:    { fill: 30, mc: 35, tf: 35 },
        recall:      { fill: 60, mc: 20, tf: 20 },
        recognition: { fill: 0,  mc: 50, tf: 50 },
      };
      const preset = presets[el.dataset.preset];
      if (preset) {
        state.testConfig.typeMix = { ...preset };
        storage.saveTestConfig(state.testConfig);
        render();
      }
      break;
    }

    // Backward compat: old single-select category buttons (no longer rendered, but
    // keep the handler in case of any lingering references)
    case 'set-test-category':
      state.testConfig.category = el.dataset.category;
      storage.saveTestConfig(state.testConfig);
      render();
      break;

    case 'set-test-count-all':
      if (state.testConfig.questionCount === 'all') {
        // Going from All back to slider — restore the last slider value or default
        const last = state.testConfig._lastSliderValue;
        state.testConfig.questionCount = typeof last === 'number' ? last : 100;
      } else {
        // Save current value so we can restore it on toggle back
        if (typeof state.testConfig.questionCount === 'number') {
          state.testConfig._lastSliderValue = state.testConfig.questionCount;
        }
        state.testConfig.questionCount = 'all';
      }
      storage.saveTestConfig(state.testConfig);
      render();
      break;

    case 'set-test-mc': {
      const qIdx = parseInt(el.dataset.qIndex);
      const optIdx = parseInt(el.dataset.optionIndex);
      state.testAnswers[qIdx] = optIdx;
      // Update UI without full re-render (so scroll position is preserved)
      const container = el.closest('.test-q-mc-options');
      if (container) {
        container.querySelectorAll('.test-q-mc-option').forEach((opt, oi) => {
          opt.classList.toggle('selected', oi === optIdx);
        });
        const card = el.closest('.test-q');
        if (card) card.classList.add('answered');
      }
      updateAnsweredCount();
      break;
    }

    case 'set-test-tf': {
      const qIdx = parseInt(el.dataset.qIndex);
      const val = el.dataset.value === 'true';
      state.testAnswers[qIdx] = val;
      const container = el.closest('.test-q-tf-options');
      if (container) {
        container.querySelectorAll('.test-q-tf-option').forEach(opt => {
          const isTrue = opt.dataset.value === 'true';
          const isSelectedSide = isTrue === val;
          opt.classList.remove('selected', 'true', 'false');
          if (isSelectedSide) {
            opt.classList.add('selected', val ? 'true' : 'false');
          }
        });
        const card = el.closest('.test-q');
        if (card) card.classList.add('answered');
      }
      updateAnsweredCount();
      break;
    }

    case 'set-test-direction':
      state.testConfig.direction = el.dataset.direction;
      render();
      break;

    case 'set-test-order':
      state.testConfig.order = el.dataset.order;
      render();
      break;

    case 'set-test-strict':
      state.testConfig.strict = el.dataset.strict === 'true';
      render();
      break;

    case 'start-test':
      startTest();
      break;

    case 'submit-test':
      submitTest();
      break;

    case 'abandon-test':
      abandonTest();
      break;

    case 'override-test-answer':
      overrideTestAnswer(parseInt(el.dataset.qIndex));
      break;

    case 'toggle-daily-settings':
      state.dailySettingsOpen = !state.dailySettingsOpen;
      render();
      break;

    case 'set-cards-per-day': {
      storage.setCardsPerDay(parseInt(el.dataset.count));
      // Only regenerate today's set if it hasn't been started yet
      const dailyD = storage.getDaily();
      const prog = getDailyProgress();
      if (prog.flashcardSeen === 0 && prog.quizAnswered === 0) {
        storage.generateDailySet(dailyD.lastCompletedDate !== todayString());
      }
      render();
      break;
    }

    case 'toggle-daily-category': {
      const catId = el.dataset.category;
      const ok = storage.toggleCategory(catId);
      if (!ok) {
        // refused — keep at least one category enabled
        render();
        break;
      }
      // If no progress yet today, regenerate the set with the new filter applied immediately.
      // If they have progress, leave the current batch alone and apply on next batch.
      const dailyD = storage.getDaily();
      const prog = getDailyProgress();
      if (prog.flashcardSeen === 0 && prog.quizAnswered === 0) {
        storage.generateDailySet(dailyD.lastCompletedDate !== todayString());
      }
      render();
      break;
    }

    case 'next-batch':
      if (confirm('Start a new batch of cards for today? Your current set will be replaced.')) {
        storage.startNewBatch();
        render();
      }
      break;

    case 'next-batch-and-go':
      storage.startNewBatch();
      buildDeck();
      state.quizCorrect = 0;
      state.quizWrong = 0;
      render();
      break;

    case 'restart-daily':
      buildDeck();
      state.quizCorrect = 0;
      state.quizWrong = 0;
      render();
      break;

    case 'switch-to-quiz':
      state.mode = 'quiz';
      buildDeck();
      state.quizCorrect = 0;
      state.quizWrong = 0;
      render();
      break;

    case 'switch-to-flashcard':
      state.mode = 'flashcard';
      buildDeck();
      render();
      break;

    case 'reset-daily':
      if (confirm('Reset all daily drill progress including streak and assignment history? This cannot be undone.')) {
        storage.resetDaily();
        state.dailySettingsOpen = false;
        render();
      }
      break;
  }
}

function startDaily() {
  storage.ensureDailySession();
  state.view = 'daily';
  state.isDaily = true;
  state.specialDeck = null;
  state.category = null;
  // Default to multiple choice for learning, as user requested
  // But if they've made flashcard progress today, stay in flashcard
  const progress = getDailyProgress();
  if (progress.flashcardSeen > 0 && progress.quizAnswered === 0) {
    state.mode = 'flashcard';
  } else {
    state.mode = 'quiz';
  }
  state.quizCorrect = 0;
  state.quizWrong = 0;
  state.settingsOpen = false;
  state.dailySettingsOpen = false;
  buildDeck();
  render();
}

function startMasteredReview() {
  state.view = 'study';
  state.specialDeck = 'mastered';
  state.category = null;
  state.isDaily = false;
  state.mode = 'flashcard';  // start with flashcards; user can switch
  state.quizCorrect = 0;
  state.quizWrong = 0;
  state.settingsOpen = false;
  state.dailySettingsOpen = false;
  buildDeck();
  render();
}

function goHome() {
  audio.cancel();
  state.audioPhase = 'idle';
  state.view = 'home';
  state.category = null;
  state.isDaily = false;
  state.specialDeck = null;
  state.settingsOpen = false;
  state.dailySettingsOpen = false;
  // Clean up test session if any
  if (state._testTimerInterval) {
    clearInterval(state._testTimerInterval);
    state._testTimerInterval = null;
  }
  render();
}

function openCategory(categoryId) {
  state.view = 'study';
  state.category = categoryId;
  state.mode = 'flashcard';
  state.isDaily = false;
  state.specialDeck = null;
  state.quizCorrect = 0;
  state.quizWrong = 0;
  state.settingsOpen = false;
  buildDeck();
  render();
}

function setMode(mode) {
  if (state.mode === mode) return;
  audio.cancel();
  state.audioPhase = 'idle';
  state.mode = mode;
  state.flipped = false;
  state.quizAnswered = false;
  state.quizChoice = null;
  state.typeChecked = false;
  state.typeOverridden = false;
  state.quizCorrect = 0;
  state.quizWrong = 0;
  buildDeck();
  render();
}

function handleQuizPick(optId) {
  if (state.quizAnswered) return;
  const card = currentCard();
  state.quizAnswered = true;
  state.quizChoice = optId;
  const isCorrect = optId === card.id;
  if (isCorrect) {
    state.quizCorrect++;
    storage.setMastery(card.id, 'mastered');
    state.roundResults[card.id] = 'mastered';
  } else {
    state.quizWrong++;
    storage.setMastery(card.id, 'learning');
    state.roundResults[card.id] = 'learning';
  }
  if (state.isDaily) {
    storage.markQuizAnswered(card.id, isCorrect);
  }
  render();
}

// User can override the auto-judgment after a fuzzy-match flagged their answer.
// Flips correct <-> wrong, undoes the previous bookkeeping, and records the
// reverse: tally counters, mastery, round result, and daily progress.
function overrideTypeJudgment() {
  if (!state.typeChecked) return;
  const card = currentCard();
  if (!card) return;

  // Flip the judgment
  const wasCorrect = state.typeCorrect;
  const nowCorrect = !wasCorrect;
  state.typeCorrect = nowCorrect;
  state.typeOverridden = true;

  // Reverse the original tally
  if (wasCorrect) state.quizCorrect = Math.max(0, state.quizCorrect - 1);
  else state.quizWrong = Math.max(0, state.quizWrong - 1);

  // Apply the new tally + persistent state
  if (nowCorrect) {
    state.quizCorrect++;
    storage.setMastery(card.id, 'mastered');
    state.roundResults[card.id] = 'mastered';
  } else {
    state.quizWrong++;
    storage.setMastery(card.id, 'learning');
    state.roundResults[card.id] = 'learning';
  }

  // Daily progress flag matches the corrected judgment
  if (state.isDaily) {
    storage.markQuizAnswered(card.id, nowCorrect);
  }

  render();
}

function submitTyped() {
  if (state.typeChecked) return;
  const input = document.getElementById('type-input');
  if (!input) return;
  const card = currentCard();
  const answer = state.reversed ? card.code : card.meaning;
  const correct = isAnswerCorrect(input.value, answer);
  state.typeChecked = true;
  state.typeCorrect = correct;
  state.typeOverridden = false;
  if (correct) {
    state.quizCorrect++;
    storage.setMastery(card.id, 'mastered');
    state.roundResults[card.id] = 'mastered';
  } else {
    state.quizWrong++;
    storage.setMastery(card.id, 'learning');
    state.roundResults[card.id] = 'learning';
  }
  if (state.isDaily) {
    storage.markQuizAnswered(card.id, correct);
  }
  render();
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */

document.addEventListener('keydown', e => {
  if (state.view !== 'study' && state.view !== 'daily') return;
  if (state.index >= state.deck.length) {
    if (e.key === 'Enter') {
      buildDeck();
      state.quizCorrect = 0;
      state.quizWrong = 0;
      render();
    }
    return;
  }

  // Don't intercept keys while typing in the input
  if (document.activeElement && document.activeElement.tagName === 'INPUT') {
    return;
  }

  if (state.mode === 'flashcard') {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      state.flipped = !state.flipped;
      render();
    } else if (e.key === 'ArrowRight') {
      next();
    } else if (e.key === 'ArrowLeft') {
      prev();
    } else if (e.key === '1') {
      markCurrent('learning');
      next();
    } else if (e.key === '2') {
      markCurrent('mastered');
      next();
    }
  } else if (state.mode === 'quiz') {
    if (!state.quizAnswered) {
      const n = parseInt(e.key);
      if (n >= 1 && n <= state.quizOptions.length) {
        handleQuizPick(state.quizOptions[n - 1].id);
      }
    } else {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
        e.preventDefault();
        next();
      }
    }
  } else if (state.mode === 'type') {
    // Pre-submit Enter is handled by the input's own listener.
    // Post-submit: Enter / Space / ArrowRight advance to the next question.
    // 'o' / 'O' overrides the auto-judgment.
    if (state.typeChecked) {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
        e.preventDefault();
        next();
      } else if (e.key === 'o' || e.key === 'O') {
        e.preventDefault();
        overrideTypeJudgment();
      }
    }
  } else if (state.mode === 'audio') {
    if (e.key === 'm' || e.key === 'M') {
      // Mic shortcut — only when voice input is on and we're in pause/answered phase
      if (state.voiceInputOn && recognizer.available
          && (state.audioPhase === 'pause' || state.audioPhase === 'answered')) {
        e.preventDefault();
        voiceToggleListening();
      }
    } else if (e.key === ' ') {
      e.preventDefault();
      if (state.audioPhase === 'idle' || state.audioPhase === 'answered') {
        audioPlayCurrent();
      } else {
        audioStop();
      }
    } else if (e.key === '1' && state.audioPhase === 'answered') {
      audioMark('learning');
    } else if (e.key === '2' && state.audioPhase === 'answered') {
      audioMark('mastered');
    } else if (e.key === 'ArrowRight') {
      audio.cancel();
      audioAdvanceOrEnd();
    }
  }
});

/* ============================================================
   INIT
   ============================================================ */

(async function init() {
  await storage.load();
  storage.ensureDailySession();
  audio.initVoices();
  render();

  // Refresh status bar time every minute
  setInterval(() => {
    if (state.view === 'home') render();
    else {
      const sb = document.querySelector('.status-bar');
      if (sb) sb.outerHTML = renderStatusBar();
    }
  }, 60000);
})();
</script>
</body>
